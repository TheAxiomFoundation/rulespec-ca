format: rulespec/v1
module:
  summary: |-
    Revenu Québec's principal source-deduction changes for 2026 publish
    the indexed personal tax credit amounts used on the Source Deductions
    Return, TP-1015.3-V. This module encodes those Quebec 2026 source
    deduction personal credit and related withholding parameters.
  source_verification:
    corpus_citation_path: ca/policy/revenu-quebec/source-deductions-2026/personal-credit-amounts
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - quebec/statute/taxation-act
        - ca/policy/revenu-quebec/source-deductions-2026/personal-credit-amounts
      rationale: |-
        Revenu Québec administers Quebec source deductions. Its 2026
        principal changes page gives the official indexed personal tax
        credit amounts for TP-1015.3-V and related source-deduction
        thresholds. This module encodes that administrative parameter
        table before deeper Quebec statutory expansion.
    source_urls:
      - https://www.revenuquebec.ca/en/businesses/source-deductions-and-employer-contributions/employers-principal-changes-for-2026/
