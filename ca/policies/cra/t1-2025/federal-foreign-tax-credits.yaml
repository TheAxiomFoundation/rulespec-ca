format: rulespec/v1
module:
  summary: |-
    CRA Form T2209 for 2025 calculates federal foreign tax credits.
    This module encodes the federal non-business credit, business credit,
    foreign surtax fallback, and final line 40500 credit cap.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/federal-foreign-tax-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form T2209 is the official 2025 form for calculating federal
        foreign tax credits claimed on line 40500.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2209/t2209-25e.pdf
rules:
  - name: federal_2025_t2209_outside_canada_surtax_rate
    kind: parameter
    dtype: Rate
    source: CRA T2209 2025 federal business credit line 6 uses 48% of line 42900 when the T2203 amount is not used, encoded as 0.48
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.48

  - name: federal_2025_t2209_quebec_business_tax_multiplier
    kind: parameter
    dtype: Rate
    source: CRA T2209 2025 note 5 multiplies business income tax paid by Quebec residents by 55%, encoded as 0.55
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.55

  - name: federal_2025_t2209_non_business_tax_paid_line_1
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 1 uses non-business income tax paid to a foreign country
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, foreign_non_business_income_tax_paid_line_43100)

  - name: federal_2025_t2209_net_income_for_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 note 3 starts with line 23600 plus T1206 line 68360 minus listed deductions
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            net_income_line_23600
            + max(0, t1206_total_split_income_line_68360)
            - max(0, t2209_canadian_forces_police_deduction_line_24400)
            - max(0, t2209_security_options_deductions_lines_24900_24901)
            - max(0, t2209_other_payments_deduction_line_25000)
            - max(0, t2209_net_capital_losses_other_years_line_25300)
            - max(0, t2209_capital_gains_deduction_qbt_qcc_line_25395)
            - max(0, t2209_capital_gains_deduction_line_25400)
            - max(0, t2209_treaty_exempt_and_prescribed_organization_income_line_25600)
          )

  - name: federal_2025_t2209_basic_federal_tax_non_business
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 note 4 defines basic federal tax for the non-business credit as line 42900 plus listed additions minus listed abatements
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_tax_line_42900
            + max(0, federal_dividend_tax_credit_line_40425)
            + max(0, t2209_federal_surtax_on_income_outside_canada)
            - max(0, refundable_quebec_abatement_line_44000)
            - max(0, federal_refundable_first_nations_abatement_line_44100)
          )

  - name: federal_2025_t2209_non_business_tax_otherwise_payable_line_2
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 2 multiplies net foreign non-business income divided by net income by basic federal tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if federal_2025_t2209_net_income_for_credit <= 0:
            0
          else:
            (
              min(max(0, net_foreign_non_business_income_line_43300), federal_2025_t2209_net_income_for_credit)
              / federal_2025_t2209_net_income_for_credit
            )
            * federal_2025_t2209_basic_federal_tax_non_business

  - name: federal_non_business_foreign_tax_credit_line_3
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 3 is the lesser of line 1 and line 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2209_non_business_tax_paid_line_1,
            federal_2025_t2209_non_business_tax_otherwise_payable_line_2
          )

  - name: federal_2025_t2209_business_tax_paid_for_year
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 note 5 says Quebec residents multiply business income tax paid by 55%
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2209_was_quebec_resident:
            max(0, foreign_business_income_tax_paid_current_year_line_43400)
            * federal_2025_t2209_quebec_business_tax_multiplier
          else:
            max(0, foreign_business_income_tax_paid_current_year_line_43400)

  - name: federal_2025_t2209_business_tax_available_line_4
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 4 adds business income tax paid for the year and unused foreign tax credits carried from the allowed years
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2209_business_tax_paid_for_year
          + max(0, unused_business_foreign_tax_credits_carried_to_2025)

  - name: federal_2025_t2209_basic_federal_tax_business
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 note 8 defines business-credit basic federal tax as line 42900 plus federal dividend tax credit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_tax_line_42900 + max(0, federal_dividend_tax_credit_line_40425))

  - name: federal_2025_t2209_business_tax_otherwise_payable_line_5
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 5 multiplies net foreign business income divided by net income by basic federal tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if federal_2025_t2209_net_income_for_credit <= 0:
            0
          else:
            (
              min(max(0, net_foreign_business_income_line_43900), federal_2025_t2209_net_income_for_credit)
              / federal_2025_t2209_net_income_for_credit
            )
            * federal_2025_t2209_basic_federal_tax_business

  - name: federal_2025_t2209_federal_surtax_line_6
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 6 uses the T2203 line 10 amount or 48% of line 42900
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2209_use_t2203_federal_surtax_line_6:
            max(0, t2203_part_2_line_10_federal_surtax_allocated_outside_canada)
          else:
            max(0, federal_tax_line_42900) * federal_2025_t2209_outside_canada_surtax_rate

  - name: federal_2025_t2209_line_7
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 7 adds line 5 and line 6
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2209_business_tax_otherwise_payable_line_5
          + federal_2025_t2209_federal_surtax_line_6

  - name: federal_2025_t2209_line_8
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 8 adds business-credit basic federal tax and line 6
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2209_basic_federal_tax_business
          + federal_2025_t2209_federal_surtax_line_6

  - name: federal_2025_t2209_line_10
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 10 subtracts line 9 from line 8 and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_t2209_line_8 - federal_non_business_foreign_tax_credit_line_3)

  - name: federal_business_foreign_tax_credit_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 11 is the lesser of line 4, line 7, or line 10
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2209_business_tax_available_line_4,
            federal_2025_t2209_line_7,
            federal_2025_t2209_line_10
          )

  - name: federal_2025_t2209_credit_cap_for_line_13
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 13 should not be more than line 42900 plus the applicable federal surtax on income earned outside Canada
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_tax_line_42900)
          + max(0, t2209_federal_surtax_on_income_outside_canada)

  - name: federal_foreign_tax_credit_line_40500
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2209 2025 line 13 adds line 11 and line 12, subject to the stated cap, and enters the amount on line 40500
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_business_foreign_tax_credit_line_11
            + federal_non_business_foreign_tax_credit_line_3,
            federal_2025_t2209_credit_cap_for_line_13
          )
