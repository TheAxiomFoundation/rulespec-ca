format: rulespec/v1
module:
  summary: |-
    CRA Form NS479 for 2025 calculates Nova Scotia refundable credits:
    volunteer firefighters and ground search and rescue tax credit, children's
    sports and arts tax credit, and final credits entered on T1 line 47900.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/ns479-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Form NS479 is the official 2025 Nova Scotia credits calculation form.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-tc/5003-tc-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-tc/5003-tc-25e.pdf
rules:
  - name: ns479_2025_volunteer_credit_amount
    kind: parameter
    dtype: Money
    source: CRA NS479 2025 line 1 volunteer firefighters and ground search and rescue tax credit is $500
    versions:
      - effective_from: '2025-01-01'
        formula: 500

  - name: ns479_2025_child_sports_arts_expense_cap
    kind: parameter
    dtype: Money
    source: CRA NS479 2025 children's sports and arts table column D caps expenses at $500 per child
    versions:
      - effective_from: '2025-01-01'
        formula: 500

  - name: ns479_2025_child_sports_arts_rate
    kind: parameter
    dtype: Rate
    source: CRA NS479 2025 line 3 gives the children's sports and arts tax credit applicable rate as 8.79%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.0879

  - name: ns479_volunteer_firefighters_ground_search_rescue_tax_credit_line_62400
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NS479 2025 line 1 claims $500 for the volunteer firefighters and ground search and rescue tax credit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if ns479_volunteer_firefighters_ground_search_rescue_credit_eligible:
            ns479_2025_volunteer_credit_amount
          else:
            0

  - name: ns479_children_sports_arts_column_d_capped_expenses
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NS479 2025 children's sports and arts table column D subtracts assistance and caps expenses at $500 per child
    versions:
      - effective_from: '2025-01-01'
        formula: min(max(0, ns479_children_sports_arts_eligible_child_count) * ns479_2025_child_sports_arts_expense_cap, max(0, ns479_children_sports_arts_total_eligible_expenses - max(0, ns479_children_sports_arts_assistance_received)))

  - name: ns479_children_sports_arts_expenses_line_62410
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NS479 2025 line 2 totals column F by subtracting amounts claimed by others from capped column D expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns479_children_sports_arts_column_d_capped_expenses - max(0, ns479_children_sports_arts_amounts_claimed_by_others))

  - name: ns479_children_sports_arts_tax_credit_line_4
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NS479 2025 line 4 multiplies children's sports and arts expenses by 8.79%
    versions:
      - effective_from: '2025-01-01'
        formula: ns479_children_sports_arts_expenses_line_62410 * ns479_2025_child_sports_arts_rate

  - name: nova_scotia_credits_line_47900
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NS479 2025 line 5 adds line 1 and line 4 and enters Nova Scotia credits on T1 line 47900
    versions:
      - effective_from: '2025-01-01'
        formula: ns479_volunteer_firefighters_ground_search_rescue_tax_credit_line_62400 + ns479_children_sports_arts_tax_credit_line_4
