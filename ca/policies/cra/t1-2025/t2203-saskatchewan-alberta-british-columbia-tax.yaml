format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 for 2025 includes SK428MJ, AB428MJ, and BC428MJ for
    Saskatchewan, Alberta, and British Columbia multiple-jurisdiction tax.
    This module encodes their main Part 4 bracket tax, allocation, resident
    adjustment, selected credit, and Part 5 tax lines.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/t2203-saskatchewan-alberta-british-columbia-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Form T2203 is the official 2025 form for these multiple-jurisdiction provincial taxes.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
