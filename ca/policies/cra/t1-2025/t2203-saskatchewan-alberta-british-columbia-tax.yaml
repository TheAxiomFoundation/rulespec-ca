  - name: federal_2025_t2203_sk_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK428MJ line 9 is Saskatchewan tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_sk_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_sk_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_sk_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_sk_bracket_1_threshold) * federal_2025_t2203_sk_bracket_2_rate + federal_2025_t2203_sk_bracket_2_base_tax
            else:
              (taxable_income_line_26000 - federal_2025_t2203_sk_bracket_2_threshold) * federal_2025_t2203_sk_bracket_3_rate + federal_2025_t2203_sk_bracket_3_base_tax
  - name: federal_2025_t2203_sk_adjusted_income_tax_line_32
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK428MJ lines 10 to 32 calculate adjusted Saskatchewan income tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            (if t2203_resident_of_saskatchewan:
                max(
                  0,
                  (
                    max(
                      0,
                      federal_2025_t2203_sk_tax_on_taxable_income_line_9
                      - max(0, sk_farm_and_small_business_capital_gains_tax_credit_line_10)
                    )
                    + max(0, sk_unallocated_tax_on_split_income_t1206_line_12)
                    - (
                      max(0, sk_non_refundable_tax_credits_part_3_line_c)
                      + max(0, sk_dividend_tax_credit_line_15)
                      + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_sk_minimum_tax_rate
                    )
                  )
                  + max(0, sk_t691_part_7_line_1_minus_line_2) * federal_2025_t2203_sk_minimum_tax_rate
                ) * max(0, t2203_saskatchewan_income_allocation_percentage)
                - (
                  max(0, sk_resident_adjustment_credit_base_line_58360) * federal_2025_t2203_sk_bracket_1_rate
                  + max(0, sk_dividend_tax_credit_line_15)
                ) * max(0, 1 - max(0, t2203_saskatchewan_income_allocation_percentage))
              else:
                max(
                  0,
                  (
                    max(
                      0,
                      federal_2025_t2203_sk_tax_on_taxable_income_line_9
                      - max(0, sk_farm_and_small_business_capital_gains_tax_credit_line_10)
                    )
                    + max(0, sk_unallocated_tax_on_split_income_t1206_line_12)
                    - (
                      max(0, sk_non_refundable_tax_credits_part_3_line_c)
                      + max(0, sk_dividend_tax_credit_line_15)
                      + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_sk_minimum_tax_rate
                    )
                  )
                  + max(0, sk_t691_part_7_line_1_minus_line_2) * federal_2025_t2203_sk_minimum_tax_rate
                ) * max(0, t2203_saskatchewan_income_allocation_percentage))
            - max(0, sk_provincial_foreign_tax_credit_t2036_line_31)
          )
  - name: t2203_saskatchewan_tax_part_5_line_7
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK428MJ lines 33 to 46 subtract selected credits and enter Saskatchewan tax on Part 5 line 7
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(
              0,
              max(
                0,
                federal_2025_t2203_sk_adjusted_income_tax_line_32
                - max(0, sk_political_contribution_tax_credit_line_35)
              ) - min(
                federal_2025_t2203_sk_labour_sponsored_cap,
                max(0, sk_labour_sponsored_vcc_registered_sk_line_37)
                + max(0, sk_labour_sponsored_vcc_federally_registered_line_38)
              )
            ) - max(0, sk_mineral_exploration_tax_credit_t1279_line_41)
            - max(0, sk_graduate_tuition_tax_credit_rc360_line_43)
            - max(0, sk_qualifying_environmental_trust_tax_credit_line_45)
          )
  - name: federal_2025_t2203_ab_tax_on_taxable_income_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB428MJ line 16 is Alberta tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_ab_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_ab_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_ab_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_ab_bracket_1_threshold) * federal_2025_t2203_ab_bracket_2_rate + federal_2025_t2203_ab_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_ab_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_ab_bracket_2_threshold) * federal_2025_t2203_ab_bracket_3_rate + federal_2025_t2203_ab_bracket_3_base_tax
              else:
                (taxable_income_line_26000 - federal_2025_t2203_ab_bracket_3_threshold) * federal_2025_t2203_ab_bracket_4_rate + federal_2025_t2203_ab_bracket_4_base_tax
  - name: federal_2025_t2203_ab_adjusted_income_tax_line_38
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB428MJ lines 17 to 38 calculate adjusted Alberta income tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            (if t2203_resident_of_alberta:
                max(
                  0,
                  federal_2025_t2203_ab_tax_on_taxable_income_line_16
                  + max(0, ab_unallocated_tax_on_split_income_t1206_line_17)
                  - (
                    max(0, ab_non_refundable_tax_credits_part_3_line_c)
                    + max(0, ab_dividend_tax_credit_line_20)
                    + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_ab_minimum_tax_rate
                  )
                ) + max(0, ab_t691_part_7_line_1_minus_line_2) * federal_2025_t2203_ab_minimum_tax_rate
              else:
                max(
                  0,
                  federal_2025_t2203_ab_tax_on_taxable_income_line_16
                  + max(0, ab_unallocated_tax_on_split_income_t1206_line_17)
                  - (
                    max(0, ab_non_refundable_tax_credits_part_3_line_c)
                    + max(0, ab_dividend_tax_credit_line_20)
                    + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_ab_minimum_tax_rate
                  )
                ) + max(0, ab_t691_part_7_line_1_minus_line_2) * federal_2025_t2203_ab_minimum_tax_rate)
            * max(0, t2203_alberta_income_allocation_percentage)
            - (if t2203_resident_of_alberta:
                (
                  max(0, ab_resident_adjustment_credit_base_lines_58330_58360)
                  * federal_2025_t2203_ab_bracket_1_rate
                  + max(0, ab_dividend_tax_credit_line_20)
                ) * max(0, 1 - max(0, t2203_alberta_income_allocation_percentage))
              else:
                0)
            - max(0, ab_provincial_foreign_tax_credit_t2036_line_37)
          )
  - name: t2203_alberta_tax_part_5_line_8
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB428MJ lines 39 to 43 subtract political and supplemental credits and enter Alberta tax on Part 5 line 8
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_ab_adjusted_income_tax_line_38 - max(0, ab_political_contribution_tax_credit_line_40) - max(0, ab_supplemental_tax_credit_line_42))
  - name: federal_2025_t2203_bc_tax_on_taxable_income_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC428MJ line 16 is British Columbia tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_bc_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_bc_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_bc_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_bc_bracket_1_threshold) * federal_2025_t2203_bc_bracket_2_rate + federal_2025_t2203_bc_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_bc_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_bc_bracket_2_threshold) * federal_2025_t2203_bc_bracket_3_rate + federal_2025_t2203_bc_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_bc_bracket_4_threshold:
                  (taxable_income_line_26000 - federal_2025_t2203_bc_bracket_3_threshold) * federal_2025_t2203_bc_bracket_4_rate + federal_2025_t2203_bc_bracket_4_base_tax
                else:
                  if taxable_income_line_26000 <= federal_2025_t2203_bc_bracket_5_threshold:
                    (taxable_income_line_26000 - federal_2025_t2203_bc_bracket_4_threshold) * federal_2025_t2203_bc_bracket_5_rate + federal_2025_t2203_bc_bracket_5_base_tax
