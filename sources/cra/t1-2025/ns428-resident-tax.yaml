  coverage:
    encoded:
    - 'CRA Form NS428 for 2025 calculates ordinary Nova Scotia resident tax: tax on taxable income, non-refundable tax credits, low-income tax reduction, political contribution tax credit, food bank tax credit for farmers, labour-sponsored venture capital tax credit, equity and innovation credits, age tax credit, and final tax entered on T1 line 42800.'
    not_encoded:
    - Claimant-specific eligibility, certification, residency, filing, receipt, election, slip-level, and administrative fact predicates not represented as arithmetic in this module.
    - Component calculations delegated to dedicated modules or upstream fact inputs where this module aggregates or routes line amounts.
