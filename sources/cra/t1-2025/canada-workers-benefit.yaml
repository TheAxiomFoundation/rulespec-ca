source:
  id: cra-2025-canada-workers-benefit
  citation_path: canada/policy/cra/t1-2025/canada-workers-benefit
  title: CRA Schedule 6 2025 Canada Workers Benefit
  documents:
    - title: Schedule 6 Canada Workers Benefit 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-s6/5000-s6-25e.pdf
  coverage:
    encoded:
      - Basic Canada Workers Benefit calculation for jurisdictions covered by the standard Schedule 6 amounts
      - Secondary-earner exemption
      - Disability supplement for the claimant, including two-DTC-couple threshold and rate
      - Advanced Canada Workers Benefit line 41500 amount and post-ACWB net refundable credit surface
    not_encoded:
      - Alberta, Quebec, and Nunavut custom Schedule 6 amounts
      - Spouse-side separate disability supplement calculation
      - Detailed eligibility predicates for working income, eligible spouse, eligible dependant, DTC, and excluded full-time student/inmate/death cases
