source:
  id: cra-2025-t1-income-net-taxable-income
  citation_path: ca/policy/cra/t1-2025/t1-income-net-taxable-income
  title: CRA 2025 T1 Income Net and Taxable Income Aggregation
  documents:
  - title: CRA 2025 T1 Income Net and Taxable Income Aggregation source 1
    url: https://www.canada.ca/en/revenue-agency/services/forms-publications/tax-packages-years/general-income-tax-benefit-package/5000-r.html
  - title: CRA 2025 T1 Income Net and Taxable Income Aggregation source 2
    url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-r/5000-r-25e.txt
  coverage:
    encoded:
    - CRA 2025 T1 return Steps 2, 3, and 4 aggregate income lines, self-employment income, social benefit inclusions, deductions, net income adjustments, and taxable-income deductions to calculate total income line 15000, net income line 23600, and taxable income line 26000.
    not_encoded:
    - Claimant-specific eligibility, certification, residency, filing, receipt, election, slip-level, and administrative fact predicates not represented as arithmetic in this module.
    - Component calculations delegated to dedicated modules or upstream fact inputs where this module aggregates or routes line amounts.
