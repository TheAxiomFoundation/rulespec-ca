source:
  id: cra-2025-gst370-employee-partner-rebate
  citation_path: ca/policy/cra/t1-2025/gst370-employee-partner-rebate
  title: CRA Form GST370 2025 Employee and Partner GST/HST Rebate Application
  documents:
    - title: Form GST370 Employee and Partner GST/HST Rebate Application 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/gst370/gst370-25e.pdf
  coverage:
    encoded:
      - Part B GST eligible expenses and GST rebate at 5/105
      - Part B HST eligible expense columns and rebates at 13/113, 14/114, and 15/115
      - Chart 3 separately paid provincial HST columns and rebates at 1/101, 2/102, 8/108, 9/109, and 10/110
      - Form GST370 line 15 total employee and partner GST/HST rebate and T1 line 45700 carry-through
    not_encoded:
      - Claimant identification, employer or partnership identification, GST/HST registrant status, and listed-financial-institution exclusion
      - Expense eligibility, capital-cost-allowance eligibility, non-eligible expense allocation, unreasonable allowance certification, and substantiation predicates
