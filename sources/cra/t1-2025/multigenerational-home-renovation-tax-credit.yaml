source:
  id: cra-2025-multigenerational-home-renovation-tax-credit
  citation_path: canada/policy/cra/t1-2025/multigenerational-home-renovation-tax-credit
  title: CRA Schedule 12 2025 Multigenerational Home Renovation Tax Credit
  documents:
    - title: Schedule 12 Multigenerational Home Renovation Tax Credit 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-s12/5000-s12-25e.pdf
  coverage:
    encoded:
      - Qualifying expenditure reimbursement reduction
      - $50,000 per-renovation expenditure cap and other-claimant coordination
      - Total qualifying expenditures line 45354
      - 14.5% refundable credit and $7,250 per-renovation maximum on line 45355
    not_encoded:
      - Eligible individual, qualifying individual, qualifying relation, eligible dwelling, secondary unit, and qualifying renovation predicates
      - Lifetime one-renovation-per-qualifying-individual constraint
      - Expense classification catalogue and interaction predicates with medical expense or home accessibility claims
