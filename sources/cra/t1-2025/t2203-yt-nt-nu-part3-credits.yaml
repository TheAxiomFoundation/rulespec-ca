source:
  id: cra-2025-t2203-yt-nt-nu-part3-credits
  citation_path: canada/policy/cra/t1-2025/t2203-yt-nt-nu-part3-credits
  title: CRA Form T2203 2025 Part 3 YT, NT, and NU Non-Refundable Tax Credits
  documents:
    - title: Form T2203 Provincial and Territorial Taxes for Multiple Jurisdictions 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
  coverage:
    encoded:
      - YT, NT, and NU Part 3 subtotal, Schedule 9 split-rate credit, and total non-refundable tax credit line D
      - Selected worksheet formulas for NT and NU age amount, spouse amount, eligible dependant amount, NU young children, and medical expenses
      - Yukon federal-return-line inputs used by Part 3 and territory-specific pension, low-rate, and high-rate totals
    not_encoded:
      - Per-dependant row tables for infirm dependants, caregiver amounts, disability transfers, and medical expenses for other dependants
      - S2/S11 detailed transfer schedules and Nunavut young-child detail chart
