  title: CRA Form T2204 2025 Employee Overpayment of Employment Insurance Premiums
  documents:
    - title: Form T2204 Employee Overpayment of Employment Insurance Premiums 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2204/t2204-25e.pdf
  coverage:
    encoded:
      - EI insurable earnings line 1 note 1 low-earnings rule
      - Total EI earnings cap and $2,000 excess-earnings calculation
