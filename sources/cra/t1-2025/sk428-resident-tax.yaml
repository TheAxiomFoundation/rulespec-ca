  coverage:
    encoded:
    - 'CRA Form SK428 for 2025 calculates ordinary Saskatchewan resident tax: Saskatchewan tax on taxable income, Saskatchewan non-refundable tax credits, farm and small business capital gains tax credit, minimum tax carryover, dividend tax credit, political contribution tax credit, labour-sponsored venture capital tax credit, mineral exploration credit, graduate tuition tax credit, and final Saskatchewan tax entered on T1 line 42800.'
