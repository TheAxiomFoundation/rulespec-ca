  coverage:
    encoded:
    - 'CRA Form ON428 for 2025 calculates ordinary Ontario resident tax: Ontario tax on taxable income, Ontario non-refundable tax credits, minimum tax carryover, surtax, tax reduction, provincial foreign tax credit, LIFT credit, community food program donation credit, Ontario health premium, and final Ontario tax entered on T1 line 42800.'
