source:
  id: cra-2025-northern-residents-deductions
  citation_path: canada/policy/cra/t1-2025/northern-residents-deductions
  title: CRA Form T2222 2025 Northern Residents Deductions
  documents:
    - title: Form T2222 Northern Residents Deductions 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2222/t2222-25e.txt
  coverage:
    encoded:
      - Zone A and Zone B residency deduction arithmetic
      - Net-income 20% residency deduction limit
      - Chart A $1,200 per-individual standard travel amount cap
      - Chart B trip minima for two other-travel trips and medical travel
      - Zone B 50% travel deduction reduction
      - Final northern residents deductions amount for line 25500
    not_encoded:
      - Six-month residency, zone-place lookup, and prescribed northern/intermediate zone eligibility predicates
      - Allocation coordination across multiple claimants and more than four Chart A individuals
      - Per-trip designated city, lowest airfare fact extraction, and trip purpose substantiation
      - Medical-trip unlimited eligibility and two-trip non-medical eligibility enforcement beyond the T2222 form slots
