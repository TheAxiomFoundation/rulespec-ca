source:
  id: cra-2025-federal-non-refundable-credit-aggregation
  citation_path: ca/policy/cra/t1-2025/federal-non-refundable-credit-aggregation
  title: CRA 2025 T1 Federal Non-Refundable Credit Aggregation
  documents:
  - title: CRA 2025 T1 Federal Non-Refundable Credit Aggregation source 1
    url: https://www.canada.ca/en/revenue-agency/services/forms-publications/tax-packages-years/general-income-tax-benefit-package/5000-r.html
  - title: CRA 2025 T1 Federal Non-Refundable Credit Aggregation source 2
    url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-r/5000-r-25e.txt
  coverage:
    encoded:
    - CRA 2025 T1 return Step 5 Part B aggregates federal non-refundable tax credit claim lines, calculates selected return worksheet surfaces printed on the return, applies the 14.5% federal non-refundable tax credit rate, and adds donations and the top-up tax credit to produce line 35000.
    not_encoded:
    - Claimant-specific eligibility, certification, residency, filing, receipt, election, slip-level, and administrative fact predicates not represented as arithmetic in this module.
    - Component calculations delegated to dedicated modules or upstream fact inputs where this module aggregates or routes line amounts.
