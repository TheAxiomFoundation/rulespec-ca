  coverage:
    encoded:
    - 'CRA Form PE428 for 2025 calculates ordinary Prince Edward Island resident tax: tax on taxable income, non-refundable tax credits, dividend and minimum tax credits, low-income tax reduction, political contribution and equity tax credits, final tax entered on T1 line 42800, and the refundable volunteer firefighter/search-and-rescue credit entered on line 47900.'
