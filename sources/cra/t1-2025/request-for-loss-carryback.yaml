source:
  id: cra-2025-request-for-loss-carryback
  citation_path: ca/policy/cra/t1-2025/request-for-loss-carryback
  title: CRA Form T1A 2025 Request for Loss Carryback
  documents:
    - title: Form T1A Request for Loss Carryback 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t1a/t1a-25e.pdf
  coverage:
    encoded:
      - Non-capital loss available for carryback and carryforward amounts F to M
      - Farming or fishing loss carryback and carryforward amounts N and O
      - Restricted farm loss carryback and carryforward amounts P and Q
      - Net capital loss carryback and carryforward amounts R and S
      - Listed personal property loss carryback and carryforward amounts T and U
    not_encoded:
      - Detailed Part 2 income/loss source row classification and slip/line fact extraction
      - Eligibility predicates for limited partnerships, deceased taxpayers, and prior-year loss application limits
      - Prior-year reassessment effects, late-filing penalty effects, and certification/filing process
      - Detailed Guide T4037 and IT-232 interpretive rules beyond the T1A arithmetic surface
