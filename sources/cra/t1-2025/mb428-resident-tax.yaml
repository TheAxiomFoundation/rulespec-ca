  coverage:
    encoded:
    - 'CRA Form MB428 for 2025 calculates ordinary Manitoba resident tax: Manitoba tax on taxable income, Manitoba non-refundable tax credits, minimum tax carryover, additional minimum tax, Manitoba political contribution credit, investment and foreign tax credits, and final Manitoba tax entered on T1 line 42800.'
