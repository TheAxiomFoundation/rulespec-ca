  title: CRA Form T2209 2025 Federal Foreign Tax Credits
  documents:
    - title: Form T2209 Federal Foreign Tax Credits 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2209/t2209-25e.pdf
  coverage:
    encoded:
      - Federal non-business foreign tax credit lines 1 to 3
      - T2209 adjusted net income definition for the credit ratio
