source:
  id: cra-2025-tax-on-split-income
  citation_path: ca/policy/cra/t1-2025/tax-on-split-income
  title: CRA Form T1206 2025 Tax on Split Income
  documents:
    - title: Form T1206 Tax on Split Income 2025
      url: https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t1206/t1206-25e.pdf
  coverage:
    encoded:
      - TOSI-adjusted net income Part 1 lines 1 to 6
      - Federal tax on split income Part 2 lines 7 to 30 and line 42000 composition
      - Federal dividend and foreign tax credit split-income adjustments
      - Provincial or territorial non-multiple-jurisdiction Part 3 lines 31 to 52
      - Chart C province/territory high, low, eligible-dividend-credit, and other-than-eligible-dividend-credit rate lookup parameters
    not_encoded:
      - Specified individual, split-income, excluded amount, related business, and reasonable return predicates
      - Disposition reserve calculation and deemed dividend/capital-gain fact extraction
      - Part 4 multiple-jurisdiction T2203 repetition and Chart E placement
