  coverage:
    encoded:
    - 'CRA Form MB479 for 2025 calculates Manitoba refundable credits: family income, personal tax credit, homeowners affordability tax credit, renters affordability tax credit, seniors school tax rebate, EIA/MSPD adjustment, fertility treatment credit, business and green energy credits, teaching expense credit, rental housing construction incentive credit, and final Manitoba credits entered on T1 line 47900.'
    not_encoded:
    - Claimant-specific eligibility, certification, residency, filing, receipt, election, slip-level, and administrative fact predicates not represented as arithmetic in this module.
    - Component calculations delegated to dedicated modules or upstream fact inputs where this module aggregates or routes line amounts.
