  coverage:
    encoded:
    - 'CRA Form NL428 for 2025 calculates ordinary Newfoundland and Labrador resident tax: tax on taxable income, non-refundable tax credits, minimum tax carryover, dividend tax credit, political contribution tax credit, direct equity and resort property credits, venture capital credits, low-income tax reduction, and final tax entered on T1 line 42800.'
