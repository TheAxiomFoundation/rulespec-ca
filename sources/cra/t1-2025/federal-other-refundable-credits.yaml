  coverage:
    encoded:
    - 'CRA 2025 T1 line guidance calculates selected federal credit and refundable-credit lines that are not handled by a dedicated schedule module: the labour-sponsored funds tax credit, the employee and partner GST/HST rebate claim, and the eligible educator school supply tax credit.'
    not_encoded:
    - Claimant-specific eligibility, certification, residency, filing, receipt, election, slip-level, and administrative fact predicates not represented as arithmetic in this module.
    - Component calculations delegated to dedicated modules or upstream fact inputs where this module aggregates or routes line amounts.
