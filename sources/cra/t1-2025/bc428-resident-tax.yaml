  coverage:
    encoded:
    - 'CRA Form BC428 for 2025 calculates ordinary British Columbia resident tax: British Columbia tax on taxable income, non-refundable credits, donations, farmers'' food donation credit, minimum tax carryover, dividend tax credit, tax reduction, political contribution tax credit, ESOP/EVCC credits, mining flow-through share credit, and final tax entered on T1 line 42800.'
