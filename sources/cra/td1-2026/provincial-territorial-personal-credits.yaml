      - Provincial and territorial TD1 worksheet partial formulas beyond the published age amount thresholds
      - Province-specific spouse, dependant, caregiver, family tax benefit, tuition, education, and transfer worksheet formulas
      - Fact predicates for age, pension income, disability certification, student status, relationship, support, residency, or dependant status
