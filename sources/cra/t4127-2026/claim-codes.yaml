  citation_path: canada/policy/cra/t4127-2026/claim-codes
  title: CRA T4127 2026 federal, provincial, and territorial claim codes
  effective_from: '2026-01-01'
  documents:
    - title: T4127 Payroll Deductions Formulas, 122nd Edition, effective January 1, 2026
      url: https://www.canada.ca/en/revenue-agency/services/forms-publications/payroll/t4127-payroll-deductions-formulas/t4127-jan/t4127-jan-payroll-deductions-formulas-computer-programs.html
  coverage:
    encoded:
      - Federal claim codes 0 through 10 from Table 8.9
