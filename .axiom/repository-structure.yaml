version: 1
allowed_root_directories:
  - .axiom
  - .github
  - ca
  - data
  - manifests
  - sources
allowed_root_files:
  - CLAUDE.md
  - LICENSE
  - LICENSE-CODE
  - NOTICE
  - README.md
  - known-missing-money-atoms.yaml
  - known-validation-gaps.yaml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "data/**"
    allow_extensions:
      - ".jsonl"
  - patterns:
      - "manifests/**"
    allow_extensions:
      - ".json"
  - patterns:
      - "ca/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "sources/**"
    allow_extensions:
      - ".json"
      - ".yaml"
