version: 1
allowed_root_directories:
  - .axiom
  - .github
  - data
  - policies
  - regulations
  - sources
  - statutes
allowed_root_files:
  - CLAUDE.md
  - README.md
  - known-missing-money-atoms.yaml
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".toml"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "data/**"
    allow_extensions:
      - ".jsonl"
  - patterns:
      - "policies/**"
      - "regulations/**"
      - "statutes/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "sources/**"
    allow_extensions:
      - ".json"
      - ".yaml"
