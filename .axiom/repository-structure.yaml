version: 1
allowed_root_directories:
  - .axiom
  - .github
  - policies
  - regulations
  - sources
  - statutes
allowed_root_files:
  - CLAUDE.md
  - README.md
path_rules:
  - patterns:
      - ".axiom/**"
    allow_extensions:
      - ".json"
      - ".yaml"
  - patterns:
      - ".github/**"
    allow_extensions:
      - ".yml"
      - ".yaml"
  - patterns:
      - "policies/**"
      - "regulations/**"
      - "statutes/**"
    allow_extensions:
      - ".yaml"
  - patterns:
      - "sources/**"
    allow_extensions:
      - ".json"
      - ".yaml"
