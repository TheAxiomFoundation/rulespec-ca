format: rulespec/v1
module:
  summary: |-
    CRA's 2026 provincial and territorial TD1 personal tax credit
    returns state current-year personal credit line amounts used for
    payroll deductions. This module encodes the 2026 line-value spine for
    the basic personal amount, age amount thresholds, pension income
    amount cap, and disability amount for all CRA-administered provinces
    and territories. Quebec is excluded because Revenu Quebec administers
    Quebec source deductions separately.
  source_verification:
    corpus_citation_path: canada/policy/cra/td1-2026/provincial-territorial-personal-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/provincial-territorial-income-tax-acts
        - canada/policy/cra/td1-2026/provincial-territorial-personal-credits
      rationale: |-
        The CRA 2026 provincial and territorial TD1 forms are the official
        administrative current-year personal credit claim forms used by
        employers and payers to determine provincial or territorial tax
        deductions. This module encodes the published TD1 line amounts
        before deeper province-by-province statutory expansion.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1ab/td1ab-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1bc/td1bc-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1mb/td1mb-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1nb/td1nb-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1nl/td1nl-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1ns/td1ns-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1nt/td1nt-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1nu/td1nu-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1on/td1on-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1pe/td1pe-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1sk/td1sk-26e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/td1yt/td1yt-26e.pdf
