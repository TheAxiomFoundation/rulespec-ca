  - name: alberta_bracket_tax_before_credits
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA 2026 Alberta tax rates and income brackets
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          (alberta_income_tax_bracket_1_rate * min(provincial_taxable_income, alberta_income_tax_bracket_2_threshold))
          + (alberta_income_tax_bracket_2_rate * max(0, min(provincial_taxable_income, alberta_income_tax_bracket_3_threshold) - alberta_income_tax_bracket_2_threshold))
          + (alberta_income_tax_bracket_3_rate * max(0, min(provincial_taxable_income, alberta_income_tax_bracket_4_threshold) - alberta_income_tax_bracket_3_threshold))
          + (alberta_income_tax_bracket_4_rate * max(0, min(provincial_taxable_income, alberta_income_tax_bracket_5_threshold) - alberta_income_tax_bracket_4_threshold))
          + (alberta_income_tax_bracket_5_rate * max(0, min(provincial_taxable_income, alberta_income_tax_bracket_6_threshold) - alberta_income_tax_bracket_5_threshold))
          + (alberta_income_tax_bracket_6_rate * max(0, provincial_taxable_income - alberta_income_tax_bracket_6_threshold))

