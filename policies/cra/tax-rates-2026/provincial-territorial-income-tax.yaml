  - name: ontario_tax_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 5 Ontario tax reduction S
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, min(ontario_annual_basic_provincial_tax + ontario_surtax, (ontario_tax_reduction_multiplier * (ontario_tax_reduction_base_amount + ontario_tax_reduction_dependant_amount)) - (ontario_annual_basic_provincial_tax + ontario_surtax)))

  - name: ontario_annual_provincial_tax_deduction
    kind: derived
