format: rulespec/v1
module:
  summary: |-
    CRA's 2026 current-year tax rates page gives provincial and
    territorial taxable-income brackets for the province or territory of
    residence on December 31, 2026. This module encodes the 2026
    provincial and territorial marginal bracket tax before credits.
    Quebec is sourced from Revenu Quebec's 2026 income tax rates because
    the CRA page refers Quebec taxpayers to Revenu Quebec.
  source_verification:
    corpus_citation_path: canada/policy/cra/tax-rates-2026/provincial-territorial-income-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
        - canada/statute/provincial-territorial-income-tax-acts
        - canada/policy/cra/tax-rates-2026/provincial-territorial-income-tax
        - canada/policy/revenu-quebec/tax-rates-2026/income-tax-rates
      rationale: |-
        The encoded values are current 2026 personal income tax rate
        tables published by CRA and Revenu Quebec for return-year use.
        Province- and territory-specific statutory enactments remain a
        deeper-source layer for later expansion; this module intentionally
        encodes the official 2026 administrative rate table before
        credits, surtaxes, and reductions.
    source_urls:
      - https://www.canada.ca/en/revenue-agency/services/tax/individuals/tax-rates-brackets/current-year.html
      - https://www.revenuquebec.ca/en/citizens/income-tax-return/completing-your-income-tax-return/income-tax-rates/
rules:
  - name: provincial_taxable_income
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA 2026 provincial or territorial rates apply to taxable income; Quebec 2026 income tax rates apply to taxable income
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, taxable_income)

