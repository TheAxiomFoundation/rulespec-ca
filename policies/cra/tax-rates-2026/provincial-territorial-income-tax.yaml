  - name: british_columbia_tax_reduction
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 5 British Columbia tax reduction S
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if provincial_taxable_income <= british_columbia_tax_reduction_first_threshold:
            min(british_columbia_annual_basic_provincial_tax, british_columbia_tax_reduction_maximum)
          else:
            if provincial_taxable_income <= british_columbia_tax_reduction_second_threshold:
              min(british_columbia_annual_basic_provincial_tax, max(0, british_columbia_tax_reduction_maximum - ((provincial_taxable_income - british_columbia_tax_reduction_first_threshold) * british_columbia_tax_reduction_phaseout_rate)))
            else:
              0

