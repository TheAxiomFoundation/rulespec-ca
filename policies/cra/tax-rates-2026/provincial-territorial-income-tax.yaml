        formula: |-
          12989

  - name: ontario_basic_personal_amount_credit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 4 Ontario K1P default TCP
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          ontario_income_tax_bracket_1_rate * ontario_basic_personal_amount

  - name: ontario_annual_basic_provincial_tax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 4 Ontario annual basic provincial tax T4
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          max(0, ontario_bracket_tax_before_credits - ontario_basic_personal_amount_credit - provincial_cpp_ei_credit - other_provincial_non_refundable_tax_credits)

  - name: ontario_surtax
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 5 Ontario surtax V1
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if ontario_annual_basic_provincial_tax <= ontario_surtax_first_threshold:
            0
          else:
            if ontario_annual_basic_provincial_tax <= ontario_surtax_second_threshold:
              ontario_surtax_first_rate * (ontario_annual_basic_provincial_tax - ontario_surtax_first_threshold)
            else:
              (ontario_surtax_first_rate * (ontario_annual_basic_provincial_tax - ontario_surtax_first_threshold)) + (ontario_surtax_second_rate * (ontario_annual_basic_provincial_tax - ontario_surtax_second_threshold))

  - name: ontario_health_premium
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 5 Ontario Health Premium V2
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if provincial_taxable_income <= ontario_health_premium_first_threshold:
            0
          else:
            if provincial_taxable_income <= ontario_health_premium_second_threshold:
              min(ontario_health_premium_first_maximum, ontario_health_premium_six_percent_rate * (provincial_taxable_income - ontario_health_premium_first_threshold))
            else:
              if provincial_taxable_income <= ontario_health_premium_third_threshold:
                min(ontario_health_premium_second_maximum, ontario_health_premium_first_maximum + (ontario_health_premium_six_percent_rate * (provincial_taxable_income - ontario_health_premium_second_threshold)))
              else:
                if provincial_taxable_income <= ontario_health_premium_fourth_threshold:
                  min(ontario_health_premium_third_maximum, ontario_health_premium_second_maximum + (ontario_health_premium_twenty_five_percent_rate * (provincial_taxable_income - ontario_health_premium_third_threshold)))
                else:
                  if provincial_taxable_income <= ontario_health_premium_fifth_threshold:
                    min(ontario_health_premium_fourth_maximum, ontario_health_premium_third_maximum + (ontario_health_premium_twenty_five_percent_rate * (provincial_taxable_income - ontario_health_premium_fourth_threshold)))
                  else:
                    min(ontario_health_premium_fifth_maximum, ontario_health_premium_fourth_maximum + (ontario_health_premium_twenty_five_percent_rate * (provincial_taxable_income - ontario_health_premium_fifth_threshold)))

  - name: ontario_tax_reduction_dependant_amount
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Step 5 Ontario tax reduction Y factor
    versions:
