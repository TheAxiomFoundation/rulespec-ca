format: rulespec/v1
module:
  summary: |-
    CRA Schedule NB(S12) for 2025 calculates the New Brunswick seniors' home
    renovation tax credit entered on T1 line 47900.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/nb-s12-seniors-home-renovation-credit
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Schedule NB(S12) is the official 2025 New Brunswick seniors' home renovation tax credit calculation schedule.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5004-s12/5004-s12-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5004-s12/5004-s12-25e.pdf
rules:
  - name: nb_s12_2025_home_renovation_expense_cap
    kind: parameter
    dtype: Money
    source: CRA Schedule NB(S12) 2025 line 3 caps net eligible home renovation expenses at $10,000
    versions:
      - effective_from: '2025-01-01'
        formula: 10000

  - name: nb_s12_2025_home_renovation_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule NB(S12) 2025 line 6 gives the applicable rate as 10%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.10

  - name: nb_s12_net_home_renovation_expenses_line_3
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule NB(S12) 2025 line 3 subtracts government assistance from total eligible expenses and caps the amount at $10,000
    versions:
      - effective_from: '2025-01-01'
        formula: min(nb_s12_2025_home_renovation_expense_cap, max(0, nb_s12_home_renovation_total_eligible_expenses_line_1 - max(0, nb_s12_government_assistance_line_2)))

  - name: nb_s12_home_renovation_expenses_line_60360
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule NB(S12) 2025 line 5 subtracts eligible expenses claimed by other eligible individuals from line 3
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nb_s12_net_home_renovation_expenses_line_3 - max(0, nb_s12_expenses_claimed_by_other_eligible_individuals_line_4))

  - name: new_brunswick_seniors_home_renovation_tax_credit_line_47900
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule NB(S12) 2025 line 7 multiplies line 5 by 10% and enters the credit on T1 line 47900
    versions:
      - effective_from: '2025-01-01'
        formula: nb_s12_home_renovation_expenses_line_60360 * nb_s12_2025_home_renovation_rate
