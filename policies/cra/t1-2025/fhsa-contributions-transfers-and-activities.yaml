format: rulespec/v1
module:
  summary: |-
    CRA Schedule 15 for the 2025 T1 return calculates first home savings
    account annual room, maximum deduction, the deduction claimed on line
    20805, unused contributions available to deduct in future years, and
    qualifying withdrawals. This module encodes the Schedule 15 arithmetic
    spine for Steps 2 through 4.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/fhsa-contributions-transfers-and-activities
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Schedule 15 is the official 2025 T1 return schedule for FHSA
        contributions, transfers, annual limit, deduction, unused
        contributions, and qualifying withdrawal reporting.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-s15/5000-s15-25e.pdf
rules:
  - name: federal_2025_fhsa_annual_limit_base
    kind: parameter
    dtype: Money
    source: CRA Schedule 15 2025 Step 2 line 14 and line 30 use $8,000
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          8000

  - name: federal_2025_fhsa_lifetime_limit
    kind: parameter
    dtype: Money
    source: CRA Schedule 15 2025 Step 3 line 46 lifetime FHSA limit is $40,000
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          40000

  - name: federal_2025_fhsa_contributions_before_qualifying_withdrawal_line_3
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 3 subtracts 2025 contributions after first qualifying withdrawal from total 2025 FHSA contributions
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, fhsa_total_contributions_2025_line_1)
            - max(0, fhsa_contributions_after_first_qualifying_withdrawal_2025_line_2)
          )

  - name: federal_2025_fhsa_line_5
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 5 adds line 3 and variable B amount for 2024
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_contributions_before_qualifying_withdrawal_line_3
          + max(0, fhsa_annual_limit_2024_variable_b_amount_line_4)

  - name: federal_2025_fhsa_prior_year_post_withdrawal_contributions_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 9 subtracts 2024 contributions before first qualifying withdrawal from total 2024 FHSA contributions
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, fhsa_total_contributions_2024_line_7)
            - max(0, fhsa_contributions_2024_before_first_qualifying_withdrawal_line_8)
          )

  - name: federal_2025_fhsa_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 11 adds line 9 and line 10
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_prior_year_post_withdrawal_contributions_line_9
          + max(0, fhsa_contributions_after_first_qualifying_withdrawal_2025_line_2)

  - name: federal_2025_fhsa_designated_withdrawal_offset_line_12
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 12 subtracts line 11 from total designated withdrawals and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, fhsa_total_designated_withdrawals_2025_line_6)
            - federal_2025_fhsa_line_11
          )

  - name: federal_2025_fhsa_line_13
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 13 subtracts line 12 from line 5 and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_fhsa_line_5
            - federal_2025_fhsa_designated_withdrawal_offset_line_12
          )

  - name: federal_2025_fhsa_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 16 adds $8,000 and FHSA carryforward for 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_annual_limit_base
          + max(0, fhsa_carryforward_for_2025_line_15)

  - name: federal_2025_fhsa_net_rrsp_to_fhsa_transfer_line_23
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 23 subtracts FHSA-to-RRSP/RRIF designated transfers from RRSP-to-FHSA transfers
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, rrsp_to_fhsa_transfers_prior_years_line_17)
            + max(0, rrsp_to_fhsa_transfers_2025_line_18)
            - max(0, fhsa_to_rrsp_rrif_designated_transfers_prior_years_line_20)
            - max(0, fhsa_to_rrsp_rrif_designated_transfers_2025_line_21)
          )

  - name: federal_2025_fhsa_prior_year_net_transfer_line_27
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 27 subtracts prior-year designated FHSA-to-RRSP/RRIF transfers from prior-year RRSP-to-FHSA transfers
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, rrsp_to_fhsa_transfers_prior_years_line_17)
            - max(0, fhsa_to_rrsp_rrif_designated_transfers_prior_years_line_20)
          )

  - name: federal_2025_fhsa_line_29
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 29 subtracts variable H amount from prior-year net transfer and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_fhsa_prior_year_net_transfer_line_27
            - max(0, fhsa_annual_limit_2024_variable_h_amount_line_28)
          )

  - name: federal_2025_fhsa_line_32
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 32 adds $8,000 and FHSA carryforward for 2024
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_annual_limit_base
          + max(0, fhsa_carryforward_for_2024_line_31)

  - name: federal_2025_fhsa_line_33
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 33 is the lesser of line 29 and line 32
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(federal_2025_fhsa_line_29, federal_2025_fhsa_line_32)

  - name: federal_2025_fhsa_line_35
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 35 adds line 33 and variable F amount for 2024
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_line_33
          + max(0, fhsa_annual_limit_2024_variable_f_amount_line_34)

  - name: federal_2025_fhsa_line_36
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 36 subtracts line 35 from line 24
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_fhsa_net_rrsp_to_fhsa_transfer_line_23
          - federal_2025_fhsa_line_35

  - name: federal_2025_fhsa_line_39
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 39 subtracts line 38 from line 37 and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_fhsa_line_16 - federal_2025_fhsa_line_36)

  - name: federal_2025_fhsa_annual_limit_line_40
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 40 is the lesser of line 13 and line 39, or zero if the maximum participation period ended in a prior year
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if fhsa_maximum_participation_period_ended_before_2025:
            0
          else:
            min(federal_2025_fhsa_line_13, federal_2025_fhsa_line_39)

  - name: federal_2025_fhsa_line_45
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 45 subtracts total prior FHSA deductions from total annual FHSA limits through 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_fhsa_annual_limit_line_40
            + max(0, fhsa_total_annual_limits_prior_years_line_42)
            - max(0, fhsa_total_deductions_prior_years_line_44)
          )

  - name: federal_2025_fhsa_line_50
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 50 subtracts net RRSP-to-FHSA transfers from remaining lifetime limit and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_fhsa_lifetime_limit
            - max(0, fhsa_total_deductions_prior_years_line_44)
            - federal_2025_fhsa_net_rrsp_to_fhsa_transfer_line_23
          )

  - name: federal_2025_fhsa_maximum_deduction_available_line_51
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 51 is the lesser of line 45 and line 50
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(federal_2025_fhsa_line_45, federal_2025_fhsa_line_50)

  - name: federal_2025_fhsa_line_56
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 56 subtracts line 55 from unused contributions plus line 53
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, fhsa_unused_contributions_available_prior_line_52)
            + federal_2025_fhsa_contributions_before_qualifying_withdrawal_line_3
            - federal_2025_fhsa_designated_withdrawal_offset_line_12
          )

  - name: fhsa_deduction_line_20805
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 57 is the FHSA contributions deducted for 2025, not more than line 51, entered on line 20805
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            max(0, fhsa_deduction_claimed_for_2025),
            federal_2025_fhsa_maximum_deduction_available_line_51
          )

  - name: federal_2025_fhsa_unused_contributions_available_future_line_58
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 58 subtracts the 2025 FHSA deduction from line 56
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_fhsa_line_56 - fhsa_deduction_line_20805)

  - name: federal_2025_fhsa_qualifying_withdrawals_line_68960
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 15 2025 line 59 reports total qualifying withdrawals made in 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, fhsa_qualifying_withdrawals_2025_line_59)
