format: rulespec/v1
module:
  summary: |-
    CRA Form NS428 for 2025 calculates ordinary Nova Scotia resident tax:
    tax on taxable income, non-refundable tax credits, low-income tax
    reduction, political contribution tax credit, food bank tax credit for
    farmers, labour-sponsored venture capital tax credit, equity and
    innovation credits, age tax credit, and final tax entered on T1 line
    42800.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/ns428-resident-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form NS428 and Worksheet NS428 are the official 2025 Nova Scotia
        tax calculation documents for Nova Scotia residents. This module
        encodes ordinary resident NS428 arithmetic while leaving detailed
        dependant worksheet calculations, schedule eligibility, residency
        predicates, and component line values to dedicated modules or fact
        inputs.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-c/5003-c-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-c/5003-c-25e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-d/5003-d-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5003-d/5003-d-25e.pdf
rules:
  - name: ns428_2025_bracket_1_threshold
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 1 applies to taxable income of $30,507 or less
    versions:
      - effective_from: '2025-01-01'
        formula: 30507

  - name: ns428_2025_bracket_2_threshold
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 2 applies above $30,507 and not more than $61,015
    versions:
      - effective_from: '2025-01-01'
        formula: 61015

  - name: ns428_2025_bracket_3_threshold
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 3 applies above $61,015 and not more than $95,883
    versions:
      - effective_from: '2025-01-01'
        formula: 95883

  - name: ns428_2025_bracket_4_threshold
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 4 applies above $95,883 and not more than $154,650
    versions:
      - effective_from: '2025-01-01'
        formula: 154650

  - name: ns428_2025_bracket_1_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 Part A column 1 line 5 gives the rate as 8.79%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.0879

  - name: ns428_2025_bracket_2_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 Part A column 2 line 5 gives the rate as 14.95%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.1495

  - name: ns428_2025_bracket_3_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 Part A column 3 line 5 gives the rate as 16.67%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.1667

  - name: ns428_2025_bracket_4_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 Part A column 4 line 5 gives the rate as 17.5%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.175

  - name: ns428_2025_bracket_5_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 Part A column 5 line 5 gives the rate as 21%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.21

  - name: ns428_2025_bracket_2_base_tax
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 2 line 7 gives base tax of $2,681.57
    versions:
      - effective_from: '2025-01-01'
        formula: 2681.57

  - name: ns428_2025_bracket_3_base_tax
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 3 line 7 gives base tax of $7,242.51
    versions:
      - effective_from: '2025-01-01'
        formula: 7242.51

  - name: ns428_2025_bracket_4_base_tax
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 4 line 7 gives base tax of $13,055.01
    versions:
      - effective_from: '2025-01-01'
        formula: 13055.01

  - name: ns428_2025_bracket_5_base_tax
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 Part A column 5 line 7 gives base tax of $23,339.23
    versions:
      - effective_from: '2025-01-01'
        formula: 23339.23

  - name: ns428_2025_basic_personal_amount
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 9 and line 58040 basic personal amount is $11,744
    versions:
      - effective_from: '2025-01-01'
        formula: 11744

  - name: ns428_2025_age_amount_maximum
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 58080 maximum age amount is $5,734
    versions:
      - effective_from: '2025-01-01'
        formula: 5734

  - name: ns428_2025_age_amount_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NS428 2025 line 58080 starts reducing the age amount above $30,828
    versions:
      - effective_from: '2025-01-01'
        formula: 30828

  - name: ns428_2025_age_amount_zero_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NS428 2025 line 58080 gives zero age amount at $69,055 or more
    versions:
      - effective_from: '2025-01-01'
        formula: 69055

  - name: ns428_2025_age_amount_reduction_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NS428 2025 line 58080 uses a 15% age amount reduction rate
    versions:
      - effective_from: '2025-01-01'
        formula: 0.15

  - name: ns428_2025_spouse_or_dependant_base_amount
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 lines 11 and 14 use a base amount of $12,618
    versions:
      - effective_from: '2025-01-01'
        formula: 12618

  - name: ns428_2025_spouse_or_dependant_income_floor
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 lines 12 and 15 use the greater of $874 and net income
    versions:
      - effective_from: '2025-01-01'
        formula: 874

  - name: ns428_2025_spouse_or_dependant_maximum
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 lines 13 and 16 cap spouse and eligible dependant amounts at $11,744
    versions:
      - effective_from: '2025-01-01'
        formula: 11744

  - name: ns428_2025_young_child_monthly_amount
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 58230 multiplies eligible months by $100
    versions:
      - effective_from: '2025-01-01'
        formula: 100

  - name: ns428_2025_pension_income_amount_cap
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 58360 pension income amount maximum is $1,173
    versions:
      - effective_from: '2025-01-01'
        formula: 1173

  - name: ns428_2025_disability_amount_for_self
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 58440 disability amount for self is $7,341 unless the under-18 worksheet applies
    versions:
      - effective_from: '2025-01-01'
        formula: 7341

  - name: ns428_2025_medical_expense_income_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 40 gives the medical expense income rate as 3%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.03

  - name: ns428_2025_medical_expense_threshold_cap
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 42 uses the lesser of $1,637 and line 41
    versions:
      - effective_from: '2025-01-01'
        formula: 1637

  - name: ns428_2025_low_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 47 gives the Nova Scotia non-refundable tax credit rate as 8.79%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.0879

  - name: ns428_2025_high_donation_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 50 multiplies Schedule 9 line 14 by 21%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.21

  - name: ns428_2025_minimum_tax_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 lines 58 and 61 multiply minimum tax amounts by 57.5%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.575

  - name: ns428_2025_other_than_eligible_dividend_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NS428 2025 line 61520 multiplies line 12010 by 1.5%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.015

  - name: ns428_2025_eligible_dividend_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NS428 2025 line 61520 multiplies line 12000 minus line 12010 by 8.85%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.0885

  - name: ns428_2025_low_income_basic_reduction
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 61950 basic low-income tax reduction is $300
    versions:
      - effective_from: '2025-01-01'
        formula: 300

  - name: ns428_2025_low_income_spouse_or_dependant_reduction
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 lines 61970 and 61990 reductions are $300
    versions:
      - effective_from: '2025-01-01'
        formula: 300

  - name: ns428_2025_low_income_reduction_cap
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 74 caps the basic, spouse, and eligible dependant reductions at $600
    versions:
      - effective_from: '2025-01-01'
        formula: 600

  - name: ns428_2025_low_income_dependent_child_reduction
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 75 multiplies dependent children born in 2007 or later by $165
    versions:
      - effective_from: '2025-01-01'
        formula: 165

  - name: ns428_2025_low_income_reduction_base_income
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 80 low-income tax reduction base amount is $15,000
    versions:
      - effective_from: '2025-01-01'
        formula: 15000

  - name: ns428_2025_low_income_reduction_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 82 low-income tax reduction rate is 5%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.05

  - name: ns428_2025_political_contribution_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 86 multiplies political contributions by 75%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.75

  - name: ns428_2025_political_contribution_cap
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 86 caps political contribution tax credit at $750
    versions:
      - effective_from: '2025-01-01'
        formula: 750

  - name: ns428_2025_food_bank_farmers_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 88 multiplies qualifying food bank donations by 25%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.25

  - name: ns428_2025_labour_sponsored_venture_capital_rate
    kind: parameter
    dtype: Rate
    source: CRA NS428 2025 line 90 multiplies labour-sponsored venture capital share cost by 20%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.20

  - name: ns428_2025_labour_sponsored_venture_capital_cap
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 90 caps labour-sponsored venture capital tax credit at $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: 2000

  - name: ns428_2025_age_tax_credit
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 98 age tax credit is $1,000 when eligible
    versions:
      - effective_from: '2025-01-01'
        formula: 1000

  - name: ns428_2025_age_tax_credit_income_limit
    kind: parameter
    dtype: Money
    source: CRA NS428 2025 line 98 age tax credit requires taxable income less than $24,000
    versions:
      - effective_from: '2025-01-01'
        formula: 24000

  - name: ns428_tax_on_taxable_income_line_53
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 Part A line 53 calculates Nova Scotia tax on taxable income using the selected bracket column
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= ns428_2025_bracket_1_threshold:
            max(0, taxable_income_line_26000) * ns428_2025_bracket_1_rate
          else:
            if taxable_income_line_26000 <= ns428_2025_bracket_2_threshold:
              (taxable_income_line_26000 - ns428_2025_bracket_1_threshold) * ns428_2025_bracket_2_rate + ns428_2025_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= ns428_2025_bracket_3_threshold:
                (taxable_income_line_26000 - ns428_2025_bracket_2_threshold) * ns428_2025_bracket_3_rate + ns428_2025_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= ns428_2025_bracket_4_threshold:
                  (taxable_income_line_26000 - ns428_2025_bracket_3_threshold) * ns428_2025_bracket_4_rate + ns428_2025_bracket_4_base_tax
                else:
                  (taxable_income_line_26000 - ns428_2025_bracket_4_threshold) * ns428_2025_bracket_5_rate + ns428_2025_bracket_5_base_tax

  - name: ns428_age_amount_line_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Worksheet NS428 2025 line 58080 calculates the Nova Scotia age amount for persons born in 1960 or earlier
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if ns428_age_amount_eligible:
            if net_income_line_23600 <= ns428_2025_age_amount_threshold:
              ns428_2025_age_amount_maximum
            else:
              if net_income_line_23600 >= ns428_2025_age_amount_zero_threshold:
                0
              else:
                max(0, ns428_2025_age_amount_maximum - (net_income_line_23600 - ns428_2025_age_amount_threshold) * ns428_2025_age_amount_reduction_rate)
          else:
            0

  - name: ns428_spouse_or_partner_amount_line_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 13 subtracts the greater of $874 and spouse or common-law partner net income from the base amount and caps the claim
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_spouse_or_dependant_maximum, max(0, ns428_2025_spouse_or_dependant_base_amount - max(ns428_2025_spouse_or_dependant_income_floor, spouse_net_income_line_23600)))

  - name: ns428_eligible_dependant_amount_line_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 16 subtracts the greater of $874 and eligible dependant net income from the base amount and caps the claim
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_spouse_or_dependant_maximum, max(0, ns428_2025_spouse_or_dependant_base_amount - max(ns428_2025_spouse_or_dependant_income_floor, eligible_dependant_net_income_line_23600)))

  - name: ns428_young_children_amount_line_58230
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 58230 multiplies the total number of eligible months for young children by $100
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_young_children_eligible_months_line_58229) * ns428_2025_young_child_monthly_amount

  - name: ns428_credit_subtotal_line_19
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 19 adds lines 9 to 18
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_2025_basic_personal_amount + ns428_age_amount_line_58080 + ns428_spouse_or_partner_amount_line_58120 + ns428_eligible_dependant_amount_line_58160 + max(0, ns428_infirm_dependants_age_18_or_older_line_58200) + ns428_young_children_amount_line_58230

  - name: ns428_credit_subtotal_line_25
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 25 adds lines 21 to 24
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, cpp_qpp_contributions_employment_line_30800) + max(0, cpp_qpp_contributions_self_employment_line_31000) + max(0, employment_insurance_premiums_line_31200) + max(0, self_employment_ei_premiums_line_31217)

  - name: ns428_credit_subtotal_line_26
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 26 adds line 20 and line 25
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_credit_subtotal_line_19 + ns428_credit_subtotal_line_25

  - name: ns428_pension_income_amount_line_58360
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 58360 caps the pension income amount at $1,173
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_pension_income_amount_cap, max(0, pension_income_amount_line_58360))

  - name: ns428_credit_subtotal_line_29
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 29 adds lines 26 to 28
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_credit_subtotal_line_26 + ns428_pension_income_amount_line_58360 + max(0, caregiver_amount_line_58400)

  - name: ns428_credit_subtotal_line_32
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 32 adds lines 29 to 31
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_credit_subtotal_line_29 + max(0, disability_amount_for_self_line_58440) + max(0, disability_amount_transferred_from_dependant_line_58480)

  - name: ns428_credit_subtotal_line_37
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 37 adds lines 32 to 36
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_credit_subtotal_line_32 + max(0, student_loan_interest_line_58520) + max(0, tuition_and_education_amounts_line_58560) + max(0, tuition_and_education_amounts_transferred_line_58600) + max(0, spouse_or_partner_transfers_line_58640)

  - name: ns428_medical_expense_income_base_line_41
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 41 multiplies net income line 23600 by 3%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, net_income_line_23600) * ns428_2025_medical_expense_income_rate

  - name: ns428_medical_expense_threshold_line_42
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 42 uses the lesser of $1,637 and line 41
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_medical_expense_threshold_cap, ns428_medical_expense_income_base_line_41)

  - name: ns428_allowable_family_medical_expenses_line_43
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 43 subtracts line 42 from line 38 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, max(0, medical_expenses_line_58689) - ns428_medical_expense_threshold_line_42)

  - name: ns428_total_medical_expenses_line_58769
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 45 and line 58769 add line 43 and line 44
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_allowable_family_medical_expenses_line_43 + max(0, medical_expenses_other_dependants_line_58729)

  - name: ns428_total_claim_amount_line_58800
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 46 and line 58800 add line 37 and line 45
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_credit_subtotal_line_37 + ns428_total_medical_expenses_line_58769

  - name: ns428_net_non_refundable_tax_credits_line_58840
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 48 and line 58840 multiply line 46 by the 8.79% credit rate
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_total_claim_amount_line_58800 * ns428_2025_low_credit_rate

  - name: ns428_donations_and_gifts_line_58969
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 51 and line 58969 add low-rate and high-rate donations from federal Schedule 9
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_schedule_9_line_13_amount) * ns428_2025_low_credit_rate + max(0, federal_schedule_9_line_14_amount) * ns428_2025_high_donation_rate

  - name: ns428_total_non_refundable_tax_credits_line_61500
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 52 adds Nova Scotia net non-refundable tax credits and donations and gifts
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_net_non_refundable_tax_credits_line_58840 + ns428_donations_and_gifts_line_58969

  - name: ns428_tax_plus_tax_on_split_income_line_55
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 55 adds Nova Scotia tax on taxable income and tax on split income line 61510
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_tax_on_taxable_income_line_53 + max(0, nova_scotia_tax_on_split_income_line_61510)

  - name: ns428_dividend_tax_credit_line_61520
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Worksheet NS428 2025 line 61520 calculates the Nova Scotia dividend tax credit from line 12000 and line 12010
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, taxable_dividends_other_than_eligible_line_12010) * ns428_2025_other_than_eligible_dividend_credit_rate + max(0, taxable_dividends_line_12000 - max(0, taxable_dividends_other_than_eligible_line_12010)) * ns428_2025_eligible_dividend_credit_rate

  - name: ns428_minimum_tax_carryover_line_61540
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 58 and line 61540 multiply federal minimum tax carryover line 40427 by 57.5%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, minimum_tax_carryover_line_40427) * ns428_2025_minimum_tax_rate

  - name: ns428_credit_and_carryover_subtotal_line_59
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 59 adds lines 56 to 58
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_total_non_refundable_tax_credits_line_61500 + ns428_dividend_tax_credit_line_61520 + ns428_minimum_tax_carryover_line_61540

  - name: ns428_tax_after_credits_and_carryover_line_60
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 60 subtracts line 59 from line 55 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_plus_tax_on_split_income_line_55 - ns428_credit_and_carryover_subtotal_line_59)

  - name: ns428_additional_tax_for_minimum_tax_purposes_line_61
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 61 multiplies Form T691 Part 7 line 14 by 57.5%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, t691_part_7_line_14_amount) * ns428_2025_minimum_tax_rate

  - name: ns428_tax_after_additional_minimum_tax_line_62
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 62 adds line 60 and line 61
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_tax_after_credits_and_carryover_line_60 + ns428_additional_tax_for_minimum_tax_purposes_line_61

  - name: ns428_tax_after_foreign_tax_credit_line_64
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 64 subtracts the provincial foreign tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_additional_minimum_tax_line_62 - max(0, provincial_foreign_tax_credit_line_63))

  - name: ns428_adjusted_income_you_line_69
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 lines 65 to 69 calculate the taxpayer's adjusted income for low-income tax reduction
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, net_income_line_23600 + max(0, taxpayer_uccb_rdsp_repayments_line_66) - max(0, taxpayer_uccb_rdsp_income_line_68))

  - name: ns428_adjusted_income_spouse_line_69
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 lines 65 to 69 calculate the spouse or common-law partner adjusted income for low-income tax reduction
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, spouse_net_income_for_ns428_low_income_reduction_line_65 + max(0, spouse_uccb_rdsp_repayments_line_66) - max(0, spouse_uccb_rdsp_income_line_68))

  - name: ns428_adjusted_family_income_line_70
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 70 adds adjusted income columns for taxpayer and spouse or common-law partner
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_adjusted_income_you_line_69 + ns428_adjusted_income_spouse_line_69

  - name: ns428_low_income_spouse_reduction_line_61970
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 61970 allows a $300 spouse or common-law partner reduction when eligible
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if ns428_low_income_spouse_or_partner_reduction_eligible:
            ns428_2025_low_income_spouse_or_dependant_reduction
          else:
            0

  - name: ns428_low_income_eligible_dependant_reduction_line_61990
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 61990 allows a $300 eligible dependant reduction when claimed on line 58160
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if ns428_low_income_eligible_dependant_reduction_eligible:
            ns428_2025_low_income_spouse_or_dependant_reduction
          else:
            0

  - name: ns428_low_income_reduction_basic_subtotal_line_74
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 74 adds lines 71 to 73 and caps the subtotal at $600
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_low_income_reduction_cap, ns428_2025_low_income_basic_reduction + ns428_low_income_spouse_reduction_line_61970 + ns428_low_income_eligible_dependant_reduction_line_61990)

  - name: ns428_low_income_dependent_children_reduction_line_75
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 75 multiplies dependent children born in 2007 or later by $165
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_low_income_dependent_children_count_line_60999) * ns428_2025_low_income_dependent_child_reduction

  - name: ns428_low_income_reduction_subtotal_line_76
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 76 adds line 74 and line 75
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_low_income_reduction_basic_subtotal_line_74 + ns428_low_income_dependent_children_reduction_line_75

  - name: ns428_low_income_reduction_income_excess_line_81
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 81 subtracts the $15,000 base amount from adjusted family income and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_adjusted_family_income_line_70 - ns428_2025_low_income_reduction_base_income)

  - name: ns428_low_income_reduction_income_reduction_line_83
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 83 multiplies low-income reduction income excess by 5%
    versions:
      - effective_from: '2025-01-01'
        formula: ns428_low_income_reduction_income_excess_line_81 * ns428_2025_low_income_reduction_rate

  - name: ns428_low_income_tax_reduction_line_84
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 84 subtracts line 83 from line 78 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_low_income_reduction_subtotal_line_76 - ns428_low_income_reduction_income_reduction_line_83)

  - name: ns428_tax_after_low_income_reduction_line_85
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 85 subtracts the Nova Scotia low-income tax reduction and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_foreign_tax_credit_line_64 - ns428_low_income_tax_reduction_line_84)

  - name: ns428_political_contribution_tax_credit_line_86
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 86 multiplies political contributions by 75% and caps the credit at $750
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_political_contribution_cap, max(0, nova_scotia_political_contributions_line_62100) * ns428_2025_political_contribution_rate)

  - name: ns428_tax_after_political_contribution_credit_line_87
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 87 subtracts political contribution tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_low_income_reduction_line_85 - ns428_political_contribution_tax_credit_line_86)

  - name: ns428_food_bank_tax_credit_for_farmers_line_88
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 88 multiplies qualifying food bank donations by 25%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nova_scotia_food_bank_qualifying_donations_line_62150) * ns428_2025_food_bank_farmers_credit_rate

  - name: ns428_tax_after_food_bank_tax_credit_line_89
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 89 subtracts food bank tax credit for farmers and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_political_contribution_credit_line_87 - ns428_food_bank_tax_credit_for_farmers_line_88)

  - name: ns428_labour_sponsored_venture_capital_tax_credit_line_90
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 90 multiplies labour-sponsored venture capital share cost by 20% and caps the credit at $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: min(ns428_2025_labour_sponsored_venture_capital_cap, max(0, nova_scotia_labour_sponsored_venture_capital_share_cost_line_62180) * ns428_2025_labour_sponsored_venture_capital_rate)

  - name: ns428_tax_after_labour_sponsored_venture_capital_credit_line_91
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 91 subtracts labour-sponsored venture capital tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_food_bank_tax_credit_line_89 - ns428_labour_sponsored_venture_capital_tax_credit_line_90)

  - name: ns428_tax_after_equity_tax_credit_line_93
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 93 subtracts the equity tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_labour_sponsored_venture_capital_credit_line_91 - max(0, nova_scotia_equity_tax_credit_line_92))

  - name: ns428_tax_after_innovation_equity_tax_credit_line_95
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 95 subtracts the innovation equity tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_equity_tax_credit_line_93 - max(0, nova_scotia_innovation_equity_tax_credit_line_94))

  - name: ns428_tax_after_venture_capital_tax_credit_line_97
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 97 subtracts the venture capital tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_innovation_equity_tax_credit_line_95 - max(0, nova_scotia_venture_capital_tax_credit_line_96))

  - name: ns428_age_tax_credit_line_98
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 98 gives a $1,000 age tax credit if the taxpayer was born in 1959 or earlier and taxable income is less than $24,000
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if ns428_age_tax_credit_eligible and taxable_income_line_26000 < ns428_2025_age_tax_credit_income_limit:
            ns428_2025_age_tax_credit
          else:
            0

  - name: nova_scotia_tax_line_42800
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NS428 2025 line 99 subtracts the age tax credit and enters Nova Scotia tax on T1 line 42800
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ns428_tax_after_venture_capital_tax_credit_line_97 - ns428_age_tax_credit_line_98)
