format: rulespec/v1
module:
  summary: |-
    CRA Form NL479 for 2025 calculates Newfoundland and Labrador refundable
    credits: physical activity tax credit, research and development tax credit,
    and final credits entered on T1 line 47900.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/nl479-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Form NL479 is the official 2025 Newfoundland and Labrador credits calculation form.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5001-tc/5001-tc-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5001-tc/5001-tc-25e.pdf
rules:
  - name: nl479_2025_physical_activity_expense_cap
    kind: parameter
    dtype: Money
    source: CRA NL479 2025 line 3 caps net physical activity expenses at $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: 2000

  - name: nl479_2025_physical_activity_rate
    kind: parameter
    dtype: Rate
    source: CRA NL479 2025 line 6 gives the physical activity tax credit applicable rate as 17.4%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.174

  - name: nl479_physical_activity_net_expenses_line_3
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NL479 2025 line 3 subtracts assistance from total eligible physical activity expenses and caps the amount at $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: min(nl479_2025_physical_activity_expense_cap, max(0, nl479_physical_activity_total_eligible_expenses_line_1 - max(0, nl479_physical_activity_assistance_line_2)))

  - name: nl479_physical_activity_expenses_line_62000
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NL479 2025 line 5 subtracts the amount claimed by other eligible individuals from line 3
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nl479_physical_activity_net_expenses_line_3 - max(0, nl479_physical_activity_amount_claimed_by_other_individuals_line_4))

  - name: nl479_physical_activity_tax_credit_line_7
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NL479 2025 line 7 multiplies physical activity expenses by 17.4%
    versions:
      - effective_from: '2025-01-01'
        formula: nl479_physical_activity_expenses_line_62000 * nl479_2025_physical_activity_rate

  - name: newfoundland_and_labrador_credits_line_47900
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA NL479 2025 line 9 adds physical activity tax credit and Form T1129 research and development tax credit and enters the amount on T1 line 47900
    versions:
      - effective_from: '2025-01-01'
        formula: nl479_physical_activity_tax_credit_line_7 + max(0, nl479_research_and_development_tax_credit_t1129_line_6)
