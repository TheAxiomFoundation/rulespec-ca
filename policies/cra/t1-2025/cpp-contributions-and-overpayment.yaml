format: rulespec/v1
module:
  summary: |-
    CRA Schedule 8 for the 2025 T1 return calculates Canada Pension
    Plan contributions and overpayments for residents outside Quebec with
    no Quebec earned income. This module encodes the Schedule 8 monthly
    proration table, employment-only, self-employment-only, and mixed
    employment/self-employment contribution calculations.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/cpp-contributions-and-overpayment
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/canada-pension-plan
      rationale: |-
        CRA Schedule 8 is the official 2025 T1 return schedule for CPP
        contributions and overpayments for residents outside Quebec who
        have no Quebec earned income.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-s8/5000-s8-25e.pdf
rules:
  - name: federal_2025_schedule_8_employment_actual_base_share
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 3 line 9 multiplies actual base and first additional contributions by 83.1933%
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.831933

  - name: federal_2025_schedule_8_base_employee_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 3 line 11 uses a 4.95% base employee CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.0495

  - name: federal_2025_schedule_8_first_employee_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 3 line 12 uses a 1% first additional employee CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.01

  - name: federal_2025_schedule_8_second_employee_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 3 line 22 uses a 4% second additional employee CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.04

  - name: federal_2025_schedule_8_base_self_employed_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 4 line 10 uses a 9.9% self-employed base CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.099

  - name: federal_2025_schedule_8_first_self_employed_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 4 line 11 uses a 2% self-employed first additional CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.02

  - name: federal_2025_schedule_8_second_self_employed_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 4 line 12 uses an 8% self-employed second additional CPP rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.08

  - name: federal_2025_schedule_8_self_employed_base_credit_share
    kind: parameter
    dtype: Rate
    source: CRA Schedule 8 2025 Part 4 line 15 multiplies base self-employed CPP contributions by 50%
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.50

  - name: federal_2025_schedule_8_base_employee_maximum
    kind: parameter
    dtype: Money
    source: CRA Schedule 8 2025 Part 3 line 11 caps base employee CPP contributions at $3,356.10
    versions:
