  - name: federal_2025_schedule_8_months_line_a
    kind: derived
    entity: Person
    dtype: Number
    period: Year
    source: CRA Schedule 8 2025 Part 2 line A enters the number of months that CPP applied in 2025
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(federal_2025_schedule_8_maximum_months, max(0, cpp_contribution_months_line_a))

  - name: federal_2025_schedule_8_maximum_pensionable_earnings_line_b
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 2 line B uses the monthly proration table, maximum pensionable earnings $71,300 for 12 months
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if federal_2025_schedule_8_months_line_a <= 0:
            0
          else:
          if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_1:
              federal_2025_schedule_8_line_b_month_1
            else:
              if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_2:
                federal_2025_schedule_8_line_b_month_2
              else:
                if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_3:
                  federal_2025_schedule_8_line_b_month_3
                else:
                  if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_4:
                    federal_2025_schedule_8_line_b_month_4
                  else:
                    if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_5:
                      federal_2025_schedule_8_line_b_month_5
                    else:
                      if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_6:
                        federal_2025_schedule_8_line_b_month_6
                      else:
                        if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_7:
                          federal_2025_schedule_8_line_b_month_7
                        else:
                          if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_8:
                            federal_2025_schedule_8_line_b_month_8
                          else:
                            if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_9:
                              federal_2025_schedule_8_line_b_month_9
                            else:
                              if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_10:
                                federal_2025_schedule_8_line_b_month_10
                              else:
                                if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_11:
                                  federal_2025_schedule_8_line_b_month_11
                                else:
                                  federal_2025_schedule_8_line_b_month_12

  - name: federal_2025_schedule_8_second_additional_amount_line_c
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 2 line C uses the monthly proration table, maximum amount subject to second additional contributions $9,900 for 12 months
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_8_months_line_a * federal_2025_schedule_8_second_additional_amount_per_month

  - name: federal_2025_schedule_8_additional_maximum_pensionable_earnings_line_d
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 2 line D uses the monthly proration table, additional maximum pensionable earnings $81,200 for 12 months
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_8_maximum_pensionable_earnings_line_b
          + federal_2025_schedule_8_second_additional_amount_line_c

  - name: federal_2025_schedule_8_basic_exemption_line_e
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 2 line E uses the monthly proration table, maximum basic exemption $3,500 for 12 months
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if federal_2025_schedule_8_months_line_a <= 0:
            0
          else:
          if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_1:
              federal_2025_schedule_8_line_e_month_1
            else:
              if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_2:
                federal_2025_schedule_8_line_e_month_2
              else:
                if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_3:
                  federal_2025_schedule_8_line_e_month_3
                else:
                  if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_4:
                    federal_2025_schedule_8_line_e_month_4
                  else:
                    if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_5:
                      federal_2025_schedule_8_line_e_month_5
                    else:
                      if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_6:
                        federal_2025_schedule_8_line_e_month_6
                      else:
                        if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_7:
                          federal_2025_schedule_8_line_e_month_7
                        else:
                          if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_8:
                            federal_2025_schedule_8_line_e_month_8
                          else:
                            if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_9:
                              federal_2025_schedule_8_line_e_month_9
                            else:
                              if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_10:
                                federal_2025_schedule_8_line_e_month_10
                              else:
                                if federal_2025_schedule_8_months_line_a <= federal_2025_schedule_8_month_count_11:
                                  federal_2025_schedule_8_line_e_month_11
                                else:
                                  federal_2025_schedule_8_line_e_month_12

  - name: federal_2025_schedule_8_part3_total_cpp_pensionable_earnings_line_1
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 1 is total CPP pensionable earnings from T4 box 26, or box 14 if box 26 is blank
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, cpp_pensionable_earnings_from_t4_slips_line_50339)

  - name: federal_2025_schedule_8_part3_line_2
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 2 is the lesser of Part 2 line D and Part 3 line 1
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_schedule_8_additional_maximum_pensionable_earnings_line_d,
            federal_2025_schedule_8_part3_total_cpp_pensionable_earnings_line_1
          )

  - name: federal_2025_schedule_8_part3_second_additional_earnings_line_4
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 4 subtracts Part 2 line B from line 2 and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_schedule_8_part3_line_2 - federal_2025_schedule_8_maximum_pensionable_earnings_line_b)

  - name: federal_2025_schedule_8_part3_line_5
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 5 subtracts line 4 from line 2 and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_schedule_8_part3_line_2 - federal_2025_schedule_8_part3_second_additional_earnings_line_4)

  - name: federal_2025_schedule_8_part3_base_first_earnings_line_7
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 7 subtracts Part 2 line E from line 5 and floors at zero, maximum $67,800
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(federal_2025_schedule_8_base_first_earnings_maximum, max(0, federal_2025_schedule_8_part3_line_5 - federal_2025_schedule_8_basic_exemption_line_e))

  - name: federal_2025_schedule_8_part3_actual_base_first_contributions_line_8
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 8 2025 Part 3 line 8 is total actual base and first additional CPP contributions from T4 box 16
    versions:
      - effective_from: '2025-01-01'
