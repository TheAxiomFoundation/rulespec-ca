format: rulespec/v1
module:
  summary: |-
    CRA Form NT428 for 2025 calculates ordinary Northwest Territories resident
    tax: tax on taxable income, non-refundable tax credits, dividend and
    minimum tax adjustments, political contribution tax credit, and final tax
    entered on T1 line 42800.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/nt428-resident-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Form NT428 and Worksheet NT428 are the official 2025 Northwest Territories tax calculation documents for residents.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5012-c/5012-c-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5012-c/5012-c-25e.pdf
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5012-d/5012-d-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5012-d/5012-d-25e.pdf
rules:
  - name: nt428_2025_bracket_1_threshold
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 1 applies to taxable income of $51,964 or less
    versions:
      - effective_from: '2025-01-01'
        formula: 51964
  - name: nt428_2025_bracket_2_threshold
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 2 applies above $51,964 and not more than $103,930
    versions:
      - effective_from: '2025-01-01'
        formula: 103930
  - name: nt428_2025_bracket_3_threshold
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 3 applies above $103,930 and not more than $168,967
    versions:
      - effective_from: '2025-01-01'
        formula: 168967
  - name: nt428_2025_bracket_1_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 Part A column 1 line 5 gives the rate as 5.9%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.059
  - name: nt428_2025_bracket_2_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 Part A column 2 line 5 gives the rate as 8.6%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.086
  - name: nt428_2025_bracket_3_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 Part A column 3 line 5 gives the rate as 12.2%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.122
  - name: nt428_2025_bracket_4_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 Part A column 4 line 5 gives the rate as 14.05%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.1405
  - name: nt428_2025_bracket_2_base_tax
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 2 line 7 gives base tax of $3,065.88
    versions:
      - effective_from: '2025-01-01'
        formula: 3065.88
  - name: nt428_2025_bracket_3_base_tax
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 3 line 7 gives base tax of $7,534.95
    versions:
      - effective_from: '2025-01-01'
        formula: 7534.95
  - name: nt428_2025_bracket_4_base_tax
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 Part A column 4 line 7 gives base tax of $15,469.47
    versions:
      - effective_from: '2025-01-01'
        formula: 15469.47
  - name: nt428_2025_basic_personal_amount
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 line 58040 basic personal amount is $17,842
    versions:
      - effective_from: '2025-01-01'
        formula: 17842
  - name: nt428_2025_age_amount_maximum
    kind: parameter
    dtype: Money
    source: CRA Worksheet NT428 2025 line 58080 maximum age amount is $8,727
    versions:
      - effective_from: '2025-01-01'
        formula: 8727
  - name: nt428_2025_age_amount_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NT428 2025 line 58080 starts reducing the age amount above $45,522
    versions:
      - effective_from: '2025-01-01'
        formula: 45522
  - name: nt428_2025_age_amount_zero_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NT428 2025 line 58080 gives zero age amount at $103,702 or more
    versions:
      - effective_from: '2025-01-01'
        formula: 103702
  - name: nt428_2025_age_amount_reduction_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NT428 2025 line 58080 uses a 15% reduction rate
    versions:
      - effective_from: '2025-01-01'
        formula: 0.15
  - name: nt428_2025_spouse_or_dependant_base_amount
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 lines 11 and 14 use a base amount of $17,842
    versions:
      - effective_from: '2025-01-01'
        formula: 17842
  - name: nt428_2025_pension_income_amount_cap
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 line 58360 pension income amount maximum is $1,000
    versions:
      - effective_from: '2025-01-01'
        formula: 1000
  - name: nt428_2025_disability_amount_for_self
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 line 58440 disability amount for self is $14,469 unless the under-18 worksheet applies
    versions:
      - effective_from: '2025-01-01'
        formula: 14469
  - name: nt428_2025_medical_expense_income_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 line 39 gives the medical expense income rate as 3%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.03
  - name: nt428_2025_medical_expense_threshold_cap
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 line 41 uses the lesser of $2,834 and line 40
    versions:
      - effective_from: '2025-01-01'
        formula: 2834
  - name: nt428_2025_low_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 line 46 gives the Northwest Territories non-refundable tax credit rate as 5.9%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.059
  - name: nt428_2025_high_donation_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 line 49 multiplies Schedule 9 line 14 by 14.05%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.1405
  - name: nt428_2025_minimum_tax_rate
    kind: parameter
    dtype: Rate
    source: CRA NT428 2025 lines 57 and 60 multiply minimum tax amounts by 45%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.45
  - name: nt428_2025_other_than_eligible_dividend_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NT428 2025 line 61520 multiplies line 12010 by 6%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.06
  - name: nt428_2025_eligible_dividend_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NT428 2025 line 61520 multiplies line 12000 minus line 12010 by 11.5%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.115
  - name: nt428_2025_political_first_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NT428 2025 line 65 first political contribution threshold is $100
    versions:
      - effective_from: '2025-01-01'
        formula: 100
  - name: nt428_2025_political_cap_threshold
    kind: parameter
    dtype: Money
    source: CRA Worksheet NT428 2025 line 65 gives $500 for contributions of $900 or more
    versions:
      - effective_from: '2025-01-01'
        formula: 900
  - name: nt428_2025_political_cap
    kind: parameter
    dtype: Money
    source: CRA NT428 2025 line 65 maximum political contribution tax credit is $500
    versions:
      - effective_from: '2025-01-01'
        formula: 500
  - name: nt428_2025_political_middle_rate
    kind: parameter
    dtype: Rate
    source: CRA Worksheet NT428 2025 line 65 middle political contribution rate is 50%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.50

  - name: nt428_tax_on_taxable_income_line_52
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 Part A line 52 calculates Northwest Territories tax on taxable income using the selected bracket column
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= nt428_2025_bracket_1_threshold:
            max(0, taxable_income_line_26000) * nt428_2025_bracket_1_rate
          else:
            if taxable_income_line_26000 <= nt428_2025_bracket_2_threshold:
              (taxable_income_line_26000 - nt428_2025_bracket_1_threshold) * nt428_2025_bracket_2_rate + nt428_2025_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= nt428_2025_bracket_3_threshold:
                (taxable_income_line_26000 - nt428_2025_bracket_2_threshold) * nt428_2025_bracket_3_rate + nt428_2025_bracket_3_base_tax
              else:
                (taxable_income_line_26000 - nt428_2025_bracket_3_threshold) * nt428_2025_bracket_4_rate + nt428_2025_bracket_4_base_tax
  - name: nt428_age_amount_line_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Worksheet NT428 2025 line 58080 calculates the Northwest Territories age amount for persons born in 1960 or earlier
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if nt428_age_amount_eligible:
            if net_income_line_23600 <= nt428_2025_age_amount_threshold:
              nt428_2025_age_amount_maximum
            else:
              if net_income_line_23600 >= nt428_2025_age_amount_zero_threshold:
                0
              else:
                max(0, nt428_2025_age_amount_maximum - (net_income_line_23600 - nt428_2025_age_amount_threshold) * nt428_2025_age_amount_reduction_rate)
          else:
            0
  - name: nt428_spouse_or_partner_amount_line_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 13 subtracts spouse or common-law partner net income from the base amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt428_2025_spouse_or_dependant_base_amount - max(0, spouse_net_income_line_23600))
  - name: nt428_eligible_dependant_amount_line_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 16 subtracts eligible dependant net income from the base amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt428_2025_spouse_or_dependant_base_amount - max(0, eligible_dependant_net_income_line_23600))
  - name: nt428_credit_subtotal_line_18
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 18 adds lines 9, 10, 13, 16, and 17
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_2025_basic_personal_amount + nt428_age_amount_line_58080 + nt428_spouse_or_partner_amount_line_58120 + nt428_eligible_dependant_amount_line_58160 + max(0, nt428_infirm_dependants_age_18_or_older_line_58200)
  - name: nt428_credit_subtotal_line_23
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 23 adds lines 19 to 22
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, cpp_qpp_contributions_employment_line_30800) + max(0, cpp_qpp_contributions_self_employment_line_31000) + max(0, employment_insurance_premiums_line_31200) + max(0, self_employment_ei_premiums_line_31217)
  - name: nt428_credit_subtotal_line_24
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 24 adds line 18 and line 23
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_credit_subtotal_line_18 + nt428_credit_subtotal_line_23
  - name: nt428_pension_income_amount_line_58360
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 58360 caps the pension income amount at $1,000
    versions:
      - effective_from: '2025-01-01'
        formula: min(nt428_2025_pension_income_amount_cap, max(0, pension_income_amount_line_58360))
  - name: nt428_credit_subtotal_line_28
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 28 adds lines 25 to 27
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_credit_subtotal_line_24 + nt428_pension_income_amount_line_58360 + max(0, caregiver_amount_line_58400)
  - name: nt428_credit_subtotal_line_31
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 31 adds lines 28 to 30
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_credit_subtotal_line_28 + max(0, disability_amount_for_self_line_58440) + max(0, disability_amount_transferred_from_dependant_line_58480)
  - name: nt428_credit_subtotal_line_36
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 36 adds lines 31 to 35
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_credit_subtotal_line_31 + max(0, student_loan_interest_line_58520) + max(0, tuition_and_education_amounts_line_58560) + max(0, tuition_and_education_amounts_transferred_line_58600) + max(0, spouse_or_partner_transfers_line_58640)
  - name: nt428_medical_expense_income_base_line_40
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 40 multiplies net income line 23600 by 3%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, net_income_line_23600) * nt428_2025_medical_expense_income_rate
  - name: nt428_medical_expense_threshold_line_41
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 41 uses the lesser of $2,834 and line 40
    versions:
      - effective_from: '2025-01-01'
        formula: min(nt428_2025_medical_expense_threshold_cap, nt428_medical_expense_income_base_line_40)
  - name: nt428_allowable_family_medical_expenses_line_42
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 42 subtracts line 41 from line 37 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, max(0, medical_expenses_line_58689) - nt428_medical_expense_threshold_line_41)
  - name: nt428_total_medical_expenses_line_58769
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 44 and line 58769 add line 42 and line 43
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_allowable_family_medical_expenses_line_42 + max(0, medical_expenses_other_dependants_line_58729)
  - name: nt428_total_claim_amount_line_58800
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 45 and line 58800 add line 36 and line 44
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_credit_subtotal_line_36 + nt428_total_medical_expenses_line_58769
  - name: nt428_net_non_refundable_tax_credits_line_58840
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 47 and line 58840 multiply line 45 by the 5.9% credit rate
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_total_claim_amount_line_58800 * nt428_2025_low_credit_rate
  - name: nt428_donations_and_gifts_line_58969
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 50 and line 58969 add low-rate and high-rate donations from federal Schedule 9
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_schedule_9_line_13_amount) * nt428_2025_low_credit_rate + max(0, federal_schedule_9_line_14_amount) * nt428_2025_high_donation_rate
  - name: nt428_total_non_refundable_tax_credits_line_61500
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 51 adds Northwest Territories net non-refundable tax credits and donations and gifts
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_net_non_refundable_tax_credits_line_58840 + nt428_donations_and_gifts_line_58969
  - name: nt428_tax_plus_tax_on_split_income_line_54
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 54 adds Northwest Territories tax on taxable income and tax on split income line 61510
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_tax_on_taxable_income_line_52 + max(0, northwest_territories_tax_on_split_income_line_61510)
  - name: nt428_dividend_tax_credit_line_61520
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Worksheet NT428 2025 line 61520 calculates the Northwest Territories dividend tax credit from line 12000 and line 12010
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, taxable_dividends_other_than_eligible_line_12010) * nt428_2025_other_than_eligible_dividend_credit_rate + max(0, taxable_dividends_line_12000 - max(0, taxable_dividends_other_than_eligible_line_12010)) * nt428_2025_eligible_dividend_credit_rate
  - name: nt428_minimum_tax_carryover_line_61540
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 57 and line 61540 multiply federal minimum tax carryover line 40427 by 45%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, minimum_tax_carryover_line_40427) * nt428_2025_minimum_tax_rate
  - name: nt428_credit_and_carryover_subtotal_line_58
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 58 adds lines 55 to 57
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_total_non_refundable_tax_credits_line_61500 + nt428_dividend_tax_credit_line_61520 + nt428_minimum_tax_carryover_line_61540
  - name: nt428_tax_after_credits_and_carryover_line_59
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 59 subtracts line 58 from line 54 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt428_tax_plus_tax_on_split_income_line_54 - nt428_credit_and_carryover_subtotal_line_58)
  - name: nt428_additional_tax_for_minimum_tax_purposes_line_60
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 60 multiplies Form T691 Part 7 line 14 by 45%
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, t691_part_7_line_14_amount) * nt428_2025_minimum_tax_rate
  - name: nt428_tax_after_additional_minimum_tax_line_61
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 61 adds line 59 and line 60
    versions:
      - effective_from: '2025-01-01'
        formula: nt428_tax_after_credits_and_carryover_line_59 + nt428_additional_tax_for_minimum_tax_purposes_line_60
  - name: nt428_tax_after_foreign_tax_credit_line_63
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 63 subtracts the territorial foreign tax credit and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt428_tax_after_additional_minimum_tax_line_61 - max(0, territorial_foreign_tax_credit_line_62))
  - name: nt428_political_contribution_tax_credit_line_65
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Worksheet NT428 2025 line 65 calculates the political contribution tax credit capped at $500
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if northwest_territories_political_contributions_line_62550 <= nt428_2025_political_first_threshold:
            max(0, northwest_territories_political_contributions_line_62550)
          else:
            if northwest_territories_political_contributions_line_62550 >= nt428_2025_political_cap_threshold:
              nt428_2025_political_cap
            else:
              min(nt428_2025_political_cap, (northwest_territories_political_contributions_line_62550 - nt428_2025_political_first_threshold) * nt428_2025_political_middle_rate + nt428_2025_political_first_threshold)
  - name: northwest_territories_tax_line_42800
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA NT428 2025 line 66 subtracts the political contribution tax credit and enters Northwest Territories tax on T1 line 42800
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt428_tax_after_foreign_tax_credit_line_63 - nt428_political_contribution_tax_credit_line_65)
