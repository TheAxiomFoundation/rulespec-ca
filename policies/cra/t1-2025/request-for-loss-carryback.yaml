format: rulespec/v1
module:
  summary: |-
    CRA Form T1A for 2025 requests loss carrybacks to prior tax years.
    This module encodes the arithmetic surfaces for non-capital,
    farming/fishing, restricted farm, net capital, and listed personal
    property loss carrybacks and balances available for carryforward.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/request-for-loss-carryback
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: |-
        CRA Form T1A is the official 2025 form for requesting loss
        carrybacks from 2025 to the three previous tax years.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t1a/t1a-25e.pdf
rules:
  - name: federal_2025_t1a_income_after_deductions_amount_f
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount F subtracts amount E from amount D and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t1a_total_income_amount_d - max(0, t1a_listed_deductions_amount_e))

  - name: federal_2025_t1a_pre_farm_fishing_loss_amount_g
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount G subtracts amount F from amount C and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t1a_total_loss_amount_c - federal_2025_t1a_income_after_deductions_amount_f)

  - name: federal_2025_t1a_farming_fishing_loss_amount_j
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount J subtracts amount I from amount H and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t1a_farming_fishing_loss_amount_h - max(0, t1a_farming_fishing_income_amount_i))

  - name: federal_2025_t1a_farming_fishing_loss_available_amount_k
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount K is the lesser of amount G or amount J
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_pre_farm_fishing_loss_amount_g,
            federal_2025_t1a_farming_fishing_loss_amount_j
          )

  - name: federal_2025_t1a_non_capital_loss_available_amount_l
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount L subtracts amount K from amount G and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_pre_farm_fishing_loss_amount_g
            - federal_2025_t1a_farming_fishing_loss_available_amount_k
          )

  - name: federal_2025_t1a_non_capital_loss_applied_amount_m
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 amount M adds lines 66250, 66260, and 66270 and cannot be more than amount L
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_non_capital_loss_available_amount_l,
            max(0, non_capital_loss_to_2022_line_66250)
            + max(0, non_capital_loss_to_2023_line_66260)
            + max(0, non_capital_loss_to_2024_line_66270)
          )

  - name: federal_2025_t1a_non_capital_loss_available_for_carryforward
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 2 balance subtracts amount M from amount L
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_non_capital_loss_available_amount_l
            - federal_2025_t1a_non_capital_loss_applied_amount_m
          )

  - name: federal_2025_t1a_farming_fishing_loss_available_amount_n
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 3 amount N is farming or fishing loss available for carryback from amount K
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t1a_farming_fishing_loss_available_amount_k

  - name: federal_2025_t1a_farming_fishing_loss_applied_amount_o
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 3 amount O adds lines 66300, 66310, and 66320 and cannot be more than amount N
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_farming_fishing_loss_available_amount_n,
            max(0, farming_fishing_loss_to_2022_line_66300)
            + max(0, farming_fishing_loss_to_2023_line_66310)
            + max(0, farming_fishing_loss_to_2024_line_66320)
          )

  - name: federal_2025_t1a_farming_fishing_loss_available_for_carryforward
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 3 balance subtracts amount O from amount N
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_farming_fishing_loss_available_amount_n
            - federal_2025_t1a_farming_fishing_loss_applied_amount_o
          )

  - name: federal_2025_t1a_restricted_farm_loss_available_amount_p
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 4 amount P is restricted farm loss for the year available for carryback
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, restricted_farm_loss_available_amount_p)

  - name: federal_2025_t1a_restricted_farm_loss_applied_amount_q
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 4 amount Q adds lines 66480, 66490, and 66500 and cannot be more than amount P
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_restricted_farm_loss_available_amount_p,
            max(0, restricted_farm_loss_to_2022_line_66480)
            + max(0, restricted_farm_loss_to_2023_line_66490)
            + max(0, restricted_farm_loss_to_2024_line_66500)
          )

  - name: federal_2025_t1a_restricted_farm_loss_available_for_carryforward
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 4 balance subtracts amount Q from amount P
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_restricted_farm_loss_available_amount_p
            - federal_2025_t1a_restricted_farm_loss_applied_amount_q
          )

  - name: federal_2025_t1a_net_capital_loss_available_amount_r
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 5 amount R uses the 2025 net capital loss from Schedule 3 line 19900, or zero if there is a net capital gain
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, schedule_3_net_capital_loss_line_19900)

  - name: federal_2025_t1a_net_capital_loss_applied_amount_s
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 5 amount S adds lines 66360, 66370, and 66380 and cannot be more than amount R
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_net_capital_loss_available_amount_r,
            max(0, net_capital_loss_to_2022_line_66360)
            + max(0, net_capital_loss_to_2023_line_66370)
            + max(0, net_capital_loss_to_2024_line_66380)
          )

  - name: federal_2025_t1a_net_capital_loss_available_for_carryforward
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 5 balance subtracts amount S from amount R
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_net_capital_loss_available_amount_r
            - federal_2025_t1a_net_capital_loss_applied_amount_s
          )

  - name: federal_2025_t1a_lpp_loss_available_amount_t
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 6 amount T is listed personal property losses that exceed listed personal property gains for the year
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, listed_personal_property_loss_available_amount_t)

  - name: federal_2025_t1a_lpp_loss_applied_amount_u
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 6 amount U adds lines 66420, 66430, and 66440 and cannot be more than amount T
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1a_lpp_loss_available_amount_t,
            max(0, lpp_loss_to_2022_line_66420)
            + max(0, lpp_loss_to_2023_line_66430)
            + max(0, lpp_loss_to_2024_line_66440)
          )

  - name: federal_2025_t1a_lpp_loss_available_for_carryforward
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1A 2025 Part 6 balance subtracts amount U from amount T
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t1a_lpp_loss_available_amount_t
            - federal_2025_t1a_lpp_loss_applied_amount_u
          )
