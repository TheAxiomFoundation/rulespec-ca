format: rulespec/v1
module:
  summary: |-
    CRA Form T1212 for 2025 reports deferred security options benefits.
    This module encodes the income inclusion, closing deferred-benefit
    balance, and related 50% security options deduction surface.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/deferred-security-options-benefits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form T1212 is the official 2025 form for reporting deferred
        security options benefits.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t1212/t1212-25e.pdf
rules:
  - name: federal_2025_t1212_security_options_deduction_rate
    kind: parameter
    dtype: Rate
    source: CRA T1212 2025 note 1 says to enter 50% of line 2 on line 24900 for the security options deduction, encoded as 0.50
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.50

  - name: deferred_security_options_benefits_income_line_10100
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1212 2025 line 2 enters benefits that can no longer be deferred on line 10100
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            max(0, t1212_opening_balance_deferred_security_options_benefits_line_1),
            max(0, t1212_benefits_that_can_no_longer_be_deferred_line_2)
          )

  - name: deferred_security_options_closing_balance_line_65220
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1212 2025 line 3 subtracts line 2 from line 1 for the closing balance
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, t1212_opening_balance_deferred_security_options_benefits_line_1)
            - deferred_security_options_benefits_income_line_10100
          )

  - name: deferred_security_options_deduction_line_24900
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1212 2025 note 1 says to enter 50% of line 2 on line 24900
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          deferred_security_options_benefits_income_line_10100
          * federal_2025_t1212_security_options_deduction_rate
