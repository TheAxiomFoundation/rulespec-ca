format: rulespec/v1
module:
  summary: |-
    CRA Form SK479 for 2025 calculates the Saskatchewan credit: active
    families benefit, fertility treatment tax credit, and final Saskatchewan
    credits entered on T1 line 47900.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/sk479-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: CRA Form SK479 is the official 2025 Saskatchewan credit calculation form.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5008-tc/5008-tc-25e.txt
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5008-tc/5008-tc-25e.pdf
rules:
  - name: sk479_2025_active_families_income_threshold
    kind: parameter
    dtype: Money
    source: CRA SK479 2025 says the active families benefit is available when adjusted family income is $120,000 or less
    versions:
      - effective_from: '2025-01-01'
        formula: 120000

  - name: sk479_2025_active_families_regular_child_cap
    kind: parameter
    dtype: Money
    source: CRA SK479 2025 active families benefit worksheet caps a child without disability tax credit eligibility at $300
    versions:
      - effective_from: '2025-01-01'
        formula: 300

  - name: sk479_2025_active_families_dtc_child_cap
    kind: parameter
    dtype: Money
    source: CRA SK479 2025 active families benefit worksheet caps a child eligible for the disability tax credit at $400
    versions:
      - effective_from: '2025-01-01'
        formula: 400

  - name: sk479_2025_fertility_treatment_rate
    kind: parameter
    dtype: Rate
    source: CRA SK479 2025 line 9 multiplies eligible fertility treatment expenses by 50%
    versions:
      - effective_from: '2025-01-01'
        formula: 0.50

  - name: sk479_2025_fertility_treatment_credit_cap
    kind: parameter
    dtype: Money
    source: CRA SK479 2025 line 9 caps the fertility treatment tax credit at $10,000
    versions:
      - effective_from: '2025-01-01'
        formula: 10000

  - name: sk479_self_adjusted_family_income_line_5
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 lines 1 to 5 add UCCB and RDSP repayments, subtract UCCB and RDSP income, and floor negative amounts at zero for the taxpayer
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            sk479_self_net_income_line_23600
            + max(0, sk479_self_uccb_rdsp_repayments_line_2)
            - max(0, sk479_self_uccb_rdsp_income_line_4)
          )

  - name: sk479_spouse_adjusted_family_income_line_5
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 lines 1 to 5 apply the adjusted family income calculation to the spouse or common-law partner
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            sk479_spouse_net_income_line_23600
            + max(0, sk479_spouse_uccb_rdsp_repayments_line_2)
            - max(0, sk479_spouse_uccb_rdsp_income_line_4)
          )

  - name: sk479_adjusted_family_income_line_6
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 line 6 adds the taxpayer and spouse line 5 amounts for adjusted family income
    versions:
      - effective_from: '2025-01-01'
        formula: sk479_self_adjusted_family_income_line_5 + sk479_spouse_adjusted_family_income_line_5

  - name: sk479_active_families_regular_children_column_5_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 active families benefit worksheet column 5 caps each non-DTC eligible child at $300 after reimbursements
    versions:
      - effective_from: '2025-01-01'
        formula: min(max(0, sk479_active_families_regular_child_count) * sk479_2025_active_families_regular_child_cap, max(0, sk479_active_families_regular_children_net_eligible_activity_expenses))

  - name: sk479_active_families_dtc_children_column_5_amount
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 active families benefit worksheet column 5 caps each disability-tax-credit eligible child at $400 after reimbursements
    versions:
      - effective_from: '2025-01-01'
        formula: min(max(0, sk479_active_families_dtc_child_count) * sk479_2025_active_families_dtc_child_cap, max(0, sk479_active_families_dtc_children_net_eligible_activity_expenses))

  - name: sk479_active_families_benefit_worksheet_line_7
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 active families benefit worksheet line 7 adds the column 5 amounts
    versions:
      - effective_from: '2025-01-01'
        formula: sk479_active_families_regular_children_column_5_amount + sk479_active_families_dtc_children_column_5_amount

  - name: sk479_active_families_benefit_line_59800
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 line 8 and line 59800 give zero if adjusted family income is more than $120,000, otherwise line 7
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if sk479_adjusted_family_income_line_6 > sk479_2025_active_families_income_threshold:
            0
          else:
            sk479_active_families_benefit_worksheet_line_7

  - name: sk479_fertility_treatment_tax_credit_line_61268
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA SK479 2025 line 9 multiplies eligible medical expenses for fertility treatment by 50% and caps the credit at $10,000
    versions:
      - effective_from: '2025-01-01'
        formula: min(sk479_2025_fertility_treatment_credit_cap, max(0, sk479_fertility_treatment_medical_expenses_line_61268) * sk479_2025_fertility_treatment_rate)

  - name: saskatchewan_credits_line_47900
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA SK479 2025 line 10 adds line 8 and line 9 and enters the result on T1 line 47900
    versions:
      - effective_from: '2025-01-01'
        formula: sk479_active_families_benefit_line_59800 + sk479_fertility_treatment_tax_credit_line_61268
