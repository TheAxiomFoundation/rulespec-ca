  - name: federal_2025_t2203_ns_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ line 9 is Nova Scotia tax on taxable income from the bracket table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_ns_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_ns_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_ns_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_ns_bracket_1_threshold)
              * federal_2025_t2203_ns_bracket_2_rate
              + federal_2025_t2203_ns_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_ns_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_ns_bracket_2_threshold)
                * federal_2025_t2203_ns_bracket_3_rate
                + federal_2025_t2203_ns_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_ns_bracket_4_threshold:
                  (taxable_income_line_26000 - federal_2025_t2203_ns_bracket_3_threshold)
                  * federal_2025_t2203_ns_bracket_4_rate
                  + federal_2025_t2203_ns_bracket_4_base_tax
                else:
                  (taxable_income_line_26000 - federal_2025_t2203_ns_bracket_4_threshold)
                  * federal_2025_t2203_ns_bracket_5_rate
                  + federal_2025_t2203_ns_bracket_5_base_tax

  - name: federal_2025_t2203_ns_tax_after_non_refundable_credits_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ lines 11 to 16 add tax on split income, subtract non-refundable credits, dividend credit, and minimum tax carryover, and floor at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_ns_tax_on_taxable_income_line_9
            + max(0, ns_unallocated_tax_on_split_income_t1206_line_10)
            - (
              max(0, ns_non_refundable_tax_credits_part_3_line_d)
              + max(0, ns_dividend_tax_credit_line_13)
              + max(0, minimum_tax_carryover_line_40427)
              * federal_2025_t2203_ns_minimum_tax_rate
            )
          )

  - name: federal_2025_t2203_ns_tax_allocated_line_20
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ line 20 multiplies line 18 by the percentage of income allocated to NS
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_ns_tax_after_non_refundable_credits_line_16
            + max(0, t691_part_7_line_14)
            * federal_2025_t2203_ns_minimum_tax_rate
          ) * max(0, t2203_nova_scotia_income_allocation_percentage)

  - name: federal_2025_t2203_ns_adjusted_income_tax_line_28
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ line 28 subtracts the resident adjustment from allocated tax and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_nova_scotia:
            max(
              0,
              federal_2025_t2203_ns_tax_allocated_line_20
              - (
                max(0, ns_resident_adjustment_credit_base_lines_58230_58360)
                * federal_2025_t2203_ns_bracket_1_rate
                + max(0, ns_dividend_tax_credit_line_13)
              ) * max(0, 1 - max(0, t2203_nova_scotia_income_allocation_percentage))
            )
          else:
            federal_2025_t2203_ns_tax_allocated_line_20

  - name: federal_2025_t2203_ns_tax_after_foreign_credit_and_recapture_line_33
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ lines 31 to 33 subtract provincial foreign tax credit and add R&D tax credit recapture
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_ns_adjusted_income_tax_line_28
            - max(0, ns_provincial_foreign_tax_credit_t2036_line_30)
          ) + max(0, ns_research_and_development_tax_credit_recapture_line_52480)

  - name: federal_2025_t2203_ns_adjusted_family_income_line_39
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ lines 34 to 39 calculate adjusted family income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, ns_taxpayer_net_income_line_23600 + max(0, ns_taxpayer_uccb_and_rdsp_repayments) - max(0, ns_taxpayer_uccb_and_rdsp_income))
          + max(0, ns_spouse_net_income_line_23600 + max(0, ns_spouse_uccb_and_rdsp_repayments) - max(0, ns_spouse_uccb_and_rdsp_income))

  - name: federal_2025_t2203_ns_low_income_reduction_line_52
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ lines 41 to 52 calculate the Nova Scotia low-income tax reduction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_nova_scotia:
            max(
              0,
              min(
                federal_2025_t2203_ns_low_income_maximum_reduction,
                federal_2025_t2203_ns_low_income_basic_reduction
                + (if ns_claims_spouse_low_income_reduction:
                    federal_2025_t2203_ns_low_income_spouse_reduction
                  else:
                    0)
                + (if ns_claims_eligible_dependant_low_income_reduction:
                    federal_2025_t2203_ns_low_income_dependant_reduction
                  else:
                    0)
              )
              + max(0, ns_number_of_dependent_children_for_low_income_reduction)
              * federal_2025_t2203_ns_low_income_child_reduction
              - max(
                0,
                federal_2025_t2203_ns_adjusted_family_income_line_39
                - federal_2025_t2203_ns_low_income_threshold
              ) * federal_2025_t2203_ns_low_income_reduction_rate
            )
          else:
            0

  - name: federal_2025_t2203_ns_tax_after_low_income_reduction_line_53
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ line 53 subtracts the low-income tax reduction from line 40 and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_ns_tax_after_foreign_credit_and_recapture_line_33
            - federal_2025_t2203_ns_low_income_reduction_line_52
          )

  - name: t2203_nova_scotia_tax_part_5_line_3
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NS428MJ line 68 subtracts Nova Scotia credits and enters Nova Scotia tax on Part 5 line 3
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(
              0,
              max(
                0,
                max(
                  0,
                  max(
                    0,
                    federal_2025_t2203_ns_tax_after_low_income_reduction_line_53
                    - min(
                      federal_2025_t2203_ns_political_credit_cap,
                      max(0, ns_political_contributions_line_62100)
                      * federal_2025_t2203_ns_political_credit_rate
                    )
                  ) - max(0, ns_food_bank_qualifying_donations_line_62150)
                  * federal_2025_t2203_ns_food_bank_credit_rate
                ) - min(
                  federal_2025_t2203_ns_labour_sponsored_cap,
                  max(0, ns_labour_sponsored_venture_capital_cost)
                  * federal_2025_t2203_ns_labour_sponsored_rate
                )
              ) - max(0, ns_equity_tax_credit_t1285_line_61)
            ) - max(0, ns_innovation_equity_tax_credit_t225_line_63)
            - max(0, ns_venture_capital_tax_credit_t224_line_65)
            - (if ns_age_tax_credit_eligible:
                federal_2025_t2203_ns_age_tax_credit
              else:
                0)
          )

  - name: federal_2025_t2203_nb_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ line 9 is New Brunswick tax on taxable income from the bracket table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_nb_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_nb_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_nb_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_nb_bracket_1_threshold)
              * federal_2025_t2203_nb_bracket_2_rate
              + federal_2025_t2203_nb_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_nb_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_nb_bracket_2_threshold)
                * federal_2025_t2203_nb_bracket_3_rate
                + federal_2025_t2203_nb_bracket_3_base_tax
              else:
                (taxable_income_line_26000 - federal_2025_t2203_nb_bracket_3_threshold)
                * federal_2025_t2203_nb_bracket_4_rate
                + federal_2025_t2203_nb_bracket_4_base_tax

  - name: federal_2025_t2203_nb_tax_after_non_refundable_credits_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ lines 11 to 16 add tax on split income, subtract non-refundable credits, dividend credit, and minimum tax carryover, and floor at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_nb_tax_on_taxable_income_line_9
            + max(0, nb_unallocated_tax_on_split_income_t1206_line_10)
            - (
              max(0, nb_non_refundable_tax_credits_part_3_line_d)
              + max(0, nb_dividend_tax_credit_line_13)
              + max(0, minimum_tax_carryover_line_40427)
              * federal_2025_t2203_nb_minimum_tax_rate
            )
          )

  - name: federal_2025_t2203_nb_tax_allocated_line_20
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ line 20 multiplies line 18 by the percentage of income allocated to NB
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_nb_tax_after_non_refundable_credits_line_16
            + max(0, nb_t691_part_7_line_1_minus_line_2)
            * federal_2025_t2203_nb_minimum_tax_rate
          ) * max(0, t2203_new_brunswick_income_allocation_percentage)

  - name: federal_2025_t2203_nb_adjusted_income_tax_line_28
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ line 28 subtracts the resident adjustment from allocated tax and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_new_brunswick:
            max(
              0,
              federal_2025_t2203_nb_tax_allocated_line_20
              - (
                max(0, nb_resident_adjustment_credit_base_line_58360)
                * federal_2025_t2203_nb_bracket_1_rate
                + max(0, nb_dividend_tax_credit_line_13)
              ) * max(0, 1 - max(0, t2203_new_brunswick_income_allocation_percentage))
            )
          else:
            federal_2025_t2203_nb_tax_allocated_line_20

  - name: federal_2025_t2203_nb_tax_after_foreign_credit_line_30
    kind: derived
    entity: Person
    dtype: Money
