format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 for 2025 includes Form NS428MJ and Form NB428MJ for
    Nova Scotia and New Brunswick multiple-jurisdiction tax. This module
    encodes their Part 4 bracket tax, proration, resident adjustments,
    low-income reductions, selected credits, and final Part 5 tax lines.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/t2203-nova-scotia-new-brunswick-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form T2203 is the official 2025 form for provincial and
        territorial taxes for multiple jurisdictions, including NS428MJ and
        NB428MJ.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
