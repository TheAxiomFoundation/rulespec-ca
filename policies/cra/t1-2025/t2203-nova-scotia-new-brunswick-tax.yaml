            federal_2025_t2203_nb_adjusted_income_tax_line_28
            - max(0, nb_provincial_foreign_tax_credit_t2036_line_29)
          )

  - name: federal_2025_t2203_nb_adjusted_family_income_line_39
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ lines 34 to 39 calculate adjusted family income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, nb_taxpayer_net_income_line_23600 + max(0, nb_taxpayer_uccb_and_rdsp_repayments) - max(0, nb_taxpayer_uccb_and_rdsp_income))
          + max(0, nb_spouse_net_income_line_23600 + max(0, nb_spouse_uccb_and_rdsp_repayments) - max(0, nb_spouse_uccb_and_rdsp_income))

  - name: federal_2025_t2203_nb_low_income_reduction_line_50
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ lines 41 to 50 calculate New Brunswick low-income tax reduction if eligibility thresholds are met
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if nb_claimed_unused_low_income_reduction_from_spouse:
            0
          else:
            if (
              nb_claims_spouse_low_income_reduction
              or nb_claims_eligible_dependant_low_income_reduction
            ) and federal_2025_t2203_nb_adjusted_family_income_line_39 < federal_2025_t2203_nb_low_income_family_eligibility_threshold:
              max(
                0,
                min(
                  federal_2025_t2203_nb_low_income_maximum_reduction,
                  federal_2025_t2203_nb_low_income_basic_reduction
                  + (if nb_claims_spouse_low_income_reduction:
                      federal_2025_t2203_nb_low_income_spouse_reduction
                    else:
                      0)
                  + (if nb_claims_eligible_dependant_low_income_reduction:
                      federal_2025_t2203_nb_low_income_dependant_reduction
                    else:
                      0)
                )
                - max(
                  0,
                  federal_2025_t2203_nb_adjusted_family_income_line_39
                  - federal_2025_t2203_nb_low_income_threshold
                ) * federal_2025_t2203_nb_low_income_reduction_rate
              )
            else:
              if nb_taxpayer_net_income_line_23600 < federal_2025_t2203_nb_low_income_single_eligibility_threshold:
                max(
                  0,
                  federal_2025_t2203_nb_low_income_basic_reduction
                  - max(
                    0,
                    federal_2025_t2203_nb_adjusted_family_income_line_39
                    - federal_2025_t2203_nb_low_income_threshold
                  ) * federal_2025_t2203_nb_low_income_reduction_rate
                )
              else:
                0

  - name: federal_2025_t2203_nb_tax_after_low_income_reduction_line_52
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NB428MJ lines 32 to 52 subtract unused spouse low-income reduction or calculated low-income reduction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if nb_claimed_unused_low_income_reduction_from_spouse:
            max(
              0,
              federal_2025_t2203_nb_tax_after_foreign_credit_line_30
              - max(0, nb_unused_low_income_reduction_from_spouse_line_32)
            )
          else:
            max(
              0,
              federal_2025_t2203_nb_tax_after_foreign_credit_line_30
              - federal_2025_t2203_nb_low_income_reduction_line_50
            )

