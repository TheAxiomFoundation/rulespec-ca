format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 for 2025 includes YT428MJ, NT428MJ, and NU428MJ for
    Yukon, Northwest Territories, and Nunavut multiple-jurisdiction tax.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/t2203-yukon-northwest-territories-nunavut-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: CRA Form T2203 is the official 2025 form for territorial multiple-jurisdiction taxes.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
