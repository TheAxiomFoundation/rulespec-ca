  - name: federal_2025_t2203_yt_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 YT428MJ line 9 is Yukon tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_yt_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_yt_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_yt_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_yt_bracket_1_threshold) * federal_2025_t2203_yt_bracket_2_rate + federal_2025_t2203_yt_bracket_2_base_tax
            else:
              (taxable_income_line_26000 - federal_2025_t2203_yt_bracket_2_threshold) * federal_2025_t2203_yt_bracket_3_rate + federal_2025_t2203_yt_bracket_3_base_tax
  - name: federal_2025_t2203_yt_adjusted_income_tax_line_30
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 YT428MJ lines 10 to 30 calculate adjusted Yukon income tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            (
              max(
                0,
                federal_2025_t2203_yt_tax_on_taxable_income_line_9
                + max(0, yt_unallocated_tax_on_split_income_t1206_line_10)
                - (
                  max(0, yt_non_refundable_tax_credits_part_3_line_d)
                  + max(0, yt_dividend_tax_credit_line_13)
                  + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_yt_minimum_tax_carryover_rate
                )
              ) + max(0, yt_t691_part_7_line_14) * federal_2025_t2203_yt_additional_minimum_tax_rate
            ) * max(0, t2203_yukon_income_allocation_percentage)
            - (if t2203_resident_of_yukon:
                (
                  max(0, yt_resident_adjustment_credit_base_lines_58189_58310_58326_58330_58360)
                  * federal_2025_t2203_yt_bracket_1_rate
                  + max(0, yt_dividend_tax_credit_line_13)
                ) * max(0, 1 - max(0, t2203_yukon_income_allocation_percentage))
              else:
                0)
            - max(0, yt_territorial_foreign_tax_credit_t2036_line_29)
          )
  - name: t2203_yukon_tax_part_5_line_10
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 YT428MJ lines 31 to 48 subtract selected credits and enter Yukon tax on Part 5 line 10
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_yt_adjusted_income_tax_line_30
            - min(
              federal_2025_t2203_yt_business_investment_cap,
              max(0, yt_business_investment_tax_credit_certificate_line_32)
              + max(0, yt_unused_business_investment_tax_credit_line_33)
            )
            - max(0, yt_first_nations_income_tax_credit_yt432_line_44)
            - max(0, yt_political_contribution_tax_credit_line_47)
          )
  - name: federal_2025_t2203_nt_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT428MJ line 9 is Northwest Territories tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_nt_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_nt_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_nt_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_nt_bracket_1_threshold) * federal_2025_t2203_nt_bracket_2_rate + federal_2025_t2203_nt_bracket_2_base_tax
            else:
              (taxable_income_line_26000 - federal_2025_t2203_nt_bracket_2_threshold) * federal_2025_t2203_nt_bracket_3_rate + federal_2025_t2203_nt_bracket_3_base_tax
  - name: federal_2025_t2203_nt_adjusted_income_tax_line_30
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT428MJ lines 10 to 30 calculate adjusted Northwest Territories income tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            (
              max(
                0,
                federal_2025_t2203_nt_tax_on_taxable_income_line_9
                + max(0, nt_unallocated_tax_on_split_income_t1206_line_10)
                - (
                  max(0, nt_non_refundable_tax_credits_part_3_line_d)
                  + max(0, nt_dividend_tax_credit_line_13)
                  + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_nt_minimum_tax_rate
                )
              ) + max(0, nt_t691_part_7_line_14) * federal_2025_t2203_nt_minimum_tax_rate
            ) * max(0, t2203_northwest_territories_income_allocation_percentage)
            - (if t2203_resident_of_northwest_territories:
                (
                  max(0, nt_resident_adjustment_credit_base_line_58360)
                  * federal_2025_t2203_nt_bracket_1_rate
                  + max(0, nt_dividend_tax_credit_line_13)
                ) * max(0, 1 - max(0, t2203_northwest_territories_income_allocation_percentage))
              else:
                0)
            - max(0, nt_territorial_foreign_tax_credit_t2036_line_29)
          )
  - name: t2203_northwest_territories_tax_part_5_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT428MJ line 33 subtracts political contribution credit and enters Northwest Territories tax on Part 5 line 11
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nt_adjusted_income_tax_line_30 - max(0, nt_political_contribution_tax_credit_line_32))
  - name: federal_2025_t2203_nu_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU428MJ line 9 is Nunavut tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_nu_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_nu_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_nu_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_nu_bracket_1_threshold) * federal_2025_t2203_nu_bracket_2_rate + federal_2025_t2203_nu_bracket_2_base_tax
            else:
              (taxable_income_line_26000 - federal_2025_t2203_nu_bracket_2_threshold) * federal_2025_t2203_nu_bracket_3_rate + federal_2025_t2203_nu_bracket_3_base_tax
  - name: federal_2025_t2203_nu_adjusted_income_tax_line_30
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU428MJ lines 10 to 30 calculate adjusted Nunavut income tax
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            (
              max(
                0,
                federal_2025_t2203_nu_tax_on_taxable_income_line_9
                + max(0, nu_unallocated_tax_on_split_income_t1206_line_10)
                - (
                  max(0, nu_non_refundable_tax_credits_part_3_line_d)
                  + max(0, nu_dividend_tax_credit_line_13)
                  + max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_nu_minimum_tax_rate
                )
              ) + max(0, nu_t691_part_7_line_14) * federal_2025_t2203_nu_minimum_tax_rate
            ) * max(0, t2203_nunavut_income_allocation_percentage)
            - (if t2203_resident_of_nunavut:
                (
                  max(0, nu_resident_adjustment_credit_base_lines_58230_58360)
                  * federal_2025_t2203_nu_bracket_1_rate
                  + max(0, nu_dividend_tax_credit_line_13)
                ) * max(0, 1 - max(0, t2203_nunavut_income_allocation_percentage))
              else:
                0)
            - max(0, nu_territorial_foreign_tax_credit_t2036_line_29)
          )
  - name: t2203_nunavut_tax_part_5_line_12
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU428MJ line 32 subtracts volunteer credit and enters Nunavut tax on Part 5 line 12
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_nu_adjusted_income_tax_line_30
            - (if nu_claims_volunteer_firefighters_or_search_and_rescue_credit:
                federal_2025_t2203_nu_volunteer_credit
              else:
                0)
          )
