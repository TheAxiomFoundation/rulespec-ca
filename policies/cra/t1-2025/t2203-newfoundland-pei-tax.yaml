  - name: federal_2025_t2203_nl_tax_on_taxable_income_line_16
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ line 16 is Newfoundland and Labrador tax on taxable income from the bracket table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_nl_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_1_threshold)
              * federal_2025_t2203_nl_bracket_2_rate
              + federal_2025_t2203_nl_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_2_threshold)
                * federal_2025_t2203_nl_bracket_3_rate
                + federal_2025_t2203_nl_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_4_threshold:
                  (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_3_threshold)
                  * federal_2025_t2203_nl_bracket_4_rate
                  + federal_2025_t2203_nl_bracket_4_base_tax
                else:
                  if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_5_threshold:
                    (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_4_threshold)
                    * federal_2025_t2203_nl_bracket_5_rate
                    + federal_2025_t2203_nl_bracket_5_base_tax
                  else:
                    if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_6_threshold:
                      (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_5_threshold)
                      * federal_2025_t2203_nl_bracket_6_rate
                      + federal_2025_t2203_nl_bracket_6_base_tax
                    else:
                      if taxable_income_line_26000 <= federal_2025_t2203_nl_bracket_7_threshold:
                        (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_6_threshold)
                        * federal_2025_t2203_nl_bracket_7_rate
                        + federal_2025_t2203_nl_bracket_7_base_tax
                      else:
                        (taxable_income_line_26000 - federal_2025_t2203_nl_bracket_7_threshold)
                        * federal_2025_t2203_nl_bracket_8_rate
                        + federal_2025_t2203_nl_bracket_8_base_tax

  - name: federal_2025_t2203_nl_tax_after_non_refundable_credits_line_23
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ lines 18 to 23 add tax on split income, subtract non-refundable credits, dividend credit, and minimum tax carryover, and floor at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_nl_tax_on_taxable_income_line_16
            + max(0, nl_unallocated_tax_on_split_income_t1206_line_17)
            - (
              max(0, nl_non_refundable_tax_credits_part_3_line_d)
              + max(0, nl_dividend_tax_credit_line_20)
              + max(0, minimum_tax_carryover_line_40427)
              * federal_2025_t2203_nl_minimum_tax_rate
            )
          )

  - name: federal_2025_t2203_nl_tax_allocated_line_27
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ line 27 multiplies line 25 by the percentage of income allocated to NL
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_nl_tax_after_non_refundable_credits_line_23
            + max(0, t691_part_7_line_14)
            * federal_2025_t2203_nl_minimum_tax_rate
          ) * max(0, t2203_newfoundland_and_labrador_income_allocation_percentage)

  - name: federal_2025_t2203_nl_adjusted_income_tax_line_36
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ line 36 subtracts the resident adjustment from allocated tax and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_newfoundland_and_labrador:
            max(
              0,
              federal_2025_t2203_nl_tax_allocated_line_27
              - (
                max(0, nl_resident_adjustment_credit_base_lines_58315_58316_58320_58330_58360)
                * federal_2025_t2203_nl_bracket_1_rate
                + max(0, nl_dividend_tax_credit_line_20)
              ) * max(0, 1 - max(0, t2203_newfoundland_and_labrador_income_allocation_percentage))
            )
          else:
            federal_2025_t2203_nl_tax_allocated_line_27

  - name: federal_2025_t2203_nl_tax_after_foreign_credit_line_38
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ line 38 subtracts provincial foreign tax credit and floors at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_nl_adjusted_income_tax_line_36
            - max(0, nl_provincial_foreign_tax_credit_t2036_line_37)
          )

  - name: federal_2025_t2203_nl_tax_before_low_income_reduction_line_49
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ lines 41 to 49 subtract political, direct equity, resort property, and venture capital credits and floor at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(
              0,
              max(
                0,
                max(
                  0,
                  federal_2025_t2203_nl_tax_after_foreign_credit_line_38
                  - max(0, nl_political_contribution_tax_credit_line_40)
                ) - max(0, nl_direct_equity_tax_credit_t1272_line_42)
              ) - max(0, nl_resort_property_investment_tax_credit_t1297_line_44)
            ) - (
              max(0, nl_venture_capital_tax_credit_line_46)
              + max(0, nl_unused_venture_capital_tax_credit_line_47)
            )
          )

  - name: federal_2025_t2203_nl_adjusted_family_income_line_57
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NL428MJ lines 52 to 57 calculate adjusted family income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(0, nl_taxpayer_net_income_line_23600)
            + max(0, nl_taxpayer_uccb_and_rdsp_repayments)
            - max(0, nl_taxpayer_uccb_and_rdsp_income)
          )
          + max(
            0,
            max(0, nl_spouse_net_income_line_23600)
            + max(0, nl_spouse_uccb_and_rdsp_repayments)
            - max(0, nl_spouse_uccb_and_rdsp_income)
          )

