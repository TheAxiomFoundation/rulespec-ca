  - name: federal_2025_t2203_pe_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 PE428MJ line 9 is Prince Edward Island tax on taxable income from the bracket table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_pe_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_pe_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_pe_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_pe_bracket_1_threshold)
              * federal_2025_t2203_pe_bracket_2_rate
              + federal_2025_t2203_pe_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_pe_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_pe_bracket_2_threshold)
                * federal_2025_t2203_pe_bracket_3_rate
                + federal_2025_t2203_pe_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_pe_bracket_4_threshold:
                  (taxable_income_line_26000 - federal_2025_t2203_pe_bracket_3_threshold)
                  * federal_2025_t2203_pe_bracket_4_rate
                  + federal_2025_t2203_pe_bracket_4_base_tax
                else:
                  (taxable_income_line_26000 - federal_2025_t2203_pe_bracket_4_threshold)
                  * federal_2025_t2203_pe_bracket_5_rate
                  + federal_2025_t2203_pe_bracket_5_base_tax

