format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 for 2025 includes Form NL428MJ and Form PE428MJ for
    Newfoundland and Labrador and Prince Edward Island multiple-jurisdiction
    tax. This module encodes their Part 4 bracket tax, proration, resident
    adjustments, low-income reductions, and final Part 5 tax lines.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/t2203-newfoundland-pei-tax
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: |-
        CRA Form T2203 is the official 2025 form for provincial and
        territorial taxes for multiple jurisdictions, including NL428MJ and
        PE428MJ.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
