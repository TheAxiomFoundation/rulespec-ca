            - (
              max(0, pe_non_refundable_tax_credits_part_3_line_d)
              + max(0, pe_dividend_tax_credit_line_13)
              + max(0, minimum_tax_carryover_line_40427)
              * federal_2025_t2203_pe_minimum_tax_rate
            )
          )

