format: rulespec/v1
module:
  summary: |-
    CRA Form T2204 for 2025 calculates employee overpayment of
    Employment Insurance premiums and the employment EI premium credit.
    This module encodes the line 1 to line 16 arithmetic, including
    Quebec and non-Quebec rate branches.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/employee-overpayment-ei-premiums
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/employment-insurance-act
      rationale: |-
        CRA Form T2204 is the official 2025 form for calculating employee
        EI premium overpayments and the related non-refundable credit.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2204/t2204-25e.pdf
rules:
  - name: federal_2025_t2204_max_insurable_earnings
    kind: parameter
    dtype: Money
    source: CRA T2204 2025 line 3 caps total EI insurable earnings at $65,700
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          65700

  - name: federal_2025_t2204_basic_exemption
    kind: parameter
    dtype: Money
    source: CRA T2204 2025 line 7 subtracts $2,000 from line 3
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          2000

  - name: federal_2025_t2204_non_quebec_ei_rate
    kind: parameter
    dtype: Rate
    source: CRA T2204 2025 line 10 multiplies line 1 by 1.64%, encoded as 0.0164
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.0164

  - name: federal_2025_t2204_non_quebec_max_required_premiums
    kind: parameter
    dtype: Money
    source: CRA T2204 2025 line 10 caps non-Quebec required premiums at $1,077.48
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1077.48

  - name: federal_2025_t2204_quebec_ei_rate
    kind: parameter
    dtype: Rate
    source: CRA T2204 2025 line 11 multiplies line 1 by 1.31%, encoded as 0.0131
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.0131

  - name: federal_2025_t2204_quebec_max_required_premiums
    kind: parameter
    dtype: Money
    source: CRA T2204 2025 line 11 caps Quebec required premiums at $860.67
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          860.67

  - name: federal_2025_t2204_refund_threshold
    kind: parameter
    dtype: Money
    source: CRA T2204 2025 line 15 says the overpayment is entered on line 45000 only if it is more than $1
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          1

  - name: federal_2025_t2204_ei_insurable_earnings_line_1
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 1 uses total EI insurable earnings, with note 1 setting the amount to zero when there are no self-employment earnings and T4 insurable earnings are less than $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if not t2204_has_self_employment_ei_special_benefits_agreement
            and max(0, t4_ei_insurable_earnings_box_24_or_14) < federal_2025_t2204_basic_exemption:
            0
          else:
            max(0, t4_ei_insurable_earnings_box_24_or_14)

  - name: federal_2025_t2204_self_employment_ei_earnings_line_2
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 2 uses total self-employment and other earnings eligible for EI special benefits
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, self_employment_and_other_ei_special_benefits_earnings_line_2)

  - name: federal_2025_t2204_total_ei_earnings_line_3
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 3 adds line 1 and line 2 and caps the total at $65,700
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2204_max_insurable_earnings,
            federal_2025_t2204_ei_insurable_earnings_line_1
            + federal_2025_t2204_self_employment_ei_earnings_line_2
          )

  - name: federal_2025_t2204_total_premiums_deducted_line_4
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 4 uses box 18 and box 55 for residents outside Quebec and box 18 for Quebec residents
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2204_resident_of_quebec:
            max(0, t4_ei_premiums_box_18)
          else:
            max(0, t4_ei_premiums_box_18)
            + max(0, t4_ppip_premiums_box_55)

  - name: federal_2025_t2204_schedule_13_premiums_payable_line_5
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 5 uses the applicable premiums payable from Schedule 13
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, schedule_13_premiums_payable_for_t2204_line_5)

  - name: federal_2025_t2204_total_premiums_line_6
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 6 adds line 4 and line 5
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2204_total_premiums_deducted_line_4
          + federal_2025_t2204_schedule_13_premiums_payable_line_5

  - name: federal_2025_t2204_excess_earnings_line_7
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 7 subtracts $2,000 from line 3 and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_t2204_total_ei_earnings_line_3 - federal_2025_t2204_basic_exemption)

  - name: federal_2025_t2204_premiums_over_excess_earnings_line_8
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 8 subtracts line 7 from line 6 and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_t2204_total_premiums_line_6 - federal_2025_t2204_excess_earnings_line_7)

  - name: federal_2025_t2204_premiums_deducted_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 9 repeats total premiums deducted from line 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2204_total_premiums_deducted_line_4

  - name: federal_2025_t2204_non_quebec_required_premiums_line_10
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 10 multiplies line 1 by 1.64% and caps the amount at $1,077.48
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2204_non_quebec_max_required_premiums,
            federal_2025_t2204_ei_insurable_earnings_line_1
            * federal_2025_t2204_non_quebec_ei_rate
          )

  - name: federal_2025_t2204_quebec_required_premiums_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 11 multiplies line 1 by 1.31% and caps the amount at $860.67
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2204_quebec_max_required_premiums,
            federal_2025_t2204_ei_insurable_earnings_line_1
            * federal_2025_t2204_quebec_ei_rate
          )

  - name: federal_2025_t2204_required_premiums_line_12
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 12 uses line 10 or line 11, whichever applies
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2204_resident_of_quebec:
            federal_2025_t2204_quebec_required_premiums_line_11
          else:
            federal_2025_t2204_non_quebec_required_premiums_line_10

  - name: federal_2025_t2204_overpayment_by_required_premiums_line_13
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 13 subtracts line 12 from line 9 and floors the result at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_t2204_premiums_deducted_line_9 - federal_2025_t2204_required_premiums_line_12)

  - name: federal_2025_t2204_greater_overpayment_line_14
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 14 is the greater of line 8 and line 13
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            federal_2025_t2204_premiums_over_excess_earnings_line_8,
            federal_2025_t2204_overpayment_by_required_premiums_line_13
          )

  - name: employee_employment_insurance_overpayment_line_45000
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 15 is the lesser of line 9 and line 14 and is entered on line 45000 only if it is more than $1
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if min(federal_2025_t2204_premiums_deducted_line_9, federal_2025_t2204_greater_overpayment_line_14) > federal_2025_t2204_refund_threshold:
            min(federal_2025_t2204_premiums_deducted_line_9, federal_2025_t2204_greater_overpayment_line_14)
          else:
            0

  - name: employment_insurance_premiums_through_employment_credit_line_31200
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2204 2025 line 16 is the least of line 7, line 9, or line 12 and is entered on line 31200 and Form 428 line 58300 if applicable
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            max(0, federal_2025_t2204_excess_earnings_line_7),
            max(0, federal_2025_t2204_premiums_deducted_line_9),
            max(0, federal_2025_t2204_required_premiums_line_12)
          )
