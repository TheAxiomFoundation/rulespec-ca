  - name: cwb_claimant_working_income
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 1 uses working income, including working income of an eligible spouse if applicable
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, claimant_working_income)

  - name: cwb_spouse_working_income
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 1 includes working income of an eligible spouse if applicable
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, spouse_working_income)

  - name: cwb_family_working_income
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 1 total working income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          cwb_claimant_working_income + cwb_spouse_working_income

  - name: cwb_adjusted_family_net_income_before_secondary_earner_exemption
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 8 adjusted family net income before the secondary-earner exemption
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, adjusted_family_net_income)

  - name: cwb_secondary_earner_exemption
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 Step 2 secondary-earner exemption calculation
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if has_eligible_spouse:
            min(
              cwb_secondary_earner_exemption_maximum,
              if cwb_claimant_working_income < cwb_spouse_working_income:
                min(cwb_claimant_working_income, max(0, claimant_adjusted_net_income))
              else:
                min(cwb_spouse_working_income, max(0, spouse_adjusted_net_income))
            )
          else:
            0

  - name: cwb_adjusted_family_net_income
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 8 minus Step 2 secondary-earner exemption
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, cwb_adjusted_family_net_income_before_secondary_earner_exemption - cwb_secondary_earner_exemption)

  - name: cwb_basic_maximum_for_family_type
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 7 maximum basic CWB by eligible-spouse/dependant status
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if is_quebec_resident:
            if has_eligible_spouse and has_eligible_dependant:
              cwb_qc_basic_spouse_and_dependant_maximum
            else:
              if has_eligible_spouse:
                cwb_qc_basic_spouse_only_maximum
              else:
                if has_eligible_dependant:
                  cwb_qc_basic_dependant_only_maximum
                else:
                  cwb_qc_basic_single_maximum
          else:
            if is_alberta_resident:
              if has_eligible_spouse_or_eligible_dependant:
                cwb_ab_basic_family_maximum
              else:
                cwb_ab_basic_single_maximum
            else:
              if is_nunavut_resident:
                if has_eligible_spouse_or_eligible_dependant:
                  cwb_nu_basic_family_maximum
                else:
                  cwb_nu_basic_single_maximum
              else:
                if has_eligible_spouse_or_eligible_dependant:
                  cwb_basic_family_maximum
                else:
                  cwb_basic_single_maximum

  - name: cwb_basic_working_income_exclusion_for_jurisdiction
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 17 base amount by standard, AB, QC, and NU Schedule 6
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if is_quebec_resident:
            if has_eligible_spouse:
              cwb_qc_basic_spouse_exclusion
            else:
              cwb_qc_basic_single_or_dependant_exclusion
          else:
            if is_alberta_resident:
              cwb_ab_basic_working_income_exclusion
            else:
              if is_nunavut_resident:
                cwb_nu_basic_working_income_exclusion
              else:
                cwb_basic_working_income_exclusion

  - name: cwb_basic_phase_in_rate_for_jurisdiction
    kind: derived
    entity: Family
    dtype: Rate
    period: Year
    source: CRA Schedule 6 2025 line 19 rate by standard, AB, QC, and NU Schedule 6
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if is_quebec_resident:
            if has_eligible_spouse and has_eligible_dependant:
              cwb_qc_basic_spouse_and_dependant_phase_in_rate
            else:
              if has_eligible_dependant and not has_eligible_spouse:
                cwb_qc_basic_dependant_only_phase_in_rate
              else:
                cwb_qc_basic_single_or_spouse_only_phase_in_rate
          else:
            if is_alberta_resident:
              cwb_ab_basic_phase_in_rate
            else:
              if is_nunavut_resident:
                cwb_nu_basic_phase_in_rate
              else:
                cwb_basic_phase_in_rate

  - name: cwb_basic_reduction_threshold_for_family_type
    kind: derived
    entity: Family
    dtype: Money
    period: Year
    source: CRA Schedule 6 2025 line 9 threshold by eligible-spouse/dependant status
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if is_quebec_resident:
            if has_eligible_spouse and has_eligible_dependant:
              cwb_qc_basic_spouse_and_dependant_reduction_threshold
            else:
              if has_eligible_spouse:
                cwb_qc_basic_spouse_only_reduction_threshold
              else:
                if has_eligible_dependant:
                  cwb_qc_basic_dependant_only_reduction_threshold
                else:
                  cwb_qc_basic_single_reduction_threshold
          else:
            if is_alberta_resident:
              if has_eligible_spouse_or_eligible_dependant:
                cwb_ab_basic_family_reduction_threshold
              else:
                cwb_ab_basic_single_reduction_threshold
            else:
              if is_nunavut_resident:
                if has_eligible_spouse_or_eligible_dependant:
