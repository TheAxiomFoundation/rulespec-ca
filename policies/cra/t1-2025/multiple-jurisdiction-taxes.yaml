format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 for 2025 allocates income and calculates provincial and
    territorial taxes for multiple jurisdictions. This module encodes the
    common Part 1 allocation spine, Part 2 federal surtax and refundable
    Quebec abatement, and Part 5 provincial and territorial tax summary.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/multiple-jurisdiction-taxes
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form T2203 is the official 2025 form for calculating provincial
        and territorial taxes for multiple jurisdictions.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
rules:
  - name: federal_2025_t2203_federal_surtax_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 2 line 9 gives the federal surtax rate as 48%, encoded as 0.48
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.48

  - name: federal_2025_t2203_refundable_quebec_abatement_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 2 line 14 gives the refundable Quebec abatement rate as 16.5%, encoded as 0.165
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.165

  - name: federal_2025_t2203_income_for_allocation_line_1
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 1 line 1 uses net income from line 23600 and the deduction for split income claimed on line 23200
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          net_income_line_23600
          + max(0, split_income_deduction_line_23200)

  - name: federal_2025_t2203_business_income_line_2
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 1 line 2 is the total of lines 12200, 13500, 13700, 13900, 14100, and 14300, excluding losses
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, net_partnership_income_line_12200)
          + max(0, business_income_line_13500)
          + max(0, professional_income_line_13700)
          + max(0, commission_income_line_13900)
          + max(0, farming_income_line_14100)
          + max(0, fishing_income_line_14300)

  - name: federal_2025_t2203_excess_income_line_3
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 1 line 3 subtracts line 2 from line 1 and floors negative amounts at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_income_for_allocation_line_1
            - federal_2025_t2203_business_income_line_2
          )

  - name: federal_2025_t2203_quebec_income_allocated_line_52140
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 1 column 4 adds columns 2 and 3, unless resident income is less than business income, in which case line 1 is prorated by column 2 allocation percentage
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_canada and federal_2025_t2203_income_for_allocation_line_1 < federal_2025_t2203_business_income_line_2:
            if max(0, t2203_total_business_income_allocated_column_2) <= 0:
              0
            else:
              max(0, federal_2025_t2203_income_for_allocation_line_1)
              * max(0, t2203_quebec_business_income_allocated_column_2_line_52140)
              / max(0, t2203_total_business_income_allocated_column_2)
          else:
            max(0, t2203_quebec_business_income_allocated_column_2_line_52140)
            + max(0, t2203_quebec_excess_income_allocated_column_3_line_52140)

  - name: federal_2025_t2203_other_outside_canada_income_allocated_line_52220
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 1 column 4 adds columns 2 and 3, unless resident income is less than business income, in which case line 1 is prorated by column 2 allocation percentage
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_canada and federal_2025_t2203_income_for_allocation_line_1 < federal_2025_t2203_business_income_line_2:
            if max(0, t2203_total_business_income_allocated_column_2) <= 0:
              0
            else:
              max(0, federal_2025_t2203_income_for_allocation_line_1)
              * max(0, t2203_other_outside_canada_business_income_allocated_column_2_line_52220)
              / max(0, t2203_total_business_income_allocated_column_2)
          else:
            max(0, t2203_other_outside_canada_business_income_allocated_column_2_line_52220)
            + max(0, t2203_other_outside_canada_excess_income_allocated_column_3_line_52220)

  - name: federal_2025_t2203_quebec_percentage_line_52140
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CRA T2203 2025 Part 1 column 5 uses income allocated in column 4 to determine the percentage for each jurisdiction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if max(0, t2203_total_income_allocated_all_jurisdictions_column_4) <= 0:
            0
          else:
            federal_2025_t2203_quebec_income_allocated_line_52140
            / max(0, t2203_total_income_allocated_all_jurisdictions_column_4)

  - name: federal_2025_t2203_other_outside_canada_percentage_line_52220
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CRA T2203 2025 Part 1 column 5 uses income allocated in column 4 to determine the percentage for each jurisdiction
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if max(0, t2203_total_income_allocated_all_jurisdictions_column_4) <= 0:
            0
          else:
            federal_2025_t2203_other_outside_canada_income_allocated_line_52220
            / max(0, t2203_total_income_allocated_all_jurisdictions_column_4)

  - name: federal_2025_t2203_part_2_line_6
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 6 enters whichever is more, basic federal tax line 42900 or T1206 line 22 tax on split income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            max(0, basic_federal_tax_line_42900),
            max(0, tax_on_split_income_t1206_line_22)
          )

  - name: federal_2025_t2203_surtax_base_line_8
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 8 multiplies line 6 by the percentage allocated to Other Outside Canada
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_part_2_line_6
          * federal_2025_t2203_other_outside_canada_percentage_line_52220

  - name: federal_surtax_on_income_allocated_outside_canada_t2203_line_10
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 10 multiplies line 8 by the 48% federal surtax rate, or uses Form T691 when minimum tax applies
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_subject_to_minimum_tax:
            max(0, t691_federal_surtax_on_income_allocated_outside_canada)
          else:
            federal_2025_t2203_surtax_base_line_8
            * federal_2025_t2203_federal_surtax_rate

  - name: federal_2025_t2203_quebec_abatement_base_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 11 uses the greater of basic federal tax or T1206 line 22, or T691 Part 6 line 7 when minimum tax applies
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_subject_to_minimum_tax:
            max(0, t691_part_6_line_7_for_quebec_abatement)
          else:
            federal_2025_t2203_part_2_line_6

  - name: federal_2025_t2203_quebec_abatement_line_13
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 13 multiplies line 11 by the percentage allocated to Quebec
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_quebec_abatement_base_line_11
          * federal_2025_t2203_quebec_percentage_line_52140

  - name: refundable_quebec_abatement_line_44000
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 2 line 15 multiplies line 13 by the 16.5% refundable Quebec abatement rate and enters the amount on line 44000
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_quebec_abatement_line_13
          * federal_2025_t2203_refundable_quebec_abatement_rate

  - name: provincial_and_territorial_taxes_line_42800
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 5 line 13 adds the applicable provincial and territorial tax lines and enters the total on line 42800
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t2203_newfoundland_and_labrador_tax_part_5_line_1)
          + max(0, t2203_prince_edward_island_tax_part_5_line_2)
          + max(0, t2203_nova_scotia_tax_part_5_line_3)
          + max(0, t2203_new_brunswick_tax_part_5_line_4)
          + max(0, t2203_ontario_tax_part_5_line_5)
          + max(0, t2203_manitoba_tax_part_5_line_6)
          + max(0, t2203_saskatchewan_tax_part_5_line_7)
          + max(0, t2203_alberta_tax_part_5_line_8)
          + max(0, t2203_british_columbia_tax_part_5_line_9)
          + max(0, t2203_yukon_tax_part_5_line_10)
          + max(0, t2203_northwest_territories_tax_part_5_line_11)
          + max(0, t2203_nunavut_tax_part_5_line_12)
