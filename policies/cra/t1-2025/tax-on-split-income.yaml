          else:
            (
              min(max(0, split_income_from_foreign_sources_line_68370), max(0, total_income_from_foreign_sources_line_68380))
              / max(0, total_income_from_foreign_sources_line_68380)
            )
            * max(0, federal_foreign_tax_credit_line_40500)

