  - name: federal_2025_t1206_chart_c_selected_high_tax_rate
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CRA T1206 2025 Chart C column 2 gives the high tax rate for the taxpayer's province or territory
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t1206_chart_c_resident_of_alberta:
            federal_2025_t1206_chart_c_ab_high_tax_rate
          else:
            if t1206_chart_c_resident_of_british_columbia:
              federal_2025_t1206_chart_c_bc_high_tax_rate
            else:
              if t1206_chart_c_resident_of_manitoba:
                federal_2025_t1206_chart_c_mb_high_tax_rate
              else:
                if t1206_chart_c_resident_of_new_brunswick:
                  federal_2025_t1206_chart_c_nb_high_tax_rate
                else:
