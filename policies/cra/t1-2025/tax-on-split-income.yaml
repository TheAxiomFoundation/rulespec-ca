                    federal_2025_t1206_chart_c_nl_other_than_eligible_dividend_credit_rate
                  else:
                    if t1206_chart_c_resident_of_nova_scotia:
                      federal_2025_t1206_chart_c_ns_other_than_eligible_dividend_credit_rate
                    else:
                      if t1206_chart_c_resident_of_northwest_territories:
                        federal_2025_t1206_chart_c_nt_other_than_eligible_dividend_credit_rate
                      else:
                        if t1206_chart_c_resident_of_nunavut:
                          federal_2025_t1206_chart_c_nu_other_than_eligible_dividend_credit_rate
                        else:
                          if t1206_chart_c_resident_of_ontario:
                            federal_2025_t1206_chart_c_on_other_than_eligible_dividend_credit_rate
                          else:
                            if t1206_chart_c_resident_of_prince_edward_island:
                              federal_2025_t1206_chart_c_pe_other_than_eligible_dividend_credit_rate
                            else:
                              if t1206_chart_c_resident_of_saskatchewan:
                                federal_2025_t1206_chart_c_sk_other_than_eligible_dividend_credit_rate
                              else:
                                if t1206_chart_c_resident_of_yukon:
                                  federal_2025_t1206_chart_c_yt_other_than_eligible_dividend_credit_rate
                                else:
                                  0

  - name: federal_2025_t1206_taxable_dividends_line_1
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1206 2025 Part 1 line 1 uses the taxable amount of eligible and other-than-eligible dividends subject to TOSI
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t1206_taxable_dividends_subject_to_tosi_line_68330)

  - name: federal_2025_t1206_other_than_eligible_dividends_line_2
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T1206 2025 Part 1 line 2 uses the part of line 1 that is other-than-eligible dividends
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t1206_taxable_dividends_line_1,
            max(0, t1206_other_than_eligible_dividends_subject_to_tosi_line_68340)
          )

  - name: federal_2025_t1206_other_split_income_line_3
