                    federal_2025_t1206_chart_c_nl_high_tax_rate
                  else:
                    if t1206_chart_c_resident_of_nova_scotia:
                      federal_2025_t1206_chart_c_ns_high_tax_rate
                    else:
                      if t1206_chart_c_resident_of_northwest_territories:
                        federal_2025_t1206_chart_c_nt_high_tax_rate
                      else:
                        if t1206_chart_c_resident_of_nunavut:
