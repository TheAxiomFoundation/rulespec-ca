format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 Part 3 for 2025 calculates Yukon, Northwest Territories,
    and Nunavut non-refundable tax credits for multiple-jurisdiction returns.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/t2203-yt-nt-nu-part3-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: CRA Form T2203 is the official 2025 Part 3 source for YT, NT, and NU multiple-jurisdiction non-refundable credits.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
rules:
  - name: federal_2025_t2203_nt_part3_basic_personal_amount_58040
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 Part 3 NT basic personal amount line 58040 is $17,842
    versions:
      - effective_from: '2025-01-01'
        formula: 17842
  - name: federal_2025_t2203_nu_part3_basic_personal_amount_58040
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 Part 3 NU basic personal amount line 58040 is $19,274
    versions:
      - effective_from: '2025-01-01'
        formula: 19274
  - name: federal_2025_t2203_yt_part3_low_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 YT subtotal uses 6.4%, encoded as 0.064
    versions:
      - effective_from: '2025-01-01'
        formula: 0.064
  - name: federal_2025_t2203_nt_part3_low_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 NT subtotal uses 5.9%, encoded as 0.059
    versions:
      - effective_from: '2025-01-01'
        formula: 0.059
  - name: federal_2025_t2203_nu_part3_low_credit_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 NU subtotal uses 4%, encoded as 0.04
    versions:
      - effective_from: '2025-01-01'
        formula: 0.04
  - name: federal_2025_t2203_yt_part3_schedule9_high_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 YT Schedule 9 line 14 uses 12.8%, encoded as 0.128
    versions:
      - effective_from: '2025-01-01'
        formula: 0.128
  - name: federal_2025_t2203_nt_part3_schedule9_high_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 NT Schedule 9 line 14 uses 14.05%, encoded as 0.1405
    versions:
      - effective_from: '2025-01-01'
        formula: 0.1405
  - name: federal_2025_t2203_nu_part3_schedule9_high_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 Part 3 NU Schedule 9 line 14 uses 11.5%, encoded as 0.115
    versions:
      - effective_from: '2025-01-01'
        formula: 0.115
  - name: federal_2025_t2203_part3_territory_age_reduction_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 NT and NU worksheets line 58080 use a 15% age-amount reduction rate, encoded as 0.15
    versions:
      - effective_from: '2025-01-01'
        formula: 0.15
  - name: federal_2025_t2203_nt_part3_age_maximum_58080
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NT worksheet line 58080 maximum age amount is $8,727
    versions:
      - effective_from: '2025-01-01'
        formula: 8727
  - name: federal_2025_t2203_nt_nu_part3_age_threshold
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NT and NU worksheet line 58080 income threshold is $45,522
    versions:
      - effective_from: '2025-01-01'
        formula: 45522
  - name: federal_2025_t2203_nu_part3_age_maximum_58080
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NU worksheet line 58080 maximum age amount is $12,303
    versions:
      - effective_from: '2025-01-01'
        formula: 12303
  - name: federal_2025_t2203_nt_part3_spouse_base
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NT worksheet line 58120 base amount is $17,842
    versions:
      - effective_from: '2025-01-01'
        formula: 17842
  - name: federal_2025_t2203_nu_part3_spouse_base
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NU worksheet line 58120 base amount is $19,274
    versions:
      - effective_from: '2025-01-01'
        formula: 19274
  - name: federal_2025_t2203_nu_part3_young_child_amount
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 NU line 58230 is number of children multiplied by $1,200
    versions:
      - effective_from: '2025-01-01'
        formula: 1200
  - name: federal_2025_t2203_yt_nu_part3_pension_income_cap
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 Part 3 YT and NU line 31400 maximum is $2,000
    versions:
      - effective_from: '2025-01-01'
        formula: 2000
  - name: federal_2025_t2203_nt_part3_pension_income_cap
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 Part 3 NT line 31400 maximum is $1,000
    versions:
      - effective_from: '2025-01-01'
        formula: 1000
  - name: federal_2025_t2203_territory_part3_medical_threshold_cap
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 YT, NT, and NU worksheets line ME threshold cap is $2,834
    versions:
      - effective_from: '2025-01-01'
        formula: 2834
  - name: federal_2025_t2203_part3_territory_medical_income_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 YT, NT, and NU worksheets line ME use 3% of net income, encoded as 0.03
    versions:
      - effective_from: '2025-01-01'
        formula: 0.03
  - name: federal_2025_t2203_nt_part3_age_amount_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT worksheet line 58080 calculates the age amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nt_part3_age_maximum_58080 - max(0, nt_net_income_line_23600 - federal_2025_t2203_nt_nu_part3_age_threshold) * federal_2025_t2203_part3_territory_age_reduction_rate)
  - name: federal_2025_t2203_nu_part3_age_amount_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU worksheet line 58080 calculates the age amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nu_part3_age_maximum_58080 - max(0, nu_net_income_line_23600 - federal_2025_t2203_nt_nu_part3_age_threshold) * federal_2025_t2203_part3_territory_age_reduction_rate)
  - name: federal_2025_t2203_nt_part3_spouse_amount_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT worksheet line 58120 calculates spouse or common-law partner amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nt_part3_spouse_base - max(0, nt_spouse_net_income_line_23600))
  - name: federal_2025_t2203_nu_part3_spouse_amount_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU worksheet line 58120 calculates spouse or common-law partner amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nu_part3_spouse_base - max(0, nu_spouse_net_income_line_23600))
  - name: federal_2025_t2203_nt_part3_eligible_dependant_amount_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT worksheet line 58160 calculates eligible dependant amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nt_part3_spouse_base - max(0, nt_eligible_dependant_net_income_line_23600))
  - name: federal_2025_t2203_nu_part3_eligible_dependant_amount_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU worksheet line 58160 calculates eligible dependant amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_nu_part3_spouse_base - max(0, nu_eligible_dependant_net_income_line_23600))
  - name: federal_2025_t2203_nu_part3_young_children_amount_58230
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU line 58230 is the number of young children multiplied by $1,200
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nu_young_children_count_line_63710) * federal_2025_t2203_nu_part3_young_child_amount
  - name: federal_2025_t2203_yt_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 YT worksheet line ME subtracts the lesser of $2,834 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, yt_medical_expenses_line_33099 - min(federal_2025_t2203_territory_part3_medical_threshold_cap, max(0, yt_net_income_line_23600) * federal_2025_t2203_part3_territory_medical_income_rate))
  - name: federal_2025_t2203_nt_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NT worksheet line ME subtracts the lesser of $2,834 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nt_medical_expenses_line_33099 - min(federal_2025_t2203_territory_part3_medical_threshold_cap, max(0, nt_net_income_line_23600) * federal_2025_t2203_part3_territory_medical_income_rate))
  - name: federal_2025_t2203_nu_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 NU worksheet line ME subtracts the lesser of $2,834 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, nu_medical_expenses_line_33099 - min(federal_2025_t2203_territory_part3_medical_threshold_cap, max(0, nu_net_income_line_23600) * federal_2025_t2203_part3_territory_medical_income_rate))
  - name: federal_2025_t2203_yt_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 YT subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, yt_basic_personal_amount_line_30000)
          + max(0, yt_age_amount_line_30100)
          + max(0, yt_spouse_amount_line_30300)
          + max(0, yt_canada_caregiver_child_amount_line_30425)
          + max(0, yt_eligible_dependant_amount_line_30400)
          + max(0, yt_infirm_dependants_amount_line_30450)
          + max(0, yt_caregiver_amount_line_30500)
          + max(0, yt_cpp_or_qpp_contributions_line_58240)
          + max(0, yt_cpp_or_qpp_enhanced_contributions_line_58280)
          + max(0, yt_employment_insurance_premiums_line_58300)
          + max(0, yt_employment_insurance_enhanced_premiums_line_58305)
          + max(0, yt_canada_employment_amount_line_31260)
          + max(0, yt_childrens_arts_amount_line_58326)
          + max(0, yt_adoption_expenses_line_31300)
          + min(federal_2025_t2203_yt_nu_part3_pension_income_cap, max(0, yt_pension_income_amount_line_31400))
          + max(0, yt_disability_self_amount_line_31600)
          + max(0, yt_disability_dependant_transfer_amount_line_31800)
  - name: federal_2025_t2203_nt_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 NT subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_nt_part3_basic_personal_amount_58040
          + federal_2025_t2203_nt_part3_age_amount_58080
          + federal_2025_t2203_nt_part3_spouse_amount_58120
          + federal_2025_t2203_nt_part3_eligible_dependant_amount_58160
          + max(0, nt_infirm_dependants_amount_58200)
          + max(0, nt_cpp_or_qpp_contributions_line_58240)
          + max(0, nt_cpp_or_qpp_enhanced_contributions_line_58280)
          + max(0, nt_employment_insurance_premiums_line_58300)
          + max(0, nt_employment_insurance_enhanced_premiums_line_58305)
          + min(federal_2025_t2203_nt_part3_pension_income_cap, max(0, nt_pension_income_amount_line_31400))
          + max(0, nt_caregiver_amount_58400)
          + max(0, nt_disability_self_amount_58440)
          + max(0, nt_disability_dependant_transfer_amount_58480)
  - name: federal_2025_t2203_nu_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 NU subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_nu_part3_basic_personal_amount_58040
          + federal_2025_t2203_nu_part3_age_amount_58080
          + federal_2025_t2203_nu_part3_spouse_amount_58120
          + federal_2025_t2203_nu_part3_eligible_dependant_amount_58160
          + max(0, nu_infirm_dependants_amount_58200)
          + federal_2025_t2203_nu_part3_young_children_amount_58230
          + max(0, nu_cpp_or_qpp_contributions_line_58240)
          + max(0, nu_cpp_or_qpp_enhanced_contributions_line_58280)
          + max(0, nu_employment_insurance_premiums_line_58300)
          + max(0, nu_employment_insurance_enhanced_premiums_line_58305)
          + min(federal_2025_t2203_yt_nu_part3_pension_income_cap, max(0, nu_pension_income_amount_line_31400))
          + max(0, nu_caregiver_amount_58400)
          + max(0, nu_disability_self_amount_58440)
          + max(0, nu_disability_dependant_transfer_amount_58480)
  - name: federal_2025_t2203_yt_part3_total_non_refundable_tax_credits_line_d
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 YT line D is line A plus line B after applying the 6.4% and 12.8% rates
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_yt_part3_subtotal_s11_mj
            + max(0, yt_disability_supports_line_58520)
            + max(0, yt_schedule_s11_or_s11_mj_line_58560)
            + max(0, yt_student_designated_amounts_line_58600)
            + max(0, yt_schedule_s2_mj_line_58640)
            + federal_2025_t2203_yt_part3_medical_expenses_line_me
            + max(0, yt_medical_expenses_other_dependants_line_33199)
            + max(0, yt_schedule9_line_13)
          ) * federal_2025_t2203_yt_part3_low_credit_rate
          + max(0, yt_schedule9_line_14) * federal_2025_t2203_yt_part3_schedule9_high_rate
  - name: federal_2025_t2203_nt_part3_total_non_refundable_tax_credits_line_d
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 NT line D is line A plus line B after applying the 5.9% and 14.05% rates
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_nt_part3_subtotal_s11_mj
            + max(0, nt_disability_supports_line_58520)
            + max(0, nt_schedule_s11_or_s11_mj_line_58560)
            + max(0, nt_student_designated_amounts_line_58600)
            + max(0, nt_schedule_s2_mj_line_58640)
            + federal_2025_t2203_nt_part3_medical_expenses_line_me
            + max(0, nt_medical_expenses_other_dependants_line_58729)
            + max(0, nt_schedule9_line_13)
          ) * federal_2025_t2203_nt_part3_low_credit_rate
          + max(0, nt_schedule9_line_14) * federal_2025_t2203_nt_part3_schedule9_high_rate
  - name: federal_2025_t2203_nu_part3_total_non_refundable_tax_credits_line_d
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 NU line D is line A plus line B after applying the 4% and 11.5% rates
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            federal_2025_t2203_nu_part3_subtotal_s11_mj
            + max(0, nu_disability_supports_line_58520)
            + max(0, nu_schedule_s11_or_s11_mj_line_58560)
            + max(0, nu_student_designated_amounts_line_58600)
            + max(0, nu_schedule_s2_mj_line_58640)
            + federal_2025_t2203_nu_part3_medical_expenses_line_me
            + max(0, nu_medical_expenses_other_dependants_line_33199)
            + max(0, nu_schedule9_line_13)
          ) * federal_2025_t2203_nu_part3_low_credit_rate
          + max(0, nu_schedule9_line_14) * federal_2025_t2203_nu_part3_schedule9_high_rate
