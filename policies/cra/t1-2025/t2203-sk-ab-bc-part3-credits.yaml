format: rulespec/v1
module:
  summary: |-
    CRA Form T2203 Part 3 for 2025 calculates Saskatchewan, Alberta, and
    British Columbia non-refundable tax credits for multiple-jurisdiction
    returns.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/t2203-sk-ab-bc-part3-credits
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: CRA Form T2203 is the official 2025 Part 3 source for SK, AB, and BC multiple-jurisdiction non-refundable credits.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2203/t2203-25e.pdf
rules:
  - name: federal_2025_t2203_sk_part3_basic_personal_amount_58040
