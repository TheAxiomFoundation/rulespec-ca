        formula: 2689
  - name: federal_2025_t2203_part3_sk_ab_bc_medical_income_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 SK, AB, and BC worksheets line ME use 3% of net income, encoded as 0.03
