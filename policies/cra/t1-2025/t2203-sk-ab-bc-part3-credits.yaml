        formula: 0.03
  - name: federal_2025_t2203_bc_part3_donation_threshold
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 BC worksheet line 58969 separates the first $200 of donations
    versions:
      - effective_from: '2025-01-01'
        formula: 200
  - name: federal_2025_t2203_bc_part3_donation_income_threshold
    kind: parameter
    dtype: Money
    source: CRA T2203 2025 BC worksheet line 58969 income threshold is $259,829
