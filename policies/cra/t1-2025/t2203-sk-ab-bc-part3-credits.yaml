        formula: 259829
  - name: federal_2025_t2203_bc_part3_donation_high_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 BC worksheet line 58969 high donation rate is 20.5%, encoded as 0.205
    versions:
      - effective_from: '2025-01-01'
        formula: 0.205
  - name: federal_2025_t2203_bc_part3_donation_middle_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 BC worksheet line 58969 middle donation rate is 16.8%, encoded as 0.168
    versions:
      - effective_from: '2025-01-01'
        formula: 0.168
  - name: federal_2025_t2203_bc_part3_farmers_food_donation_rate
    kind: parameter
    dtype: Rate
    source: CRA T2203 2025 BC farmers' food donation tax credit is 25% of eligible qualifying gifts, encoded as 0.25
    versions:
      - effective_from: '2025-01-01'
        formula: 0.25
  - name: federal_2025_t2203_sk_part3_age_amount_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK worksheet line 58080 calculates the age amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_sk_part3_age_maximum_58080 - max(0, sk_net_income_line_23600 - federal_2025_t2203_sk_part3_age_threshold) * federal_2025_t2203_part3_sk_ab_bc_age_reduction_rate)
  - name: federal_2025_t2203_ab_part3_age_amount_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB worksheet line 58080 calculates the age amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_ab_part3_age_maximum_58080 - max(0, ab_net_income_line_23600 - federal_2025_t2203_ab_part3_age_threshold) * federal_2025_t2203_part3_sk_ab_bc_age_reduction_rate)
  - name: federal_2025_t2203_bc_part3_age_amount_58080
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC worksheet line 58080 calculates the age amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_bc_part3_age_maximum_58080 - max(0, bc_net_income_line_23600 - federal_2025_t2203_bc_part3_age_threshold) * federal_2025_t2203_part3_sk_ab_bc_age_reduction_rate)
  - name: federal_2025_t2203_sk_part3_spouse_amount_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK worksheet line 58120 calculates spouse or common-law partner amount
    versions:
      - effective_from: '2025-01-01'
        formula: min(federal_2025_t2203_sk_part3_spouse_cap, max(0, federal_2025_t2203_sk_part3_spouse_base - max(0, sk_spouse_net_income_line_23600)))
  - name: federal_2025_t2203_ab_part3_spouse_amount_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB worksheet line 58120 calculates spouse or common-law partner amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_ab_part3_spouse_base - max(0, ab_spouse_net_income_line_23600))
  - name: federal_2025_t2203_bc_part3_spouse_amount_58120
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC worksheet line 58120 calculates spouse or common-law partner amount
    versions:
      - effective_from: '2025-01-01'
        formula: min(federal_2025_t2203_bc_part3_spouse_cap, max(0, federal_2025_t2203_bc_part3_spouse_base - max(0, bc_spouse_net_income_line_23600)))
  - name: federal_2025_t2203_sk_part3_eligible_dependant_amount_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK worksheet line 58160 calculates eligible dependant amount
    versions:
      - effective_from: '2025-01-01'
        formula: min(federal_2025_t2203_sk_part3_spouse_cap, max(0, federal_2025_t2203_sk_part3_spouse_base - max(0, sk_eligible_dependant_net_income_line_23600)))
  - name: federal_2025_t2203_ab_part3_eligible_dependant_amount_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB worksheet line 58160 calculates eligible dependant amount
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_ab_part3_spouse_base - max(0, ab_eligible_dependant_net_income_line_23600))
  - name: federal_2025_t2203_bc_part3_eligible_dependant_amount_58160
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC worksheet line 58160 calculates eligible dependant amount
    versions:
      - effective_from: '2025-01-01'
        formula: min(federal_2025_t2203_bc_part3_spouse_cap, max(0, federal_2025_t2203_bc_part3_spouse_base - max(0, bc_eligible_dependant_net_income_line_23600)))
  - name: federal_2025_t2203_sk_part3_dependant_children_amount_58210
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK line 58210 is number of children multiplied by $7,704
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, sk_dependent_children_count_line_58209) * federal_2025_t2203_sk_part3_dependant_child_amount
  - name: federal_2025_t2203_sk_part3_senior_supplementary_amount_58220
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK line 58220 claims $2,028 if born in 1960 or earlier
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if sk_born_1960_or_earlier: federal_2025_t2203_sk_part3_senior_supplement_amount else: 0
  - name: federal_2025_t2203_sk_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 SK worksheet line ME subtracts the lesser of $2,681 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, sk_medical_expenses_line_33099 - min(federal_2025_t2203_sk_part3_medical_threshold_cap, max(0, sk_net_income_line_23600) * federal_2025_t2203_part3_sk_ab_bc_medical_income_rate))
  - name: federal_2025_t2203_ab_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 AB worksheet line ME subtracts the lesser of $2,884 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, ab_medical_expenses_line_33099 - min(federal_2025_t2203_ab_part3_medical_threshold_cap, max(0, ab_net_income_line_23600) * federal_2025_t2203_part3_sk_ab_bc_medical_income_rate))
  - name: federal_2025_t2203_bc_part3_medical_expenses_line_me
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC worksheet line ME subtracts the lesser of $2,689 or 3% of net income from eligible medical expenses
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, bc_medical_expenses_line_33099 - min(federal_2025_t2203_bc_part3_medical_threshold_cap, max(0, bc_net_income_line_23600) * federal_2025_t2203_part3_sk_ab_bc_medical_income_rate))
  - name: federal_2025_t2203_bc_part3_donations_and_gifts_line_58969
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC worksheet line 58969 calculates donations and gifts using 5.06%, 16.8%, and 20.5% tiers
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(max(0, bc_schedule9_line_12), federal_2025_t2203_bc_part3_donation_threshold) * federal_2025_t2203_bc_part3_low_credit_rate
          + min(max(0, bc_schedule9_line_12) - min(max(0, bc_schedule9_line_12), federal_2025_t2203_bc_part3_donation_threshold), max(0, bc_taxable_income_line_26000 - federal_2025_t2203_bc_part3_donation_income_threshold)) * federal_2025_t2203_bc_part3_donation_high_rate
          + max(0, max(0, bc_schedule9_line_12) - min(max(0, bc_schedule9_line_12), federal_2025_t2203_bc_part3_donation_threshold) - min(max(0, bc_schedule9_line_12) - min(max(0, bc_schedule9_line_12), federal_2025_t2203_bc_part3_donation_threshold), max(0, bc_taxable_income_line_26000 - federal_2025_t2203_bc_part3_donation_income_threshold))) * federal_2025_t2203_bc_part3_donation_middle_rate
  - name: federal_2025_t2203_bc_part3_farmers_food_donation_tax_credit_58980
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 BC farmers' food donation tax credit is 25% of eligible qualifying gifts
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, bc_eligible_farmers_food_donations) * federal_2025_t2203_bc_part3_farmers_food_donation_rate
  - name: federal_2025_t2203_sk_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 SK subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_sk_part3_basic_personal_amount_58040
          + federal_2025_t2203_sk_part3_age_amount_58080
          + federal_2025_t2203_sk_part3_spouse_amount_58120
          + federal_2025_t2203_sk_part3_eligible_dependant_amount_58160
          + max(0, sk_infirm_dependants_amount_58200)
          + federal_2025_t2203_sk_part3_dependant_children_amount_58210
          + federal_2025_t2203_sk_part3_senior_supplementary_amount_58220
          + max(0, sk_cpp_or_qpp_contributions_line_58240)
          + max(0, sk_cpp_or_qpp_enhanced_contributions_line_58280)
          + max(0, sk_employment_insurance_premiums_line_58300)
          + max(0, sk_employment_insurance_enhanced_premiums_line_58305)
          + (if sk_claimed_volunteer_firefighters_amount_line_31220: federal_2025_t2203_sk_bc_part3_volunteer_amount else: 0)
          + (if sk_claimed_search_and_rescue_volunteers_amount_line_31240: federal_2025_t2203_sk_bc_part3_volunteer_amount else: 0)
          + (if sk_claimed_volunteer_emergency_medical_first_responders_amount: federal_2025_t2203_sk_bc_part3_volunteer_amount else: 0)
          + max(0, sk_schedule_s12_mj_line_58340)
          + min(federal_2025_t2203_sk_part3_first_time_home_buyer_cap, max(0, sk_first_time_home_buyers_amount_line_58357))
          + min(federal_2025_t2203_sk_bc_part3_pension_income_cap, max(0, sk_pension_income_amount_line_31400))
          + max(0, sk_caregiver_amount_58400)
          + max(0, sk_disability_self_amount_58440)
          + max(0, sk_disability_dependant_transfer_amount_58480)
  - name: federal_2025_t2203_ab_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 AB subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2203_ab_part3_basic_personal_amount_58040
          + federal_2025_t2203_ab_part3_age_amount_58080
          + federal_2025_t2203_ab_part3_spouse_amount_58120
          + federal_2025_t2203_ab_part3_eligible_dependant_amount_58160
          + max(0, ab_infirm_dependants_amount_58200)
          + max(0, ab_cpp_or_qpp_contributions_line_58240)
          + max(0, ab_cpp_or_qpp_enhanced_contributions_line_58280)
          + max(0, ab_employment_insurance_premiums_line_58300)
          + max(0, ab_employment_insurance_enhanced_premiums_line_58305)
          + min(federal_2025_t2203_ab_part3_adoption_expense_cap, max(0, ab_adoption_expenses_line_58330))
          + min(federal_2025_t2203_ab_part3_pension_income_cap, max(0, ab_pension_income_amount_line_31400))
          + max(0, ab_caregiver_amount_58400)
          + max(0, ab_disability_self_amount_58440)
          + max(0, ab_disability_dependant_transfer_amount_58480)
  - name: federal_2025_t2203_bc_part3_subtotal_s11_mj
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Part 3 BC subtotal before tuition, transfer, and medical lines
    versions:
      - effective_from: '2025-01-01'
        formula: |-
