format: rulespec/v1
module:
  summary: |-
    CRA Schedule 3 for the 2025 T1 return calculates total capital gains
    or losses and total taxable capital gains or net capital losses. This
    module encodes the Schedule 3 arithmetic for disposition category
    totals, slips, deferrals, business investment loss reductions,
    reserves, the 50 percent inclusion rate, the 100 percent partnership
    inclusion line, and the resulting line 12700 / net capital loss surface.
  source_verification:
    corpus_citation_path: canada/policy/cra/t1-2025/capital-gains-or-losses
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: |-
        CRA Schedule 3 is the official 2025 T1 return schedule for
        calculating capital gains or losses and taxable capital gains.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/5000-s3/5000-s3-25e.pdf
rules:
  - name: federal_2025_capital_gains_inclusion_rate
    kind: parameter
    dtype: Rate
    source: CRA Schedule 3 2025 Part 5 line 23 inclusion rate is 50%, encoded as 0.50 or 0.5
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.50

  - name: federal_2025_schedule_3_total_property_gains_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 Part 3 line 11 adds property type lines 1 to 10
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          qsbc_shares_gain_or_loss_line_10700
          + qualified_farm_fishing_property_gain_or_loss_line_11000
          + qffp_foreclosures_repossessions_gain_or_loss_line_12400
          + publicly_traded_shares_gain_or_loss_line_13200
          + real_estate_depreciable_other_property_gain_or_loss_line_13800
          + bonds_debentures_notes_gain_or_loss_line_15300
          + crypto_assets_gain_or_loss_line_15301
          + other_foreclosures_repossessions_gain_or_loss_line_15500
          + max(0, personal_use_property_total_gain_only_line_15800)
          + max(
            0,
            listed_personal_property_gain_line_15900_before_prior_losses
            - max(0, unapplied_lpp_losses_from_other_years)
          )

  - name: federal_2025_schedule_3_line_14
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 14 subtracts capital gains deferral from line 12
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_total_property_gains_line_11
          - max(0, capital_gains_deferral_line_16100)

  - name: federal_2025_schedule_3_line_17
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 17 adds line 14 and capital gains or losses from T5/T5013/T4PS and T3 slips
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_line_14
          + capital_gains_losses_from_t5_t5013_t4ps_slips_line_17400
          + capital_gains_losses_from_t3_slips_line_17600

  - name: federal_2025_schedule_3_total_before_reserves_line_19100
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 19 subtracts capital loss from a reduction in business investment loss from line 17
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_line_17
          - max(0, capital_loss_from_reduction_business_investment_loss_line_17800)

  - name: federal_2025_schedule_3_total_capital_gains_or_losses_line_19700
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 21 adds reserves from Form T2017 to line 19
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_total_before_reserves_line_19100
          + reserves_included_or_deducted_line_19200

  - name: federal_2025_schedule_3_inclusion_amount_line_24
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 24 multiplies total capital gains or losses by the 50% inclusion rate
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_total_capital_gains_or_losses_line_19700
          * federal_2025_capital_gains_inclusion_rate

  - name: federal_2025_schedule_3_partnership_interest_full_inclusion_line_19890
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 25 includes certain partnership-interest gains subject to 100% inclusion, floored at zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, partnership_interest_100_percent_inclusion_gain_line_19890)

  - name: federal_2025_schedule_3_taxable_capital_gains_or_net_loss_line_19900
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 26 adds line 24 and line 25
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_schedule_3_inclusion_amount_line_24
          + federal_2025_schedule_3_partnership_interest_full_inclusion_line_19890

  - name: taxable_capital_gains_line_12700
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 26 positive amount is entered on line 12700
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, federal_2025_schedule_3_taxable_capital_gains_or_net_loss_line_19900)

  - name: federal_2025_net_capital_loss
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA Schedule 3 2025 line 26 negative amount is a net capital loss and is not reported on line 12700
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, 0 - federal_2025_schedule_3_taxable_capital_gains_or_net_loss_line_19900)
