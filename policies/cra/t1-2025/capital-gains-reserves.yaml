  - name: federal_2025_t2017_extended_eighth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 10% for the eighth year after disposition, encoded as 0.10
    versions:
