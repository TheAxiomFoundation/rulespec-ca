  - name: federal_2025_t2017_most_property_fourth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 most-property table gives zero for the fourth year after disposition
    versions:
      - effective_from: '2025-01-01'
        formula: |-
