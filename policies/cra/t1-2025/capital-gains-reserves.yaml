  - name: federal_2025_t2017_fourth_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the fourth year after disposition, encoded as years after disposition 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          4

  - name: federal_2025_t2017_fifth_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the fifth year after disposition, encoded as years after disposition 5
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          5

  - name: federal_2025_t2017_sixth_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the sixth year after disposition, encoded as years after disposition 6
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          6

  - name: federal_2025_t2017_seventh_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the seventh year after disposition, encoded as years after disposition 7
    versions:
      - effective_from: '2025-01-01'
        formula: |-
