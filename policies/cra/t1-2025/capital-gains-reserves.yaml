        formula: |-
          0.30

  - name: federal_2025_t2017_extended_seventh_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 20% for the seventh year after disposition, encoded as 0.20
    versions:
      - effective_from: '2025-01-01'
        formula: |-
