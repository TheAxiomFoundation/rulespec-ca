      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2017_child_other_property_total_line_19
          + federal_2025_t2017_qbt_other_property_inclusion_line_22
          + federal_2025_t2017_qcc_other_property_inclusion_line_25
