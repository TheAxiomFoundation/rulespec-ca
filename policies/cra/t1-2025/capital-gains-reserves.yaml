  - name: federal_2025_t2017_extended_fifth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 40% for the fifth year after disposition, encoded as 0.40
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.40

  - name: federal_2025_t2017_extended_sixth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 30% for the sixth year after disposition, encoded as 0.30
    versions:
