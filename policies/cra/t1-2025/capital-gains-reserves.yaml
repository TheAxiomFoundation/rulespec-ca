format: rulespec/v1
module:
  summary: |-
    CRA Form T2017 for 2025 summarizes reserves on dispositions of capital
    property. This module encodes the reserve roll-forward totals that flow
    to Schedule 3 line 19200 and the page 3 maximum-reserve calculations.
  source_verification:
    corpus_citation_path: ca/policy/cra/t1-2025/capital-gains-reserves
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - ca/statute/income-tax-act
      rationale: |-
        CRA Form T2017 is the official 2025 form for summarizing capital
        gains reserves reported on Schedule 3.
    source_urls:
      - https://www.canada.ca/content/dam/cra-arc/formspubs/pbg/t2017/t2017-25e.pdf
rules:
  - name: federal_2025_t2017_most_property_year_of_disposition_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 most-property table gives 80% for the year of disposition, encoded as 0.80
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.80

  - name: federal_2025_t2017_year_of_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the year of disposition, encoded as years after disposition 0
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0

  - name: federal_2025_t2017_first_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the first year after disposition, encoded as years after disposition 1
    versions:
