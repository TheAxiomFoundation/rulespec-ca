        formula: |-
          1

  - name: federal_2025_t2017_second_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the second year after disposition, encoded as years after disposition 2
    versions:
      - effective_from: '2025-01-01'
        formula: |-
