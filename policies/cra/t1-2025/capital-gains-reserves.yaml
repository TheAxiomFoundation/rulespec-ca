  - name: federal_2025_t2017_eighth_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 reserve tables identify the eighth year after disposition, encoded as years after disposition 8
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          8

  - name: federal_2025_t2017_ninth_year_after_disposition_index
    kind: parameter
    dtype: Number
    source: CRA T2017 2025 page 3 extended reserve table identifies the ninth year after disposition, encoded as years after disposition 9
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          9

  - name: federal_2025_t2017_most_property_first_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 most-property table gives 60% for the first year after disposition, encoded as 0.60
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.60

  - name: federal_2025_t2017_most_property_second_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 most-property table gives 40% for the second year after disposition, encoded as 0.40
    versions:
      - effective_from: '2025-01-01'
        formula: |-
