    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 60% for the third year after disposition, encoded as 0.60
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.60

  - name: federal_2025_t2017_extended_fourth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 50% for the fourth year after disposition, encoded as 0.50
    versions:
      - effective_from: '2025-01-01'
        formula: |-
