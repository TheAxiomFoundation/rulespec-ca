  - name: federal_2025_t2017_extended_ninth_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives zero for the ninth year after disposition
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0

  - name: federal_2025_t2017_most_property_applicable_percentage
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CRA T2017 2025 page 3 most-property table applies 80%, 60%, 40%, 20%, then zero by year after disposition
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2017_most_property_years_after_disposition <= federal_2025_t2017_year_of_disposition_index:
            federal_2025_t2017_most_property_year_of_disposition_rate
          else:
            if t2017_most_property_years_after_disposition <= federal_2025_t2017_first_year_after_disposition_index:
              federal_2025_t2017_most_property_first_year_rate
            else:
              if t2017_most_property_years_after_disposition <= federal_2025_t2017_second_year_after_disposition_index:
                federal_2025_t2017_most_property_second_year_rate
              else:
                if t2017_most_property_years_after_disposition <= federal_2025_t2017_third_year_after_disposition_index:
                  federal_2025_t2017_most_property_third_year_rate
                else:
                  federal_2025_t2017_most_property_fourth_year_rate

  - name: federal_2025_t2017_extended_applicable_percentage
    kind: derived
    entity: Person
    dtype: Rate
    period: Year
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table applies 90%, 80%, 70%, 60%, 50%, 40%, 30%, 20%, 10%, then zero
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2017_extended_years_after_disposition <= federal_2025_t2017_year_of_disposition_index:
            federal_2025_t2017_extended_year_of_disposition_rate
          else:
            if t2017_extended_years_after_disposition <= federal_2025_t2017_first_year_after_disposition_index:
              federal_2025_t2017_extended_first_year_rate
            else:
              if t2017_extended_years_after_disposition <= federal_2025_t2017_second_year_after_disposition_index:
                federal_2025_t2017_extended_second_year_rate
              else:
                if t2017_extended_years_after_disposition <= federal_2025_t2017_third_year_after_disposition_index:
                  federal_2025_t2017_extended_third_year_rate
                else:
                  if t2017_extended_years_after_disposition <= federal_2025_t2017_fourth_year_after_disposition_index:
                    federal_2025_t2017_extended_fourth_year_rate
                  else:
                    if t2017_extended_years_after_disposition <= federal_2025_t2017_fifth_year_after_disposition_index:
                      federal_2025_t2017_extended_fifth_year_rate
                    else:
                      if t2017_extended_years_after_disposition <= federal_2025_t2017_sixth_year_after_disposition_index:
                        federal_2025_t2017_extended_sixth_year_rate
                      else:
                        if t2017_extended_years_after_disposition <= federal_2025_t2017_seventh_year_after_disposition_index:
                          federal_2025_t2017_extended_seventh_year_rate
                        else:
                          if t2017_extended_years_after_disposition <= federal_2025_t2017_eighth_year_after_disposition_index:
                            federal_2025_t2017_extended_eighth_year_rate
                          else:
                            federal_2025_t2017_extended_ninth_year_rate

  - name: federal_2025_t2017_most_property_ratio_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 most-property reserve limit is capital gain times amount payable after the end of the year divided by proceeds of disposition
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if max(0, t2017_most_property_proceeds_of_disposition) <= 0:
            0
          else:
            max(0, t2017_most_property_capital_gain)
            * max(0, t2017_most_property_amount_payable_after_year)
            / max(0, t2017_most_property_proceeds_of_disposition)

  - name: federal_2025_t2017_most_property_percentage_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 most-property reserve limit is also capital gain times the applicable percentage from the table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t2017_most_property_capital_gain)
          * federal_2025_t2017_most_property_applicable_percentage

  - name: federal_2025_t2017_most_property_maximum_reserve
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 most-property reserve cannot be more than the lesser of the amount-payable limit and the percentage limit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2017_most_property_ratio_limit,
            federal_2025_t2017_most_property_percentage_limit
          )

  - name: federal_2025_t2017_extended_ratio_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC reserve limit is capital gain times amount payable after the end of the year divided by proceeds
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if max(0, t2017_extended_proceeds_of_disposition) <= 0:
            0
          else:
            max(0, t2017_extended_capital_gain)
            * max(0, t2017_extended_amount_payable_after_year)
            / max(0, t2017_extended_proceeds_of_disposition)

  - name: federal_2025_t2017_extended_percentage_limit
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC reserve limit is also capital gain times the applicable percentage from the table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t2017_extended_capital_gain)
          * federal_2025_t2017_extended_applicable_percentage

  - name: federal_2025_t2017_extended_maximum_reserve
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC reserve cannot be more than the lesser of the amount-payable limit and the percentage limit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            federal_2025_t2017_extended_ratio_limit,
            federal_2025_t2017_extended_percentage_limit
          )

  - name: federal_2025_t2017_non_qualifying_security_maximum_reserve
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 says a gift of non-qualifying securities reserve cannot be more than the capital gain or the eligible amount of the gift
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          min(
            max(0, t2017_non_qualifying_security_capital_gain),
            max(0, t2017_non_qualifying_security_eligible_gift_amount)
          )

  - name: federal_2025_t2017_pre_1981_maximum_reserve
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 page 3 pre-November 13, 1981 reserve is capital gain times amount payable after the end of the year divided by proceeds
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if max(0, t2017_pre_1981_proceeds_of_disposition) <= 0:
            0
          else:
            max(0, t2017_pre_1981_capital_gain)
            * max(0, t2017_pre_1981_amount_payable_after_year)
            / max(0, t2017_pre_1981_proceeds_of_disposition)

  - name: federal_2025_t2017_qffp_current_reserves_line_66844
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 Part 1 A line 5 adds QFFP reserve lines 2 to 4
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(0, t2017_qffp_current_reserve_child_or_other_line_2)
          + max(0, t2017_qffp_current_reserve_qbt_line_66831)
          + max(0, t2017_qffp_current_reserve_qcc_line_66832)

  - name: federal_2025_t2017_qffp_reserve_inclusion_line_6
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 Part 1 A line 6 subtracts line 5 from line 1 and allows negative amounts in brackets
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          t2017_qffp_prior_year_reserve_line_66843
          - federal_2025_t2017_qffp_current_reserves_line_66844

  - name: federal_2025_t2017_qsbcs_current_reserves_line_66850
    kind: derived
