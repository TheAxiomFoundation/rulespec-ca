  - name: federal_2025_t2017_total_reserve_line_19200
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2017 2025 Part 2 line 31 adds line 29 and line 30 and enters the amount on Schedule 3 line 19200
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          federal_2025_t2017_post_1981_total_line_29
          + t2017_pre_november_13_1981_prior_year_reserve_line_67030
