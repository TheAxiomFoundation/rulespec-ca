  - name: federal_2025_t2017_extended_year_of_disposition_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 90% for the year of disposition, encoded as 0.90
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          0.90

  - name: federal_2025_t2017_extended_first_year_rate
    kind: parameter
    dtype: Rate
    source: CRA T2017 2025 page 3 QFFP child, QSBCS child, QBT, and QCC table gives 80% for the first year after disposition, encoded as 0.80
    versions:
      - effective_from: '2025-01-01'
