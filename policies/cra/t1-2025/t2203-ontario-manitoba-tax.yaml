          else:
            if taxable_income_line_26000 <= federal_2025_t2203_mb_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_mb_bracket_1_threshold) * federal_2025_t2203_mb_bracket_2_rate + federal_2025_t2203_mb_bracket_2_base_tax
            else:
              (taxable_income_line_26000 - federal_2025_t2203_mb_bracket_2_threshold) * federal_2025_t2203_mb_bracket_3_rate + federal_2025_t2203_mb_bracket_3_base_tax
  - name: federal_2025_t2203_mb_tax_after_non_refundable_credits_line_16
