  - name: federal_2025_t2203_on_tax_on_taxable_income_line_9
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ line 9 is Ontario tax on taxable income from the bracket table
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_on_bracket_1_threshold:
            max(0, taxable_income_line_26000) * federal_2025_t2203_on_bracket_1_rate
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_on_bracket_2_threshold:
              (taxable_income_line_26000 - federal_2025_t2203_on_bracket_1_threshold) * federal_2025_t2203_on_bracket_2_rate + federal_2025_t2203_on_bracket_2_base_tax
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_on_bracket_3_threshold:
                (taxable_income_line_26000 - federal_2025_t2203_on_bracket_2_threshold) * federal_2025_t2203_on_bracket_3_rate + federal_2025_t2203_on_bracket_3_base_tax
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_on_bracket_4_threshold:
                  (taxable_income_line_26000 - federal_2025_t2203_on_bracket_3_threshold) * federal_2025_t2203_on_bracket_4_rate + federal_2025_t2203_on_bracket_4_base_tax
                else:
                  (taxable_income_line_26000 - federal_2025_t2203_on_bracket_4_threshold) * federal_2025_t2203_on_bracket_5_rate + federal_2025_t2203_on_bracket_5_base_tax
  - name: federal_2025_t2203_on_tax_after_non_refundable_credits_line_11
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ line 11 subtracts Ontario non-refundable credits from tax on taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_on_tax_on_taxable_income_line_9 - max(0, on_non_refundable_tax_credits_part_3_line_d))
  - name: federal_2025_t2203_on_tax_allocated_line_13
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ line 13 multiplies line 11 by the Ontario allocation percentage
    versions:
      - effective_from: '2025-01-01'
        formula: federal_2025_t2203_on_tax_after_non_refundable_credits_line_11 * max(0, t2203_ontario_income_allocation_percentage)
  - name: federal_2025_t2203_on_tax_after_resident_adjustment_line_21
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ lines 14 to 21 apply the resident adjustment and add Ontario unallocated tax on split income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if t2203_resident_of_ontario:
            max(
              0,
              federal_2025_t2203_on_tax_allocated_line_13
              - max(0, on_resident_adjustment_credit_base_lines_58330_58360)
              * federal_2025_t2203_on_bracket_1_rate
              * max(0, 1 - max(0, t2203_ontario_income_allocation_percentage))
            ) + max(0, on_unallocated_tax_on_split_income_t1206_line_20)
          else:
            federal_2025_t2203_on_tax_allocated_line_13
  - name: federal_2025_t2203_on_adjusted_income_tax_line_29
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ lines 22 to 29 subtract the prorated minimum tax carryover
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_on_tax_after_resident_adjustment_line_21
            - min(
              max(
                0,
                (if t2203_resident_of_ontario:
                    max(0, federal_2025_t2203_on_tax_allocated_line_13 - max(0, on_resident_adjustment_credit_base_lines_58330_58360) * federal_2025_t2203_on_bracket_1_rate * max(0, 1 - max(0, t2203_ontario_income_allocation_percentage)))
                  else:
                    federal_2025_t2203_on_tax_after_resident_adjustment_line_21)
                - (if t2203_resident_of_ontario:
                    max(0, on_dividend_tax_credit_line_23)
                  else:
                    0)
              ),
              max(0, minimum_tax_carryover_line_40427)
              * federal_2025_t2203_on_minimum_tax_rate
              * max(0, t2203_ontario_income_allocation_percentage)
            )
          )
  - name: federal_2025_t2203_on_surtax_line_41
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ lines 31 to 41 calculate Ontario surtax and prorate by the Ontario allocation percentage
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          (
            max(
              0,
              federal_2025_t2203_on_tax_after_non_refundable_credits_line_11
              - min(
                max(0, federal_2025_t2203_on_tax_after_non_refundable_credits_line_11 - max(0, on_dividend_tax_credit_line_23)),
                max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_on_minimum_tax_rate
              )
              - federal_2025_t2203_on_surtax_first_threshold
            ) * federal_2025_t2203_on_surtax_first_rate
            + max(
              0,
              federal_2025_t2203_on_tax_after_non_refundable_credits_line_11
              - min(
                max(0, federal_2025_t2203_on_tax_after_non_refundable_credits_line_11 - max(0, on_dividend_tax_credit_line_23)),
                max(0, minimum_tax_carryover_line_40427) * federal_2025_t2203_on_minimum_tax_rate
              )
              - federal_2025_t2203_on_surtax_second_threshold
            ) * federal_2025_t2203_on_surtax_second_rate
          ) * max(0, t2203_ontario_income_allocation_percentage)
  - name: federal_2025_t2203_on_tax_after_surtax_and_additional_line_46
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ lines 42 to 46 add surtax and additional tax for minimum tax purposes, and subtract resident dividend tax credit
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            federal_2025_t2203_on_adjusted_income_tax_line_29
            + federal_2025_t2203_on_surtax_line_41
            - (if t2203_resident_of_ontario:
                max(0, on_dividend_tax_credit_line_23)
              else:
                0)
          ) + max(0, on_additional_tax_for_minimum_tax_purposes_line_45)
  - name: federal_2025_t2203_on_tax_reduction_line_57
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ lines 47 to 57 calculate Ontario tax reduction for eligible residents
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if on_tax_reduction_eligible:
            max(
              0,
              (
                federal_2025_t2203_on_tax_reduction_basic
                + max(0, on_dependent_children_for_tax_reduction) * federal_2025_t2203_on_tax_reduction_dependant
                + max(0, on_dependants_with_impairment_for_tax_reduction) * federal_2025_t2203_on_tax_reduction_dependant
              ) * max(0, t2203_ontario_income_allocation_percentage) * 2
              - federal_2025_t2203_on_tax_after_surtax_and_additional_line_46
            )
          else:
            0
  - name: federal_2025_t2203_on_tax_after_reduction_line_58
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 ON428MJ line 58 subtracts Ontario tax reduction
    versions:
      - effective_from: '2025-01-01'
        formula: max(0, federal_2025_t2203_on_tax_after_surtax_and_additional_line_46 - federal_2025_t2203_on_tax_reduction_line_57)
  - name: federal_2025_t2203_on_tax_after_foreign_lift_and_food_line_67
    kind: derived
    entity: Person
