  - name: federal_2025_t2203_on_health_premium_line_68
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T2203 2025 Worksheet ON428MJ line 68 calculates the Ontario health premium from taxable income
    versions:
      - effective_from: '2025-01-01'
        formula: |-
          if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_1:
            0
          else:
            if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_2:
              (taxable_income_line_26000 - federal_2025_t2203_on_health_premium_threshold_1)
              * federal_2025_t2203_on_health_premium_low_rate
            else:
              if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_3:
                federal_2025_t2203_on_health_premium_300
              else:
                if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_4:
                  (taxable_income_line_26000 - federal_2025_t2203_on_health_premium_threshold_3)
                  * federal_2025_t2203_on_health_premium_low_rate
                  + federal_2025_t2203_on_health_premium_300
                else:
                  if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_5:
                    federal_2025_t2203_on_health_premium_450
                  else:
                    if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_6:
                      (taxable_income_line_26000 - federal_2025_t2203_on_health_premium_threshold_5)
                      * federal_2025_t2203_on_health_premium_high_rate
                      + federal_2025_t2203_on_health_premium_450
                    else:
                      if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_7:
                        federal_2025_t2203_on_health_premium_600
                      else:
                        if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_8:
                          (taxable_income_line_26000 - federal_2025_t2203_on_health_premium_threshold_7)
                          * federal_2025_t2203_on_health_premium_high_rate
                          + federal_2025_t2203_on_health_premium_600
                        else:
                          if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_9:
                            federal_2025_t2203_on_health_premium_750
                          else:
                            if taxable_income_line_26000 <= federal_2025_t2203_on_health_premium_threshold_10:
                              (taxable_income_line_26000 - federal_2025_t2203_on_health_premium_threshold_9)
                              * federal_2025_t2203_on_health_premium_high_rate
                              + federal_2025_t2203_on_health_premium_750
                            else:
                              federal_2025_t2203_on_health_premium_900
