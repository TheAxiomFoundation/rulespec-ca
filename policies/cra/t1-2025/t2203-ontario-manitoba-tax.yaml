    versions:
      - effective_from: '2025-01-01'
        formula: |-
          max(
            0,
            max(
              0,
              (if t2203_resident_of_ontario:
                  max(0, federal_2025_t2203_on_tax_after_reduction_line_58 - max(0, on_provincial_foreign_tax_credit_t2036_line_60))
                else:
                  federal_2025_t2203_on_tax_after_reduction_line_58)
              - max(0, on_lift_credit_schedule_on428_a_mj_line_62) * max(0, t2203_ontario_income_allocation_percentage)
