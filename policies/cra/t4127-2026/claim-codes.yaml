format: rulespec/v1
module:
  summary: |-
    CRA T4127 Tables 8.9 through 8.21 list the 2026 federal,
    provincial, and territorial claim-code ranges and Option 1
    personal tax credit amounts. This module encodes claim codes
    0 through 10 for each table, including the total claim amount
    range, selected TC/TCP amount, and K1/K1P non-refundable tax
    credit amount used by payroll deduction formulas.
  source_verification:
    corpus_citation_path: canada/policy/cra/t4127-2026/claim-codes
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/income-tax-act
      rationale: |-
        T4127 is CRA's official payroll formula source for personal
        claim-code calculations used in tax withholding. This module
        encodes the published 2026 claim-code tables before deeper
        TD1 form line-item expansion.
    source_urls:
      - https://www.canada.ca/en/revenue-agency/services/forms-publications/payroll/t4127-payroll-deductions-formulas/t4127-jan/t4127-jan-payroll-deductions-formulas-computer-programs.html
