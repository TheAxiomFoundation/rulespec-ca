    dtype: Money
    period: Year
    source: CRA T4127 Table 8.6, second additional CPP employee contribution
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(cpp_qpp_2026_max_second_additional_employee_contribution, cpp_qpp_2026_second_additional_rate * max(0, min(cpp_pensionable_earnings, cpp_2026_yampe) - cpp_2026_ympe))

