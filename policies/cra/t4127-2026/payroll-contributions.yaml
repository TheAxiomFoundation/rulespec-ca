  - name: cpp_employee_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Table 8.3, CPP employee contribution
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(cpp_2026_max_employee_contribution, cpp_2026_total_employee_rate * max(0, min(cpp_pensionable_earnings, cpp_2026_ympe) - cpp_2026_basic_exemption))

  - name: qpp_employee_contribution
    kind: derived
    entity: Person
    dtype: Money
    period: Year
    source: CRA T4127 Table 8.3, QPP employee contribution
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          min(qpp_2026_max_employee_contribution, qpp_2026_total_employee_rate * max(0, min(qpp_pensionable_earnings, cpp_2026_ympe) - cpp_2026_basic_exemption))

  - name: cpp2_employee_contribution
    kind: derived
