format: rulespec/v1
module:
  summary: |-
    CRA T4127 Tables 8.3 through 8.8 provide 2026 CPP, QPP, EI,
    and Quebec Parental Insurance Plan rates and maximum annual amounts.
    This module encodes annual employee and employer contribution
    surfaces used by payroll withholding and tax-credit calculations.
  source_verification:
    corpus_citation_path: canada/policy/cra/t4127-2026/payroll-contributions
    upstream_source_check:
      status: official_parameter_source
      checked_paths:
        - canada/statute/canada-pension-plan
        - canada/statute/employment-insurance-act
        - canada/statute/quebec-pension-plan
      rationale: |-
        T4127 states that its formulas are approved for purposes of the
        Canada Pension Plan and Employment Insurance Act. This module
        encodes the official CRA 2026 payroll contribution parameter
        tables before deeper statutory source expansion.
    source_urls:
      - https://www.canada.ca/en/revenue-agency/services/forms-publications/payroll/t4127-payroll-deductions-formulas/t4127-jan/t4127-jan-payroll-deductions-formulas-computer-programs.html
rules:
  - name: cpp_2026_ympe
    kind: parameter
    dtype: Money
    source: CRA T4127 Table 8.3 and Table 8.4, CPP YMPE
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          74600

  - name: cpp_2026_basic_exemption
