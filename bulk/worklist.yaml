# rulespec-ca bulk-encode worklist (flat layout; local codex generation).
#
# Each `citation` is a corpus citation_path (jurisdiction `ca`, all doc_type
# `policy`) that the encoder resolves from the Supabase `corpus.current_provisions`
# view (241 CA provisions; not committed as provisions/ca/ blobs in any pinned
# axiom-corpus ref, so Supabase is the resolution source). Every entry below was
# verified to exist by exact citation_path in current_provisions BEFORE listing
# (never invent Canadian numbers).
