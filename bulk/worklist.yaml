version: 1
defaults:
  backend: codex
  model: gpt-5.5
# rulespec-ca bulk-encode worklist (flat layout; local codex generation).
#
# Each `citation` is a corpus citation_path (jurisdiction `ca`, all doc_type
# `policy`) resolved from the Supabase `corpus.current_provisions` view (241 CA
# provisions; not committed as provisions/ca/ blobs in any pinned axiom-corpus
# ref, so Supabase is the source). Every entry below was verified to exist by
# exact citation_path via corpus_q.py `get` BEFORE listing (never invent
# Canadian numbers). The encoder maps `ca/policy/<rest>` -> `policies/<rest>.yaml`
# natively (bulk/README.md); each `target_module` is a NEW path (no file
# collision).
#
# ── READ THIS: the CA corpus is fully encoded ────────────────────────────────
# There are 0 genuine content gaps. All 99 L1 provisions (a form/schedule) are
# already encoded as policies/**/*.yaml, and the L1 modules fold in their L2
# children's arithmetic. The only remaining corpus provisions are 142 L2
# sub-provisions, so every entry here is a finer-granularity RE-ENCODE of content
# already in its L1 parent module — useful as local-codex smoke-test fuel and as
# a 1:1 corpus->module granularity pass, NOT as net-new coverage.
#
# NAMESPACE CAVEAT: RuleSpec rule names are global descriptive identifiers (e.g.
# `canada_disability_benefit_base_monthly_amount`), not module-scoped. A re-encode
# that regenerates the same rule names as its L1 parent will be refused by
# `encode --apply` (fail-closed on duplicate rules, no PR) — a correct, accountable
# behavior. A clean per-provision-granularity drain therefore needs either
# distinct rule names per sub-provision or retiring the folded L1 rules first.
# Both are adjudicated by the encoder + gates; this queue never forces a merge.
#
# Handoff: the CANARY is `status: pending` (the local codex drain selects only
# `pending`). The remaining entries are `status: staged` corpus-verified fuel —
# promote to `pending` to drain once the namespace approach above is decided.
entries:
# ── CANARY (status: pending) ─────────────────────────────────────────────────
- citation: ca/policy/esdc/benefits-2026/canada-disability-benefit/sor-2025-35
  repo: rulespec-ca
  batch: A
  status: pending
  heading: Canada Disability Benefit 2026 amount and SOR/2025-35 calculation rules
  class: mechanics
  target_module: policies/esdc/benefits-2026/canada-disability-benefit/sor-2025-35.yaml
  mode: re-encode
  note: >-
    CANARY. Cleanest fully self-contained arithmetic in the CA corpus: monthly
    benefit (($2,400 x A) - B) / 12; reduction B = 20% x (adjusted_income -
    working_income_exemption - $23,000 x A) single, $32,500 x A couple, 10% if
    both beneficiaries; working-income caps $10,000/$14,000; CPI indexing factor
    A. Every constant inline, zero cross-form refs. Built-in oracle: existing L1
    canada-disability-benefit.yaml (23 rules) encodes the same formula.
# ── STAGED fuel (corpus-verified; promote to pending to drain) ────────────────
