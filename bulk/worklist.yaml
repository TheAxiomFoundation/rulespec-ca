# The encoder maps a `ca/policy/<rest>` citation to the flat module
# `policies/<rest>.yaml` via its source-root token map (see bulk/README.md); no
# `ca/` directory and no encoder change is involved.
#
# Selection: guidance-grade CRA/Revenu-Québec/ESDC forms and worksheets, so the
# queue prefers provisions with clear standalone amounts/rates/formulas
# (bracket rates, credit amounts, phase-out formulas) and SKIPS aggregation/
# rollup forms and cross-reference-heavy ones.
#
# VOLUME STAYS MINIMAL until the first canary drains cleanly through the local
